# =====================================================
# GitLab CI/CD Pipeline - NexusMall Order Service
# =====================================================
# 业界标准实践:
# 1. 多阶段流水线 (编译→测试→构建→部署)
# 2. Maven 依赖缓存 (提升构建速度 80%+)
# 3. Docker 镜像分层构建
# 4. 多环境部署支持 (dev/test/prod)
# 5. 自动化测试门禁
# 6. 镜像漏洞扫描
# 7. 蓝绿部署策略
# =====================================================

stages:
  - compile        # 编译阶段
  - unit-test      # 单元测试
  - integration-test # 集成测试
  - quality-check  # 代码质量检查
  - build-image    # 构建 Docker 镜像
  - push-image     # 推送镜像到仓库
  - deploy-dev     # 部署开发环境
  - deploy-test    # 部署测试环境
  - deploy-prod    # 部署生产环境

# ========================================
# 全局变量配置
# ========================================
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository -DskipTests -B"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  APP_NAME: "nexusmall-order"
  IMAGE_REGISTRY: "registry.cn-shanghai.aliyuncs.com/nexusmall"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  
# ========================================
# 缓存配置 (跨流水线共享)
# ========================================
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository/
    - target/

# ========================================
# 通用规则定义
# ========================================
.workflow:rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG

# ========================================
# 阶段 1: 编译 (Compile)
# ========================================
compile:
  stage: compile
  image: maven:3.8.8-openjdk-17
  tags:
    - docker
  rules:
    - !reference [.workflow:rules, rules]
  script:
    - echo "====== 编译阶段 ======"
    - mvn clean compile -f nexusmall-order/pom.xml $MAVEN_OPTS
  artifacts:
    paths:
      - nexusmall-order/target/classes/
    expire_in: 1 hour

# ========================================
# 阶段 2: 单元测试 (Unit Test)
# ========================================
unit-test:
  stage: unit-test
  image: maven:3.8.8-openjdk-17
  tags:
    - docker
  rules:
    - !reference [.workflow:rules, rules]
  needs: ["compile"]
  script:
    - echo "====== 单元测试阶段 ======"
    - mvn test -f nexusmall-order/pom.xml -Dtest=*Test
  artifacts:
    reports:
      junit: nexusmall-order/target/surefire-reports/TEST-*.xml
    paths:
      - nexusmall-order/target/surefire-reports/
      - nexusmall-order/target/site/jacoco/
    expire_in: 1 week
  coverage: '/Total.*?([0-9]{1,3})%/'

# ========================================
# 阶段 3: 集成测试 (Integration Test)
# ========================================
integration-test:
  stage: integration-test
  image: maven:3.8.8-openjdk-17
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["unit-test"]
  services:
    - mysql:8.0
    - redis:7-alpine
  variables:
    MYSQL_DATABASE: nexusmall_order_test
    MYSQL_ROOT_PASSWORD: test123456
    SPRING_PROFILES_ACTIVE: test
  script:
    - echo "====== 集成测试阶段 ======"
    - mvn verify -f nexusmall-order/pom.xml -P integration-test
  allow_failure: true

# ========================================
# 阶段 4: 代码质量检查 (Quality Check)
# ========================================
quality-check:
  stage: quality-check
  image: maven:3.8.8-openjdk-17
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["unit-test"]
  script:
    - echo "====== 代码质量检查 ======"
    # Checkstyle 代码规范检查
    - mvn checkstyle:check -f nexusmall-order/pom.xml
    # PMD 代码问题分析
    - mvn pmd:check -f nexusmall-order/pom.xml
    # SpotBugs 静态分析
    - mvn spotbugs:check -f nexusmall-order/pom.xml
  allow_failure: true

# ========================================
# 阶段 5: 构建 Docker 镜像 (Build Image)
# ========================================
build-image:
  stage: build-image
  image: docker:24.0
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  needs: ["unit-test"]
  services:
    - docker:24.0-dind
  before_script:
    - docker info
    - echo "登录 Docker Registry..."
    - echo $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USER --password-stdin $IMAGE_REGISTRY
  script:
    - echo "====== 构建 Docker 镜像 ======"
    - echo "镜像版本：${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG}"
    # 多阶段构建
    - docker build 
        -t ${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG} 
        -t ${IMAGE_REGISTRY}/${APP_NAME}:latest 
        -f nexusmall-order/Dockerfile 
        --build-arg VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
        .
    # 查看镜像信息
    - docker images | grep ${APP_NAME}
  after_script:
    - docker logout $IMAGE_REGISTRY

# ========================================
# 阶段 6: 推送镜像到仓库 (Push Image)
# ========================================
push-image:
  stage: push-image
  image: docker:24.0
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  needs: ["build-image"]
  before_script:
    - echo $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USER --password-stdin $IMAGE_REGISTRY
  script:
    - echo "====== 推送 Docker 镜像 ======"
    - docker push ${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG}
    - docker push ${IMAGE_REGISTRY}/${APP_NAME}:latest
    - echo "镜像推送完成"
  after_script:
    - docker logout $IMAGE_REGISTRY

# ========================================
# 阶段 7: 部署到开发环境 (Deploy Dev)
# ========================================
deploy-dev:
  stage: deploy-dev
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs: ["push-image"]
  environment:
    name: development
    url: http://dev-order.nexusmall.com
  script:
    - echo "====== 部署到开发环境 ======"
    # 更新 Kubernetes 部署
    - kubectl set image deployment/${APP_NAME}-dev ${APP_NAME}=${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG} -n nexusmall-dev
    - kubectl rollout status deployment/${APP_NAME}-dev -n nexusmall-dev --timeout=300s
    - echo "开发环境部署完成"

# ========================================
# 阶段 8: 部署到测试环境 (Deploy Test)
# ========================================
deploy-test:
  stage: deploy-test
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["push-image"]
  environment:
    name: testing
    url: http://test-order.nexusmall.com
  script:
    - echo "====== 部署到测试环境 ======"
    # 滚动更新
    - kubectl set image deployment/${APP_NAME}-test ${APP_NAME}=${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG} -n nexusmall-test
    - kubectl rollout status deployment/${APP_NAME}-test -n nexusmall-test --timeout=300s
    # 运行冒烟测试
    - kubectl run smoke-test --image=curlimages/curl --rm -it --restart=Never -- curl -f http://${APP_NAME}-test.nexusmall-test.svc.cluster.local:11000/actuator/health || exit 1
    - echo "测试环境部署完成"

# ========================================
# 阶段 9: 部署到生产环境 (Deploy Prod)
# ========================================
deploy-prod:
  stage: deploy-prod
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  rules:
    - if: $CI_COMMIT_TAG
  needs: ["deploy-test"]
  environment:
    name: production
    url: https://order.nexusmall.com
  when: manual  # 手动确认部署
  variables:
    DEPLOY_STRATEGY: "blue-green"
  script:
    - echo "====== 部署到生产环境 (蓝绿部署) ======"
    # 蓝绿部署脚本
    - kubectl apply -f k8s/order-deployment-blue.yaml -n nexusmall-prod
    - kubectl set image deployment/${APP_NAME}-blue ${APP_NAME}=${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG} -n nexusmall-prod
    - kubectl rollout status deployment/${APP_NAME}-blue -n nexusmall-prod --timeout=600s
    # 健康检查
    - kubectl wait --for=condition=available deployment/${APP_NAME}-blue -n nexusmall-prod --timeout=300s
    # 切换流量到蓝色环境
    - kubectl patch service ${APP_NAME}-prod -p '{"spec":{"selector":{"version":"blue"}}}' -n nexusmall-prod
    # 清理旧版本 (绿色)
    - kubectl delete deployment ${APP_NAME}-green -n nexusmall-prod --ignore-not-found=true
    - echo "✅ 生产环境部署完成！版本：${CI_COMMIT_TAG}"
  after_script:
    - echo "发送部署通知到钉钉/企业微信..."
    # 这里可以添加通知脚本

# ========================================
# 辅助任务：数据库迁移 (Database Migration)
# ========================================
db-migration:
  stage: build-image
  image: flyway/flyway:9.22
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  variables:
    FLYWAY_URL: jdbc:mysql://mysql:3306/nexusmall_order
    FLYWAY_USER: root
    FLYWAY_PASSWORD: $DB_ROOT_PASSWORD
  script:
    - echo "====== 执行数据库迁移 ======"
    - flyway migrate
  allow_failure: true

# ========================================
# 辅助任务：镜像漏洞扫描 (Security Scan)
# ========================================
security-scan:
  stage: build-image
  image: aquasec/trivy:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["build-image"]
  variables:
    TRIVY_SEVERITY: "CRITICAL,HIGH"
    TRIVY_FORMAT: table
  script:
    - echo "====== Docker 镜像安全扫描 ======"
    - trivy image --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} ${IMAGE_REGISTRY}/${APP_NAME}:${IMAGE_TAG}
  allow_failure: true
