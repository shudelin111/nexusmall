# =====================================================
# NexusMall 认证服务配置文件
# =====================================================
# 模块职责：
# 1. 用户注册、登录、登出
# 2. JWT Token 生成与验证
# 3. 用户权限管理
# 4. OAuth2 第三方登录（预留）
# =====================================================

# ===============================
# Spring Boot Actuator 监控配置
# ===============================
# 业界标准配置：暴露 Prometheus 监控端点
management:
  endpoints:
    web:
      # 暴露所有端点（生产环境建议只暴露 health,info,prometheus）
      exposure:
        include: "*"
  # 端点详细配置
  endpoint:
    health:
      # 显示健康检查详情
      show-details: always
    info:
      # 启用 info 端点
      enabled: true
    prometheus:
      # 启用 Prometheus 端点（必需）
      enabled: true
  # 指标监控配置
  metrics:
    # 启用指标收集
    enabled: true
    # 标签配置（用于区分不同微服务）
    tags:
      # 应用名称标签（Prometheus 中通过此标签区分服务）
      application: ${spring.application.name}
    # 导出配置
    export:
      # Prometheus 导出配置
      prometheus:
        # 启用 Prometheus 导出（必需）
        enabled: true

spring:
  # ------------------------------
  # 配置导入（从 Nacos 加载配置）
  # ------------------------------
  config:
    # 从 Nacos 配置中心导入配置文件
    # 格式：nacos:{应用名}.{文件后缀}
    # optional: 表示配置可选，Nacos 连接失败时使用本地配置
    import: "optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}"
  
  profiles:
    # 当前运行环境：dev(开发) / test(测试) / prod(生产)
    active: dev
  
  application:
    # 服务名称（注册到 Nacos 的唯一标识）
    name: nexusmall-auth
  
  # ------------------------------
  # Sentinel 熔断限流配置
  # ------------------------------
  cloud:
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      # 控制台地址（生产环境改为实际 IP）
      transport:
        dashboard: 10.10.1.1:8858
        # 与 Dashboard 通信的端口（0 表示自动选择可用端口）
        port: 8719
      datasource:
        # ===============================
        # 流控规则数据源（控制 QPS 或并发数）
        # ===============================
        ds1:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.nacos.discovery.namespace}
            dataId: nexusmall-auth-flow-rule.json
            groupId: ${spring.cloud.nacos.discovery.group}
            rule-type: flow
            data-type: json
            # Nacos 认证配置
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}

        # ===============================
        # 熔断降级规则数据源（异常比例/慢调用）
        # ===============================
        ds2:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.nacos.discovery.namespace}
            dataId: nexusmall-auth-degrade-rule.json
            groupId: ${spring.cloud.nacos.discovery.group}
            rule-type: degrade
            data-type: json
            # Nacos 认证配置
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}

        # ===============================
        # 系统自适应保护规则数据源
        # ===============================
        ds3:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.nacos.discovery.namespace}
            dataId: nexusmall-auth-system-rule.json
            groupId: ${spring.cloud.nacos.discovery.group}
            rule-type: system
            data-type: json
            # Nacos 认证配置
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}

      # Sentinel 日志配置
      log:
        # 日志级别：DEBUG, INFO, WARN, ERROR
        level: DEBUG
    
    # ------------------------------
    # Spring Cloud Nacos 配置
    # ------------------------------
    nacos:
      # 服务发现配置（注册到 Nacos）
      discovery:
        # Nacos 服务器地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        # 命名空间（来自 ConfigMap 或 Profile）
        # "" 表示 public 命名空间
        # prod: 生产环境命名空间
        namespace: ${NACOS_NAMESPACE:prod}
        # 服务分组（来自 ConfigMap）
        group: ${NACOS_GROUP:MALL_GROUP}
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
      
      # 配置中心配置（从 Nacos 读取配置）
      config:
        # 配置中心地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        # 配置命名空间（来自 ConfigMap）
        namespace: ${NACOS_NAMESPACE:prod}
        # 配置分组（来自 ConfigMap）
        group: ${NACOS_GROUP:MALL_GROUP}
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
        # 配置文件后缀名
        # dataId 格式：{spring.application.name}.{file-extension}
        # 示例：nexusmall-auth.yaml
        file-extension: yaml
  
  # ------------------------------
  # 数据源配置（HikariCP 连接池）
  # ------------------------------
  datasource:
    # MySQL 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # JDBC 连接 URL
    # useUnicode=true: 支持 Unicode 字符集
    # characterEncoding=UTF-8: 使用 UTF-8 编码
    # serverTimezone=Asia/Shanghai: 设置服务器时区为上海时间
    # useSSL=false: 禁用 SSL（内网环境可禁用，提升性能）
    url: jdbc:mysql://10.10.1.1:3306/nexusmall_auth?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    # 数据库用户名
    username: root
    # 数据库密码
    password: "123456"
    # 数据源类型：HikariCP（Spring Boot 2.x 默认连接池，性能最优）
    type: com.zaxxer.hikari.HikariDataSource
    # HikariCP 连接池详细配置
    hikari:
      # 最小空闲连接数（保持池中至少有这么多连接）
      minimum-idle: 5
      # 最大连接数（池中允许的最大活跃连接数）
      # 建议值：CPU 核心数 * 2 + 1（根据实际业务调整）
      maximum-pool-size: 20
      # 空闲连接超时时间（毫秒）
      # 含义：连接在池中空闲超过此时间将被回收
      # 建议：小于数据库的 wait_timeout 参数
      idle-timeout: 30000  # 30 秒
      # 连接最大生命周期（毫秒）
      # 含义：连接从创建到强制关闭的总时长
      # 建议：比数据库的 wait_timeout 短几分钟
      max-lifetime: 1800000  # 30 分钟
      # 连接超时时间（毫秒）
      # 含义：获取连接时最多等待多久
      connection-timeout: 30000  # 30 秒
      # 连接测试查询语句
      # 作用：检测连接是否有效（MySQL 常用 SELECT 1）
      connection-test-query: SELECT 1
  
  # ------------------------------
  # Redis 缓存配置（用于 Token 存储、验证码等）
  # ------------------------------
  redis:
    # Redis 服务器地址（支持环境变量覆盖）
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号（0-15，默认 0）
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}
    # 连接超时时间（毫秒）
    timeout: 5000  # 5 秒
    # Lettuce 连接池配置（Lettuce 是 Spring Boot 默认的 Redis 客户端）
    lettuce:
      pool:
        # 最大活跃连接数（含正在使用和空闲）
        max-active: 16
        # 最大空闲连接数
        max-idle: 8
        # 最小空闲连接数
        min-idle: 0
        # 获取连接的最大等待时间（毫秒）
        # -1: 永久等待；0: 立即返回；>0: 等待指定时间
        max-wait: 1000ms  # 1 秒
  


# =====================================================
# 服务器配置
# =====================================================
server:
  # 服务监听端口
  port: 8000
  # 监听地址
  # 0.0.0.0: 监听所有网络接口（可通过 IP 访问）
  # 127.0.0.1: 仅本地访问
  address: 0.0.0.0

# =====================================================
# MyBatis-Plus ORM 配置
# =====================================================
mybatis-plus:
  # Mapper XML 文件位置（支持通配符匹配）
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类别名包路径
  # 作用：XML 中可以直接用实体类名而不需要写全限定名
  type-aliases-package: com.nexusmall.auth.entity
  # MyBatis 原生配置
  configuration:
    # 是否开启驼峰命名转换
    # true: 数据库下划线字段自动映射为 Java 驼峰字段
    # 示例：user_name -> userName
    map-underscore-to-camel-case: true
    # SQL 日志实现类
    # Slf4jImpl: 使用 SLF4J 记录日志（生产环境推荐）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  # 全局配置
  global-config:
    db-config:
      # 主键生成策略
      # auto: 数据库自增 ID
      # assign_id: 雪花算法生成 ID
      # assign_uuid: UUID
      id-type: auto
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（1 表示已删除）
      logic-delete-value: 1
      # 逻辑未删除值（0 表示未删除）
      logic-not-delete-value: 0

# =====================================================
# OpenFeign 服务调用配置
# =====================================================
feign:
  sentinel:
    # 启用 Sentinel 熔断
    enabled: true
  client:
    config:
      default:
        # 连接建立超时时间（毫秒）
        connectTimeout: 5000  # 5 秒
        # 读取数据超时时间（毫秒）
        readTimeout: 5000  # 5 秒

# =====================================================
# 安全配置（JWT 相关）
# =====================================================
#security:
#  jwt:
#    # JWT 签名密钥（用于生成和验证 Token）
#    # ⚠️ 生产环境务必更换为复杂密钥，并妥善保管
#    secret-key: mySecretKeyForJWTGenerationAndValidation
#    # Token 过期时间（毫秒）
#    # 86400000ms = 24 小时
#    # 建议：根据业务安全要求调整（如 2 小时、7 天等）
#    expire-time-in-ms: 86400000

# =====================================================
# Seata 分布式事务配置
# =====================================================
seata:
  # 是否启用 Seata
  enabled: true
  # 应用 ID（用于标识事务发起方）
  application-id: nexusmall-auth
  # 事务服务组名称
  tx-service-group: nexusmall-tx-group
  service:
    # 事务组映射配置
    vgroup-mapping:
      # 将事务组映射到具体的 Seata Server 集群
      nexusmall-tx-group: default
  registry:
    # 注册中心类型
    # file: 使用本地文件（开发环境）
    # nacos: 使用 Nacos（生产环境推荐）
    type: nacos
    nacos:
      # Nacos 服务器地址
      server-addr: 10.10.1.1:8848
      # 命名空间 ID（如果不填则使用 public 命名空间）
      namespace: ""
      # 分组名称
      group: SEATA_GROUP
      # 集群名称
      cluster: default
      # Nacos 用户名（如果启用了认证）
      username: nacos
      # Nacos 密码（如果启用了认证）
      password: nacos
      # Seata Server 在 Nacos 中的服务名
      application: seata-server
  config:
    # 配置中心类型
    # file: 使用本地文件（开发环境）
    # nacos: 使用 Nacos（生产环境推荐）
    type: nacos
    nacos:
      # Nacos 服务器地址
      server-addr: 10.10.1.1:8848
      # 命名空间 ID（如果不填则使用 public 命名空间）
      namespace: ""
      # 分组名称
      group: SEATA_GROUP
      # Nacos 用户名（如果启用了认证）
      username: nacos
      # Nacos 密码（如果启用了认证）
      password: nacos
      # 配置文件 Data ID（存储在 Nacos 中的配置文件名）
      data-id: seataServer.properties

# =====================================================
# 日志级别配置
# =====================================================
logging:
  level:
    # 根日志级别（默认级别）
    root: INFO
    # Seata 分布式事务日志
    # DEBUG: 查看详细事务流程（开发环境）
    # INFO: 查看关键事务信息（生产环境）
    io.seata: INFO
    # 本服务业务日志（DEBUG 级别查看详细逻辑）
    com.nexusmall.auth: DEBUG
    # MyBatis SQL 日志
    com.nexusmall.auth.dao: DEBUG

# =====================================================
# 应用元信息配置（通过 Actuator /actuator/info 端点查看）
# =====================================================
info:
  app:
    # 应用名称
    name: nexusmall-auth
    # 应用描述
    description: NexusMall 认证服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

