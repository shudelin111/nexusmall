# =====================================================
# NexusMall 认证服务配置文件
# =====================================================
# 模块职责：
# 1. 用户注册、登录、登出
# 2. JWT Token 生成与验证
# 3. 用户权限管理
# 4. OAuth2 第三方登录（预留）
# =====================================================

spring:
  application:
    name: nexusmall-auth
  
  cloud:
    nacos:
      # ===============================
      # 服务注册中心配置
      # ===============================
      discovery:
        # Nacos 服务器地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        # 命名空间 ID（来自 ConfigMap 或 Profile）
        namespace: ${NACOS_NAMESPACE:prod}
        # 服务分组（来自 ConfigMap）
        group: ${NACOS_GROUP:MALL_GROUP}
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
        # 是否启用临时实例（开发环境建议 true）
        ephemeral: true
      
      # ===============================
      # 配置中心配置
      # ===============================
      config:
        # 配置中心地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        # 配置文件格式
        file-extension: yaml
        # 配置分组（来自 ConfigMap）
        group: ${NACOS_GROUP:MALL_GROUP}
        # 命名空间（来自 ConfigMap）
        namespace: ${NACOS_NAMESPACE:prod}
        # Nacos 认证信息（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        # 是否启用配置动态刷新
        refresh-enabled: true
        # 连接超时时间（毫秒）
        timeout: 3000
        # 最大重试次数
        max-retry: 3
        
        # ===============================
        # 共享配置（按需加载，符合最小权限原则）
        # ===============================
        shared-configs:
          # 1. 核心配置（Jackson、文件上传、Tomcat）
          - data-id: nexusmall-common-core.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # 2. 数据库配置（MyBatis-Plus、连接池）
          - data-id: nexusmall-common-database.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # 3. Web 组件配置（Actuator、日志）
          - data-id: nexusmall-common-web.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # 4. MQ 配置（RocketMQ - 用于发送用户注册事件）
          - data-id: nexusmall-common-mq.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
        
        # ===============================
        # 扩展配置（服务专属）
        # ===============================
        extension-configs:
          # auth 服务通用配置（所有环境共享）
          - data-id: nexusmall-auth.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # auth 服务环境特定配置（根据 Profile 动态加载）
          - data-id: nexusmall-auth-${spring.profiles.active}.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
