# =====================================================
# NexusMall 商品服务配置文件
# =====================================================
# 模块职责：
# 1. 商品信息管理（CRUD）
# 2. 商品分类管理
# 3. 品牌管理
# 4. 库存管理（支持分布式事务扣减）
# 5. 商品搜索（预留 Elasticsearch 集成）
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 12000

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-product
    # 应用描述
    description: NexusMall 商品服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# SpringDoc + Knife4j API 文档配置
# ===============================
# 官方文档: https://springdoc.org/ | https://doc.xiaominfo.com/
springdoc:
  # OpenAPI 文档路径
  api-docs:
    # 启用 API 文档 JSON
    enabled: true
    # 访问路径: http://localhost:12000/v3/api-docs
    path: /v3/api-docs
  # Swagger UI 配置
  swagger-ui:
    # 启用 Swagger UI
    enabled: true
    # 访问路径: http://localhost:12000/swagger-ui/index.html
    path: /swagger-ui/index.html
  # 扫描的包路径(可选,默认扫描所有 Controller)
  packages-to-scan: com.nexusmall.product.controller
  # 分组配置(微服务架构下推荐)
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.nexusmall.product.controller

# Knife4j 增强配置
knife4j:
  # 启用 Knife4j 增强功能
  enable: true
  # 生产环境关闭文档(安全考虑)
  production: false
  # 设置文档语言
  setting:
    language: zh_cn
