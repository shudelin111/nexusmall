# =====================================================
# NexusMall 商品服务配置文件
# =====================================================
# 模块职责：
# 1. 商品信息管理（CRUD）
# 2. 商品分类管理
# 3. 品牌管理
# 4. 库存管理（支持分布式事务扣减）
# 5. 商品搜索（预留 Elasticsearch 集成）
# =====================================================

# ===============================
# 统一日志路径配置
# ===============================
nexusmall:
  logging:
    # 统一日志根路径（所有微服务共享）
    # 最终日志路径：${nexusmall.logging.path}/${spring.application.name}/
    # 示例：D:/IdeaProjects/nexusmall/logs/nexusmall-product/
    path: D:/IdeaProjects/nexusmall/logs

# ===============================
# 服务器配置
# ===============================
server:
  port: 12000

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-product
    # 应用描述
    description: NexusMall 商品服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

