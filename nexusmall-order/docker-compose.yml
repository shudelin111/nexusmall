# =====================================================
# NexusMall Order Service - Development Docker Compose
# =====================================================
# 用途：本地开发环境一键启动所有依赖服务
# 包含：Order 服务 + MySQL + Redis + Nacos + RocketMQ
# =====================================================

version: '3.8'

services:
  # ========================================
  # Order 微服务 (主服务)
  # ========================================
  nexusmall-order:
    build:
      context: ..
      dockerfile: nexusmall-order/Dockerfile
    image: nexusmall/nexusmall-order:${TAG:-latest}
    container_name: nexusmall-order
    hostname: nexusmall-order
    restart: unless-stopped
    ports:
      - "11000:11000"  # 应用端口
      - "11001:11001"  # 管理端口
    environment:
      # Spring Boot 配置
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=11000
      - MANAGEMENT_SERVER_PORT=11001
      
      # JVM 参数 (开发环境优化)
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Xdebug -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      
      # Nacos 配置
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_USERNAME=nacos
      - SPRING_CLOUD_NACOS_PASSWORD=nacos
      
      # MySQL 配置
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nexusmall_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root123456
      
      # Redis 配置
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=redis123456
      
      # RocketMQ 配置
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
      
      # Sentinel 配置
      - SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD=sentinel-dashboard:8858
    
    volumes:
      # 挂载日志目录
      - ./logs:/tmp/logs
      # 挂载外部配置文件 (可选)
      - ./config:/app/config:ro
    networks:
      - nexusmall-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # MySQL 数据库
  # ========================================
  mysql:
    image: mysql:8.0.33
    container_name: nexusmall-mysql
    hostname: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_DATABASE=nexusmall_order
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
    networks:
      - nexusmall-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7.2-alpine
    container_name: nexusmall-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=redis123456
      - TZ=Asia/Shanghai
    command: redis-server --requirepass redis123456 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - nexusmall-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "redis123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Nacos 配置中心 & 服务注册
  # ========================================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nexusmall-nacos
    hostname: nacos
    restart: unless-stopped
    ports:
      - "8848:8848"  # HTTP 端口
      - "9848:9848"  # gRPC 端口
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root123456
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=nacos
      - NACOS_AUTH_IDENTITY_VALUE=nacos
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - JVM_XMS=256m
      - JVM_XMX=512m
      - TZ=Asia/Shanghai
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexusmall-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # RocketMQ NameServer
  # ========================================
  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    container_name: nexusmall-rocketmq-namesrv
    hostname: rocketmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT_EXT=-Xms256M -Xmx256M -Xmn128M
      - TZ=Asia/Shanghai
    volumes:
      - rocketmq-namesrv-data:/home/rocketmq/store
      - rocketmq-namesrv-logs:/home/rocketmq/logs
    networks:
      - nexusmall-network
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'status OK' > /dev/tcp/localhost/9876 && echo OK"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # RocketMQ Broker
  # ========================================
  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: nexusmall-rocketmq-broker
    hostname: rocketmq-broker
    restart: unless-stopped
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-Xms512M -Xmx512M -Xmn256M
      - TZ=Asia/Shanghai
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/conf/broker.conf:ro
      - rocketmq-broker-data:/home/rocketmq/store
      - rocketmq-broker-logs:/home/rocketmq/logs
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    networks:
      - nexusmall-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Sentinel Dashboard (熔断限流监控)
  # ========================================
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: nexusmall-sentinel
    hostname: sentinel-dashboard
    restart: unless-stopped
    ports:
      - "8858:8858"
    environment:
      - SENTINEL_DASHBOARD_SERVER_PORT=8858
      - JAVA_OPTS=-Xms128M -Xmx256M
      - TZ=Asia/Shanghai
    volumes:
      - sentinel-logs:/root/logs
    networks:
      - nexusmall-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ========================================
# 网络配置
# ========================================
networks:
  nexusmall-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ========================================
# 数据卷配置
# ========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nacos-data:
    driver: local
  nacos-logs:
    driver: local
  rocketmq-namesrv-data:
    driver: local
  rocketmq-namesrv-logs:
    driver: local
  rocketmq-broker-data:
    driver: local
  rocketmq-broker-logs:
    driver: local
  sentinel-logs:
    driver: local
