# =====================================================
# NexusMall 订单服务配置文件
# =====================================================
# 模块职责：
# 1. 订单创建、查询、取消
# 2. 订单状态管理（待支付/已支付/已发货/已完成）
# 3. 购物车管理
# 4. 订单超时自动取消（延迟队列）
# 5. 分布式事务处理（扣减库存 + 创建订单）
# =====================================================

# ===============================
# 统一日志路径配置
# ===============================
nexusmall:
  logging:
    # 统一日志根路径（所有微服务共享）
    # 最终日志路径：${nexusmall.logging.path}/${spring.application.name}/
    # 示例：D:/IdeaProjects/nexusmall/logs/nexusmall-order/
    path: D:/IdeaProjects/nexusmall/logs

# ===============================
# Spring Boot Actuator 监控配置
# ===============================
# 业界标准配置：暴露 Prometheus 监控端点
management:
  endpoints:
    web:
      # 暴露所有端点（生产环境建议只暴露 health,info,prometheus）
      exposure:
        include: "*"
  # 端点详细配置
  endpoint:
    health:
      # 显示健康检查详情
      show-details: always
    info:
      # 启用 info 端点
      enabled: true
    prometheus:
      # 启用 Prometheus 端点（必需）
      enabled: true
  # 指标监控配置
  metrics:
    # 启用指标收集
    enabled: true
    # 标签配置（用于区分不同微服务）
    tags:
      # 应用名称标签（Prometheus 中通过此标签区分服务）
      application: ${spring.application.name}
    # 导出配置
    export:
      # Prometheus 导出配置
      prometheus:
        # 启用 Prometheus 导出（必需）
        enabled: true

# ===============================
# 服务器配置
# ===============================
server:
  port: 11000

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-order
    # 应用描述
    description: NexusMall 订单服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8
