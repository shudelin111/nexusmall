# =====================================================
# NexusMall 订单服务配置文件
# =====================================================
# 模块职责：
# 1. 订单创建、查询、取消
# 2. 订单状态管理（待支付/已支付/已发货/已完成）
# 3. 购物车管理
# 4. 订单超时自动取消（延迟队列）
# 5. 分布式事务处理（扣减库存 + 创建订单）
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 11000

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-order
    # 应用描述
    description: NexusMall 订单服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8
