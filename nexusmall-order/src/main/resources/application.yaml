# ===============================
# 服务器配置
# ===============================
server:
  port: 11000
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-order
    # 应用描述
    description: NexusMall 订单服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待在请求处理完成
# 2. Kafka Producer 完成消息发送
# 3. 数据库连接正常释放
# 4. Nacos 客户端正常注销
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 优雅关闭超时时间
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒（给日志发送留足时间）
    timeout: 30s

# ===============================
# SpringDoc + Knife4j API 文档配置
# ===============================
# 官方文档: https://springdoc.org/ | https://doc.xiaominfo.com/
springdoc:
  # OpenAPI 文档路径
  api-docs:
    # 启用 API 文档 JSON
    enabled: true
    # 访问路径: http://localhost:11000/v3/api-docs
    path: /v3/api-docs
  # Swagger UI 配置
  swagger-ui:
    # 启用 Swagger UI
    enabled: true
    # 访问路径: http://localhost:11000/swagger-ui/index.html
    path: /swagger-ui/index.html
  # 扫描的包路径(可选,默认扫描所有 Controller)
  packages-to-scan: com.nexusmall.order.controller
  # 分组配置(微服务架构下推荐)
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.nexusmall.order.controller

# Knife4j 增强配置
knife4j:
  # 启用 Knife4j 增强功能
  enable: true
  # 生产环境关闭文档(安全考虑)
  production: false
  # 设置文档语言
  setting:
    language: zh_cn

