spring:
  config:
    import: "optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}"
  profiles:
    active: dev
  application:
    name: nexusmall-order
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://10.10.1.1:3306/nexusmall_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: "123456"
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms
  cloud:
    nacos:
      discovery:
        server-addr: 10.10.1.1:8848 # Nacos 服务器地址
        namespace: public # 命名空间
        group: DEFAULT_GROUP # 分组
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        namespace: ${spring.cloud.nacos.discovery.namespace}
        group: ${spring.cloud.nacos.discovery.group}
        file-extension: yaml # 配置文件格式

# 服务端口
server:
  port: 11000
  address: 0.0.0.0

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.nexusmall.order.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Feign 配置
feign:
  sentinel:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  httpclient:
    enabled: true
  compression:
    request:
      enabled: true
    response:
      enabled: true
# Feign 日志级别
logging:
  level:
    # Seata 日志（生产环境建议 INFO）
    io.seata: DEBUG
    # Feign 调用日志
    com.nexusmall.order.config.FeignConfig: DEBUG
    com.nexusmall.order.feign: DEBUG
    com.nexusmall.common.config.SeataFeignConfig: DEBUG

# Seata 分布式事务配置
seata:
  enabled: true
  application-id: nexusmall-order
  tx-service-group: nexusmall-tx-group
  service:
    vgroup-mapping:
      nexusmall-tx-group: default
    grouplist:
      default: 10.10.1.1:8091
  registry:
    type: file
  config:
    type: file

# RocketMQ 消息队列配置
rocketmq:
  name-server: 10.10.1.1:9876  # NameServer 地址
  producer:
    group: order-producer-group  # 生产者组名
    send-message-timeout: 3000   # 发送超时时间（毫秒）
    retry-times-when-send-failed: 2  # 发送失败重试次数
    retry-times-when-send-async-failed: 2  # 异步发送失败重试次数

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点
  endpoint:
    health:
      show-details: always  # 显示健康检查详情
    info:
      enabled: true  # 启用 info 端点
  info:
    env:
      enabled: true  # 启用环境变量显示

# 应用信息配置
info:
  app.name: nexusmall-order
  app.description: NexusMall 订单服务
  app.version: 0.0.1-SNAPSHOT
  java.version: 1.8
