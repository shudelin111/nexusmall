# =====================================================
# NexusMall Behavior Service - 用户行为日志服务配置
# =====================================================
# 模块职责：
# 1. 接收 RocketMQ 用户行为消息
# 2. 关键行为存储至 MySQL（下单、加购）
# 3. 所有行为发送至 Kafka + Elasticsearch
# 4. 用户行为数据分析与统计
# =====================================================

# ===============================
# 统一日志路径配置
# ===============================
nexusmall:
  logging:
    # 统一日志根路径（所有微服务共享）
    # 最终日志路径：${nexusmall.logging.path}/${spring.application.name}/
    # 示例：D:/IdeaProjects/nexusmall/logs/nexusmall-behavior/
    path: D:/IdeaProjects/nexusmall/logs

# ===============================
# Spring Boot Actuator 监控配置
# ===============================
# 业界标准配置：暴露 Prometheus 监控端点
management:
  endpoints:
    web:
      # 暴露所有端点（生产环境建议只暴露 health,info,prometheus）
      exposure:
        include: "*"
  # 端点详细配置
  endpoint:
    health:
      # 显示健康检查详情
      show-details: always
    info:
      # 启用 info 端点
      enabled: true
    prometheus:
      # 启用 Prometheus 端点（必需）
      enabled: true
  # 指标监控配置
  metrics:
    # 启用指标收集
    enabled: true
    # 标签配置（用于区分不同微服务）
    tags:
      # 应用名称标签（Prometheus 中通过此标签区分服务）
      application: ${spring.application.name}
    # 导出配置
    export:
      # Prometheus 导出配置
      prometheus:
        # 启用 Prometheus 导出（必需）
        enabled: true

spring:
  # ------------------------------
  # 配置导入（从 Nacos 加载配置）
  # ------------------------------
  config:
    # 从 Nacos 配置中心导入配置文件
    # optional: 表示配置可选，Nacos 连接失败时使用本地配置
    import: "optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}"
  
  profiles:
    # 当前运行环境：dev(开发) / test(测试) / prod(生产)
    active: dev
  
  application:
    # 服务名称（微服务 ID）
    # 用于 Nacos 注册中心、配置中心识别此服务
    name: nexusmall-behavior
  
  # ------------------------------
  # Sentinel 熔断限流配置
  # ------------------------------
  sentinel:
    # 启用 Sentinel
    enabled: true
    # 控制台地址（生产环境改为实际 IP）
    transport:
      dashboard: 10.10.1.1:8858
    # 数据源配置（推荐用 Nacos 持久化规则）
    datasource:
      ds1:
        nacos:
          server-addr: ${spring.cloud.nacos.discovery.server-addr}
          dataId: ${spring.application.name}-sentinel
          groupId: DEFAULT_GROUP
          rule-type: flow
  
  # ------------------------------
  # 数据源配置（HikariCP 连接池）
  # ------------------------------
  datasource:
    # MySQL 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # JDBC 连接 URL
    url: jdbc:mysql://10.10.1.1:3306/nexusmall_behavior?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # 数据库用户名
    username: root
    # 数据库密码
    password: ${MYSQL_PASSWORD:123456}
    # 数据源类型：HikariCP
    type: com.zaxxer.hikari.HikariDataSource
    # HikariCP 连接池配置
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 空闲连接超时时间（毫秒）
      idle-timeout: 30000
      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试查询
      connection-test-query: SELECT 1
  
  # ------------------------------
  # Redis 缓存配置
  # ------------------------------
  redis:
    # Redis 服务器地址（支持环境变量覆盖）
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号（0-15）
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}
    # 连接超时时间（毫秒）
    timeout: 5000
    # Lettuce 连接池配置
    lettuce:
      pool:
        # 最大活跃连接数
        max-active: 16
        # 最大空闲连接数
        max-idle: 8
        # 最小空闲连接数
        min-idle: 0
        # 获取连接的最大等待时间（毫秒）
        max-wait: 1000ms
  
  # ------------------------------
  # Elasticsearch 配置
  # ------------------------------
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://10.10.1.1:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
  
  # ------------------------------
  # Kafka 配置
  # ------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:10.10.1.1:31000}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 发送失败后重试次数
      retries: 3
      # 批量发送的数据量
      batch-size: 16384
      # 缓冲区内存大小
      buffer-memory: 33554432
      # 确认模式：all 表示所有副本都确认才算是发送成功
      acks: all
    consumer:
      group-id: behavior-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
      auto-commit-interval: 1000
  
  # ------------------------------
  # Spring Cloud 配置
  # ------------------------------
  cloud:
    nacos:
      # 服务发现配置
      discovery:
        # Nacos 服务器地址
        server-addr: 10.10.1.1:8848
        # 命名空间（用于环境隔离）
        # 注意：public 命名空间在 API 调用时应传空字符串
        namespace: ""
        # 服务分组
        group: DEFAULT_GROUP
        # Nacos 用户名
        username: nacos
        # Nacos 密码
        password: nacos
        
      # 配置中心配置
      config:
        # 配置中心地址
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        # 配置命名空间
        namespace: ${spring.cloud.nacos.discovery.namespace}
        # 配置分组
        group: ${spring.cloud.nacos.discovery.group}
        # Nacos 用户名
        username: ${spring.cloud.nacos.discovery.username}
        # Nacos 密码
        password: ${spring.cloud.nacos.discovery.password}
        # 配置文件后缀名
        file-extension: yaml
    
    # Sentinel 熔断限流配置
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      # 控制台地址（生产环境改为实际 IP）
      transport:
        dashboard: 10.10.1.1:8858
        # 与 Dashboard 通信的端口（0 表示自动选择可用端口）
        port: 8719
      datasource:
        # ===============================
        # 流控规则数据源（控制 QPS 或并发数）
        # ===============================
        ds1:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.nacos.discovery.namespace}
            dataId: nexusmall-behavior-flow-rule.json
            groupId: ${spring.cloud.nacos.discovery.group}
            rule-type: flow
            data-type: json
            # Nacos 认证配置
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}

        # ===============================
        # 熔断降级规则数据源（异常比例/慢调用）
        # ===============================
        ds2:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.nacos.discovery.namespace}
            dataId: nexusmall-behavior-degrade-rule.json
            groupId: ${spring.cloud.nacos.discovery.group}
            rule-type: degrade
            data-type: json
            # Nacos 认证配置
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}

        # ===============================
        # 系统自适应保护规则数据源
        # ===============================
        ds3:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            namespace: ${spring.cloud.nacos.discovery.namespace}
            dataId: nexusmall-behavior-system-rule.json
            groupId: ${spring.cloud.nacos.discovery.group}
            rule-type: system
            data-type: json
            # Nacos 认证配置
            username: ${spring.cloud.nacos.discovery.username}
            password: ${spring.cloud.nacos.discovery.password}

      # Sentinel 日志配置
      log:
        # 日志级别：DEBUG, INFO, WARN, ERROR
        level: DEBUG

# =====================================================
# 服务器配置
# =====================================================
server:
  # 服务监听端口
  port: 12000
  # 监听地址（0.0.0.0 表示可通过任意 IP 访问）
  address: 0.0.0.0
  # URI 编码
  tomcat:
    uri-encoding: UTF-8

# =====================================================
# MyBatis-Plus ORM 配置
# =====================================================
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类别名包路径
  type-aliases-package: com.nexusmall.behavior.entity
  # MyBatis 原生配置
  configuration:
    # 是否开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 是否启用二级缓存
    cache-enabled: false
    # SQL 日志实现类
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# =====================================================
# OpenFeign 服务调用配置
# =====================================================
feign:
  sentinel:
    # 启用 Sentinel 熔断
    enabled: true
  client:
    config:
      default:
        # 连接建立超时时间（毫秒）
        connectTimeout: 5000  # 5 秒
        # 读取数据超时时间（毫秒）
        readTimeout: 5000  # 5 秒

# =====================================================
# Seata 分布式事务配置
# =====================================================
seata:
  # 是否启用 Seata
  enabled: true
  # 应用 ID（用于标识事务发起方）
  application-id: nexusmall-behavior
  # 事务服务组名称
  tx-service-group: nexusmall-tx-group
  service:
    # 事务组映射配置
    vgroup-mapping:
      # 将事务组映射到具体的 Seata Server 集群
      nexusmall-tx-group: default
  registry:
    # 注册中心类型
    # file: 使用本地文件（开发环境）
    # nacos: 使用 Nacos（生产环境推荐）
    type: nacos
    nacos:
      # Nacos 服务器地址
      server-addr: 10.10.1.1:8848
      # 命名空间 ID（如果不填则使用 public 命名空间）
      namespace: ""
      # 分组名称
      group: SEATA_GROUP
      # 集群名称
      cluster: default
      # Nacos 用户名（如果启用了认证）
      username: nacos
      # Nacos 密码（如果启用了认证）
      password: nacos
      # Seata Server 在 Nacos 中的服务名
      application: seata-server
  config:
    # 配置中心类型
    # file: 使用本地文件（开发环境）
    # nacos: 使用 Nacos（生产环境推荐）
    type: nacos
    nacos:
      # Nacos 服务器地址
      server-addr: 10.10.1.1:8848
      # 命名空间 ID（如果不填则使用 public 命名空间）
      namespace: ""
      # 分组名称
      group: SEATA_GROUP
      # Nacos 用户名（如果启用了认证）
      username: nacos
      # Nacos 密码（如果启用了认证）
      password: nacos
      # 配置文件 Data ID（存储在 Nacos 中的配置文件名）
      data-id: seataServer.properties

# =====================================================
# RocketMQ 消息队列配置
# =====================================================
rocketmq:
  # NameServer 地址（RocketMQ 的注册中心）
  name-server: ${ROCKETMQ_NAME_SERVER:10.10.1.1:9876}
  
  # 生产者配置
  producer:
    # 生产者组名称
    group: behavior-service-producer
    # 发送消息超时时间（毫秒）
    send-message-timeout: 3000  # 3 秒
    # 同步发送失败重试次数
    retry-times-when-send-failed: 2
    # 异步发送失败重试次数
    retry-times-when-send-async-failed: 2

# =====================================================
# 日志级别配置
# =====================================================
logging:
  level:
    # 根日志级别（默认级别）
    root: INFO
    # Seata 分布式事务日志
    io.seata: INFO
    # 本服务业务日志（DEBUG 级别查看详细逻辑）
    com.nexusmall.behavior: DEBUG
    # MyBatis SQL 日志
    com.nexusmall.behavior.dao: DEBUG
    # RocketMQ 日志
    org.apache.rocketmq: INFO
    # Kafka 日志
    org.springframework.kafka: INFO
    # Elasticsearch 日志
    org.springframework.data.elasticsearch: WARN

# =====================================================
# 应用元信息配置
# =====================================================
info:
  app:
    # 应用名称
    name: nexusmall-behavior
    # 应用描述
    description: NexusMall 用户行为日志服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8
