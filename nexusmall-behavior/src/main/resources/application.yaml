# =====================================================
# NexusMall Behavior Service - 用户行为日志服务配置
# =====================================================
# 模块职责：
# 1. 接收 RocketMQ 用户行为消息
# 2. 关键行为存储至 MySQL（下单、加购）
# 3. 所有行为发送至 Kafka + Elasticsearch
# 4. 用户行为数据分析与统计
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 14000
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-behavior
    # 应用描述
    description: NexusMall 用户行为日志服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待在请求处理完成
# 2. Kafka/RocketMQ Producer 完成消息发送
# 3. 数据库连接正常释放
# 4. Nacos 客户端正常注销
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 每个关闭阶段的超时时间（Spring Boot 2.3+ 标准配置）
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒（给日志发送留足时间）
    timeout-per-shutdown-phase: 30s
