# =====================================================
# NexusMall Inventory Service - Local Configuration
# 库存服务本地配置
# =====================================================
# 说明：
# - 大部分配置已迁移到 Nacos 配置中心
# - 此文件仅保留无法外部化的本地配置
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 13000
  address: 0.0.0.0
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待在请求处理完成
# 2. RocketMQ Producer 完成消息发送
# 3. 数据库连接正常释放
# 4. Nacos 客户端正常注销
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 每个关闭阶段的超时时间（Spring Boot 2.3+ 标准配置）
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒（给日志发送留足时间）
    timeout-per-shutdown-phase: 30s
