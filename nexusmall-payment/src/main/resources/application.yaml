# =====================================================
# NexusMall 支付服务配置文件
# =====================================================
# 模块职责：
# 1. 支付单管理（创建、查询、状态更新）
# 2. 支付渠道集成（支付宝、微信支付、银联等）
# 3. 支付回调处理
# 4. 退款管理
# 5. 对账功能
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 15000
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-payment
    # 应用描述
    description: NexusMall 支付服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待在请求处理完成
# 2. RocketMQ Producer 完成消息发送
# 3. 数据库连接正常释放
# 4. Nacos 客户端正常注销
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 每个关闭阶段的超时时间（Spring Boot 2.3+ 标准配置）
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒（给日志发送留足时间）
    timeout-per-shutdown-phase: 30s
