# =====================================================
# NexusMall 通知服务配置文件
# =====================================================
# 模块职责：
# 1. 站内消息管理（系统通知/订单状态/营销活动）
# 2. 短信发送（验证码/订单提醒/营销短信）
# 3. 邮件发送（注册验证/订单确认/找回密码）
# 4. 推送通知（APP Push/微信模板消息）
# 5. 消息模板管理
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 14000
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-notification
    # 应用描述
    description: NexusMall 通知服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待在请求处理完成
# 2. RocketMQ Producer 完成消息发送
# 3. 数据库连接正常释放
# 4. Nacos 客户端正常注销
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 每个关闭阶段的超时时间（Spring Boot 2.3+ 标准配置）
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒（给日志发送留足时间）
    timeout-per-shutdown-phase: 30s
