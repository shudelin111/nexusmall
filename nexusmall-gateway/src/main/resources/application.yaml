spring:
  profiles:
    active: dev
  application:
    name: nexusmall-gateway
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms
  cloud:
    nacos:
      discovery:
        server-addr: 10.10.1.1:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: http://localhost:8000
          predicates:
            - Path=/auth/**
          filters:
            - PreserveHostHeader
        - id: product-service
          uri: http://localhost:10000
          predicates:
            - Path=/product/**
          filters:
            - PreserveHostHeader
        - id: order-service
          uri: http://localhost:11000
          predicates:
            - Path=/order/**
          filters:
            - PreserveHostHeader
      globalcors:
        cors-configurations:
          '[/**]':
            # 如果你的前端需要带 Cookie 或 Token 访问后端，请这样改：使用 allowedOriginPatterns: "*" 可以绕过浏览器的通配符限制，同时保持 allowCredentials: true。
            # 不要用 allowedOrigins，改用 allowedOriginPatterns
            allowedOriginPatterns: "*"
            # allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            # 如果你通过 Header（如 Authorization: Bearer xxx）传 Token，且不需要 Cookie，可以直接关掉凭证：
            # allowCredentials: false
            # allowedOrigins: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点
  endpoint:
    health:
      show-details: always  # 显示健康检查详情
    info:
      enabled: true  # 启用 info 端点
  info:
    env:
      enabled: true  # 启用环境变量显示

# 应用信息配置
info:
  app.name: nexusmall-gateway
  app.description: NexusMall 网关服务
  app.version: 0.0.1-SNAPSHOT
  java.version: 1.8

security:
  jwt:
    secret-key: mySecretKeyForJWTGenerationAndValidation
    expire-time-in-ms: 86400000

server:
  port: 88
  address: 0.0.0.0

logging:
  level:
    root: INFO
    com.nexusmall.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.http.server.reactive: DEBUG
    org.springframework.security: DEBUG
