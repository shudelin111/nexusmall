spring:
  profiles:
    active: dev
  application:
    name: nexusmall-gateway
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://nexusmall-auth
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: lb://nexusmall-product
          predicates:
            - Path=/product/**
        - id: order-service
          uri: lb://nexusmall-order
          predicates:
            - Path=/order/**
      globalcors:
        cors-configurations:
          '[/**]':
            # 如果你的前端需要带 Cookie 或 Token 访问后端，请这样改：使用 allowedOriginPatterns: "*" 可以绕过浏览器的通配符限制，同时保持 allowCredentials: true。
            # 不要用 allowedOrigins，改用 allowedOriginPatterns
            allowedOriginPatterns: "*"
            # allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            # 如果你通过 Header（如 Authorization: Bearer xxx）传 Token，且不需要 Cookie，可以直接关掉凭证：
            # allowCredentials: false
            # allowedOrigins: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

security:
  jwt:
    secret-key: mySecretKeyForJWTGenerationAndValidation
    expire-time-in-ms: 86400000

server:
  port: 88
