# =====================================================
# NexusMall 网关服务配置文件
# =====================================================
# 模块职责：
# 1. 统一入口：所有外部请求的流量入口
# 2. 路由转发：根据路径将请求转发到对应微服务
# 3. 身份认证：JWT Token 验证
# 4. 限流熔断：保护后端服务（需集成 Sentinel）
# 5. 跨域处理：解决前后端分离的跨域问题
# =====================================================

# =====================================================
# Actuator 监控端点配置
# =====================================================
management:
  endpoints:
    web:
      # 暴露所有端点（生产环境建议只暴露 health,info,prometheus,gateway）
      exposure:
        include: "*"
  # 端点详细配置
  endpoint:
    health:
      # 健康检查详情显示级别
      show-details: always  # 显示详细信息
    info:
      # 是否启用 info 端点
      enabled: true  # 显示应用信息
    prometheus:
      # 启用 Prometheus 端点（必需）
      enabled: true
  # 指标监控配置
  metrics:
    # 启用指标收集
    enabled: true
    # 标签配置（用于区分不同微服务）
    tags:
      # 应用名称标签（Prometheus 中通过此标签区分服务）
      application: ${spring.application.name}
    # 导出配置
    export:
      # Prometheus 导出配置
      prometheus:
        # 启用 Prometheus 导出（必需）
        enabled: true
  info:
    env:
      # 是否在 info 端点中显示环境变量
      enabled: true

spring:
  profiles:
    # 当前运行环境：dev(开发) / test(测试) / prod(生产)
    active: dev
  
  application:
    # 服务名称（注册到 Nacos）
    name: nexusmall-gateway
  
  # ------------------------------
  # Redis 配置（用于 JWT 黑名单、限流计数器等）
  # ------------------------------
  redis:
    # Redis 服务器地址（支持环境变量覆盖）
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号（0-15）
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}
    # 连接超时时间（毫秒）
    timeout: 5000  # 5 秒
    # Lettuce 连接池配置
    lettuce:
      pool:
        # 最大活跃连接数
        max-active: 16
        # 最大空闲连接数
        max-idle: 8
        # 最小空闲连接数
        min-idle: 0
        # 获取连接的最大等待时间（毫秒）
        max-wait: 1000ms  # 1 秒
  
  # ------------------------------
  # Spring Cloud Gateway 核心配置
  # ------------------------------
  cloud:
    # Sentinel 熔断限流配置
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      # 控制台地址（生产环境改为实际 IP）
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        # 与 Dashboard 通信的端口（0 表示自动选择可用端口）
        port: 8719
      datasource:
        # ===============================
        # 流控规则数据源（控制 QPS 或并发数）
        # ===============================
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:prod}
            dataId: nexusmall-gateway-flow-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: flow
            data-type: json
            # Nacos 认证配置
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # ===============================
        # 熔断降级规则数据源（异常比例/慢调用）
        # ===============================
        ds2:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:prod}
            dataId: nexusmall-gateway-degrade-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: degrade
            data-type: json
            # Nacos 认证配置
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # ===============================
        # 系统自适应保护规则数据源
        # ===============================
        ds3:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:prod}
            dataId: nexusmall-gateway-system-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: system
            data-type: json
            # Nacos 认证配置
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

      # Sentinel 日志配置
      log:
        # 日志级别：DEBUG, INFO, WARN, ERROR
        level: DEBUG
    
    nacos:
      discovery:
        # Nacos 服务发现地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        # 命名空间（必须与微服务注册的命名空间一致）
        # "" 表示 public 命名空间
        # 如果微服务使用其他命名空间，需要填写对应的命名空间 ID
        namespace: ${NACOS_NAMESPACE:prod}
        # 服务分组（必须与微服务注册的分组一致）
        group: ${NACOS_GROUP:MALL_GROUP}
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
      
      # 配置中心配置（从 Nacos 读取配置）
      config:
        # 配置中心地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        # 配置命名空间（来自 ConfigMap）
        namespace: ${NACOS_NAMESPACE:prod}
        # 配置分组（来自 ConfigMap）
        group: ${NACOS_GROUP:MALL_GROUP}
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
        # 配置文件后缀名
        file-extension: yaml
    
    gateway:
      # 服务发现相关配置
      discovery:
        locator:
          # 是否启用从注册中心自动发现服务并创建路由
          # true: 可以通过 http://gateway/服务名/路径 访问任意已注册的服务
          enabled: true
          # 是否使用小写的服务 ID
          # true: 服务名自动转为小写（避免大小写不一致问题）
          lower-case-service-id: true
      
      # 路由规则配置（核心功能）
      # ===============================
      routes:
        # 路由 1：订单服务（使用 Nacos 服务发现）
        # ===============================
        - id: order-service
          uri: lb://nexusmall-order  # 通过 Nacos 负载均衡
          predicates:
            - Path=/order/**
          filters:
            # 路径重写：去掉 /order 前缀，转发到下游服务
            # /order/ping -> /ping
            # /order/v3/api-docs -> /v3/api-docs
            - RewritePath=/order/(?<segment>.*), /$\{segment}
            - PreserveHostHeader

        # 路由 2：认证服务（使用 Nacos 服务发现）
        # ===============================
        - id: auth-service
          uri: lb://nexusmall-auth  # 通过 Nacos 负载均衡
          predicates:
            - Path=/auth/**
          filters:
            # 路径重写：去掉 /auth 前缀
            # /auth/login -> /login
            # /auth/logout -> /logout
            - RewritePath=/auth/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 3：商品服务（使用 Nacos 服务发现）
        # ===============================
        - id: product-service
          uri: lb://nexusmall-product  # 通过 Nacos 负载均衡
          predicates:
            - Path=/product/**
          filters:
            # 路径重写：去掉 /product 前缀
            # /product/v3/api-docs -> /v3/api-docs
            - RewritePath=/product/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 4：会员服务（使用 Nacos 服务发现）
        # ===============================
        - id: member-service
          uri: lb://nexusmall-member  # 通过 Nacos 负载均衡
          predicates:
            - Path=/member/**
          filters:
            # 路径重写：去掉 /member 前缀
            # /member/info -> /info
            # /member/addresses -> /addresses
            - RewritePath=/member/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 5：支付服务（使用 Nacos 服务发现）
        # ===============================
        - id: payment-service
          uri: lb://nexusmall-payment  # 通过 Nacos 负载均衡
          predicates:
            - Path=/payment/**
          filters:
            # 路径重写：去掉 /payment 前缀
            # /payment/create -> /create
            # /payment/refunds/apply -> /refunds/apply
            - RewritePath=/payment/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 6：购物车服务（使用 Nacos 服务发现）
        # ===============================
        - id: cart-service
          uri: lb://nexusmall-cart  # 通过 Nacos 负载均衡
          predicates:
            - Path=/cart/**
          filters:
            # 路径重写：去掉 /cart 前缀
            # /cart/items -> /items
            # /cart/items/{skuId} -> /items/{skuId}
            - RewritePath=/cart/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 7：行为服务（使用 Nacos 服务发现）
        # ===============================
        - id: behavior-service
          uri: lb://nexusmall-behavior  # 通过 Nacos 负载均衡
          predicates:
            - Path=/behavior/**
          filters:
            # 路径重写：去掉 /behavior 前缀
            # /behavior/logs -> /logs
            - RewritePath=/behavior/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 8：第三方服务（使用 Nacos 服务发现）
        # ===============================
        - id: third-party-service
          uri: lb://nexusmall-third-party  # 通过 Nacos 负载均衡
          predicates:
            - Path=/third-party/**
          filters:
            # 路径重写：去掉 /third-party 前缀
            # /third-party/upload -> /upload
            # /third-party/sms/send -> /sms/send
            - RewritePath=/third-party/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 9：库存服务（使用 Nacos 服务发现）
        # ===============================
        - id: inventory-service
          uri: lb://nexusmall-inventory  # 通过 Nacos 负载均衡
          predicates:
            - Path=/inventory/**
          filters:
            # 路径重写：/inventory/stocks -> /stocks, /inventory/stocks/123 -> /stocks/123
            # RESTful风格：保留完整的资源路径
            - RewritePath=/inventory/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 路由 10：营销服务（使用 Nacos 服务发现）
        # ===============================
        - id: promotion-service
          uri: lb://nexusmall-promotion  # 通过 Nacos 负载均衡
          predicates:
            - Path=/promotion/**
          filters:
            # 路径重写：/promotion/coupons -> /coupons, /promotion/coupons/123 -> /coupons/123
            # RESTful风格：保留完整的资源路径
            - RewritePath=/promotion/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
      
      # 跨域资源共享（CORS）配置
      globalcors:
        cors-configurations:
          # 对所有路径生效
          '[/**]':
            # 允许的源（前端地址）
            # ⚠️ 重要说明：
            # allowedOrigins: "*" 与 allowCredentials: true 不能同时使用（浏览器限制）
            # 解决方案：使用 allowedOriginPatterns: "*" 绕过此限制
            # 如果你的前端需要带 Cookie 或 Token 访问后端，必须这样配置
            allowedOriginPatterns: "*"
            # 允许的 HTTP 方法
            allowedMethods: "*"  # GET, POST, PUT, DELETE, OPTIONS 等
            # 允许的请求头
            allowedHeaders: "*"  # Content-Type, Authorization 等
            # 是否允许携带凭证（Cookie、Authorization headers 等）
            # true: 允许（适用于需要登录的场景）
            # false: 不允许（适用于公开 API）
            allowCredentials: true

  # =====================================================
  # Spring Cloud Sleuth 链路追踪配置
  # =====================================================
  # 官方文档: https://docs.spring.io/spring-cloud-sleuth/docs/3.1.x/reference/html/
  # 注意：Sleuth 配置在 spring 级别（不是 spring.cloud 下）
  sleuth:
    # 启用链路追踪
    enabled: true
    # 采样率（开发环境 100%，生产环境建议 0.1）
    sampler:
      probability: 1.0
    # Baggage 配置（自定义传递字段）
    # 注意：使用 baggage.remote-fields 而不是 baggage-keys
    baggage:
      # 远程传播字段（跨服务传递 HTTP Header）
      remote-fields:
        - user-id
        - request-id
      # 日志关联字段（在 MDC 中显示，方便日志检索）
      correlation-fields:
        - user-id
        - request-id
    # 传播类型（支持 B3 和 W3C 标准）
    propagation:
      type: B3,W3C

  # =====================================================
  # Zipkin 链路追踪可视化配置
  # =====================================================
  # 注意：Zipkin 配置也在 spring 级别（不是 spring.cloud 下）
  zipkin:
    # Zipkin Server 地址
    base-url: http://localhost:9411
    # 启用 Zipkin
    # true: 发送追踪数据到 Zipkin Server（需要 Zipkin 运行）
    # false: 禁用 Zipkin，不发送数据（开发环境推荐）
    enabled: false
    # 发送方式
    sender:
      type: web

# =====================================================
# 服务器配置
# =====================================================
server:
  # 网关服务端口（整个系统的统一入口）
  port: 9000
  # 监听地址
  address: 0.0.0.0

# =====================================================
# 安全配置（JWT 相关）
# =====================================================
#security:
#  jwt:
#    # JWT 签名密钥
#    secret-key: mySecretKeyForJWTGenerationAndValidation
#    # Token 过期时间（毫秒）
#    expire-time-in-ms: 86400000
# =====================================================
# NexusMall Gateway - JWT Configuration
# =====================================================
# 说明：
# 1. 此配置应存入 Nacos 配置中心
# 2. Data ID: nexusmall-gateway.yaml
# 3. Group: DEFAULT_GROUP
# =====================================================

security:
  jwt:
    rsa:
      # RSA 公钥 (PEM 格式) - 与 auth 服务的公钥一致
      public-key: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEArCCkHxMtFQVXocqNfUal
        vy6ra77FyJmK3jFKIlcBNlXvWjzoJr8zbPh2COrkxRNpxWg2v4Htsva/jTboop4M
        8XOWb+16Fyjk+y/4be/UBaHB1NLqCkuHglihQHZMJjONAxIN66VyzkLgEymqxS57
        3cZfbyUiFzhjXfoU50MPbT630qwWCuzWF9NPFShVaIhsEg2dtL6YSBlg56QIhlTT
        RvN71nPnV97tUrdHALCrio0GIfnGT3VW3iZdkloGHzKdzA0O5r+uLsbPRDxuQyoh
        T254rLgY1m1wcVyqqe397j45SW+JZz1XtU6fUNa7o9WjsMuTlR70vVxPqupETH5H
        fwIDAQAB
        -----END PUBLIC KEY-----

      # JWT 签发者标识 (必须与 auth 服务一致)
      issuer: nexusmall-auth

      # JWT 受众标识 (必须与 auth 服务一致)
      audience: nexusmall-services

# =====================================================
# 日志级别配置
# =====================================================
logging:
  level:
    # 根日志级别（默认级别）
    root: INFO
    # 网关业务日志（DEBUG 级别查看详细逻辑）
    com.nexusmall.gateway: DEBUG
    # Spring Cloud Gateway 框架日志
    org.springframework.cloud.gateway: DEBUG
    # HTTP 响应式服务器日志（查看底层通信）
    org.springframework.http.server.reactive: DEBUG
    # Spring Security 安全框架日志
    org.springframework.security: DEBUG
    # Sleuth 链路追踪日志
    org.springframework.cloud.sleuth: DEBUG
    # Brave（Sleuth 底层库）日志
    brave: DEBUG
  # 注意：日志格式已在 nexusmall-common 的 logback-spring.xml 中统一配置
  # 包含 traceId 和 spanId，所有微服务自动继承

# =====================================================
# 应用元信息配置
# =====================================================
info:
  app:
    # 应用名称
    name: nexusmall-gateway
    # 应用描述
    description: NexusMall 网关服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Knife4j Gateway 聚合配置
# ===============================
# 官方文档: https://doc.xiaominfo.com/docs/guides/microservice/spring-cloud-gateway/
# 版本: knife4j-gateway-spring-boot-starter 4.3.0
knife4j:
  # 启用 Gateway 聚合模式
  gateway:
    enabled: true
    # 策略：discover - 从 Nacos 自动发现服务并聚合
    strategy: discover
    # Discover 策略配置（官方标准格式）
    discover:
      # 开启服务发现
      enabled: true
      # 文档版本（必须指定）
      version: openapi3
      # 排除的服务（排除没有 Swagger 的服务和 Gateway 自身）
      # 注意：excluded-services 必须是逗号分隔的字符串，不能是 YAML 数组
      excluded-services: nexusmall-gateway,nexusmall-auth
  # 生产环境关闭文档(安全考虑)
  production: false
