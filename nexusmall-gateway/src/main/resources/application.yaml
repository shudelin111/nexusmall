# =====================================================
# NexusMall Gateway Service - Local Configuration
# 网关服务本地配置
# =====================================================
# 说明：
# - 大部分配置已迁移到 Nacos 配置中心
# - 此文件仅保留无法外部化的本地配置
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 9000
  address: 0.0.0.0
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-gateway
    # 应用描述
    description: NexusMall API 网关服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待正在处理的请求完成
# 2. Nacos 客户端正常注销
# 3. 监控端点正常关闭
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 每个关闭阶段的超时时间（Spring Boot 2.3+ 标准配置）
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒
    timeout-per-shutdown-phase: 30s
