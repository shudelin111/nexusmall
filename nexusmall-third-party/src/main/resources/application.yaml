# =====================================================
# NexusMall 第三方服务集成模块配置文件
# =====================================================
# 模块职责：
# 1. 短信服务（阿里云/腾讯云/华为云）
# 2. 支付服务（支付宝/微信支付/银联）
# 3. 对象存储（七牛云/阿里云 OSS/腾讯云 COS）
# 4. 邮件服务（预留）
# 5. 物流查询（预留）
# =====================================================

# ===============================
# 统一日志路径配置
# ===============================
nexusmall:
  logging:
    # 统一日志根路径（所有微服务共享）
    # 最终日志路径：${nexusmall.logging.path}/${spring.application.name}/
    # 示例：D:/IdeaProjects/nexusmall/logs/nexusmall-third-party/
    path: D:/IdeaProjects/nexusmall/logs

# ===============================
# Spring Boot Actuator 监控配置
# ===============================
# 业界标准配置：暴露 Prometheus 监控端点
management:
  endpoints:
    web:
      # 暴露所有端点（生产环境建议只暴露 health,info,prometheus）
      exposure:
        include: "*"
  # 端点详细配置
  endpoint:
    health:
      # 显示健康检查详情
      show-details: always
    info:
      # 启用 info 端点
      enabled: true
    prometheus:
      # 启用 Prometheus 端点（必需）
      enabled: true
  # 指标监控配置
  metrics:
    # 启用指标收集
    enabled: true
    # 标签配置（用于区分不同微服务）
    tags:
      # 应用名称标签（Prometheus 中通过此标签区分服务）
      application: ${spring.application.name}
    # 导出配置
    export:
      # Prometheus 导出配置
      prometheus:
        # 启用 Prometheus 导出（必需）
        enabled: true

# ===============================
# 基础 Spring 配置
# ===============================
spring:
  # ------------------------------
  # 配置导入（从 Nacos 加载配置）
  # ------------------------------
  config:
    # 从 Nacos 配置中心导入配置文件
    # optional: 表示配置可选，Nacos 连接失败时使用本地配置
    import: "optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}"
  
  profiles:
    # 当前运行环境：dev(开发) / test(测试) / prod(生产)
    # 💡 建议：生产环境通过启动参数覆盖，如 --spring.profiles.active=prod
    active: dev
  
  application:
    # 服务名称（注册到 Nacos，也会用于日志目录名）
    name: nexusmall-third-party
  
  # ------------------------------
  # Redis 连接配置
  # ------------------------------
  # 用途说明：
  # 1. 缓存验证码
  # 2. 幂等性控制（防止重复提交）
  # 3. 分布式锁
  # 4. 临时数据存储
  redis:
    # Redis 主机地址
    # 💡 支持环境变量替换：${REDIS_HOST}
    # 冒号后的值为默认值（当环境变量不存在时使用）
    host: ${REDIS_HOST:10.10.1.1}
    
    # Redis 端口
    port: ${REDIS_PORT:6379}
    
    # Redis 数据库编号（0-15）
    # 💡 建议：不同业务使用不同数据库，实现数据隔离
    # 示例：0-用户，1-订单，2-商品，3-缓存
    database: ${REDIS_DATABASE:0}
    
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}
    
    # 连接超时时间（毫秒）
    timeout: 5000  # 5 秒
    
    # Lettuce 连接池配置
    # Lettuce 是 Spring Boot 默认的 Redis 客户端（基于 Netty）
    lettuce:
      pool:
        # 最大连接数（含正在使用和空闲的连接）
        # 💡 建议值：根据并发量调整，公式：CPU 核心数 * 2 + 1
        max-active: 16
        
        # 最大空闲连接数
        # 💡 含义：池中保持多少空闲连接以备不时之需
        max-idle: 8
        
        # 最小空闲连接数
        # 💡 含义：即使没有请求，池中也至少保持多少空闲连接
        min-idle: 0
        
        # 从连接池获取连接的最大等待时间（毫秒）
        # 💡 -1: 永久等待；0: 立即返回；>0: 等待指定时间
        max-wait: 1000ms  # 1 秒
  
  # ------------------------------
  # Spring Cloud 配置
  # ------------------------------
  cloud:
    # Sentinel 熔断限流配置
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      # 控制台地址（生产环境改为实际 IP）
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        # 与 Dashboard 通信的端口（0 表示自动选择可用端口）
        port: 8719
      datasource:
        # ===============================
        # 流控规则数据源（控制 QPS 或并发数）
        # ===============================
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:prod}
            dataId: nexusmall-third-party-flow-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: flow
            data-type: json
            # Nacos 认证配置
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # ===============================
        # 熔断降级规则数据源（异常比例/慢调用）
        # ===============================
        ds2:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:prod}
            dataId: nexusmall-third-party-degrade-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: degrade
            data-type: json
            # Nacos 认证配置
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # ===============================
        # 系统自适应保护规则数据源
        # ===============================
        ds3:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:prod}
            dataId: nexusmall-third-party-system-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: system
            data-type: json
            # Nacos 认证配置
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

      # Sentinel 日志配置
      log:
        # 日志级别：DEBUG, INFO, WARN, ERROR
        level: DEBUG
    
    nacos:
      # 服务发现配置（注册到 Nacos）
      discovery:
        # Nacos 服务器地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        
        # Nacos 命名空间（来自 ConfigMap 或 Profile）
        # 💡 用途：用于隔离不同环境或业务线
        # public: 默认命名空间
        # 💡 最佳实践：
        #   - 开发环境：dev-namespace
        #   - 测试环境：test-namespace
        #   - 生产环境：prod-namespace
        # 注意：public 命名空间在 API 调用时应传空字符串
        namespace: ${NACOS_NAMESPACE:prod}
        
        # 服务分组（来自 ConfigMap）
        # 💡 用途：区分同一服务的不同版本或业务组
        group: ${NACOS_GROUP:MALL_GROUP}
        
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
      
      # 配置中心配置（从 Nacos 读取配置）
      config:
        # 配置中心地址（来自 ConfigMap）
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        
        # 配置命名空间（来自 ConfigMap）
        namespace: ${NACOS_NAMESPACE:prod}
        
        # 配置分组（来自 ConfigMap）
        group: ${NACOS_GROUP:MALL_GROUP}
        
        # Nacos 用户名（来自 Secret）
        username: ${NACOS_USERNAME:nacos}
        
        # Nacos 密码（来自 Secret）
        password: ${NACOS_PASSWORD:nacos}
        
        # 配置文件后缀名
        # 💡 dataId 格式：{应用名}.{后缀}
        # 示例：nexusmall-third-party.yaml
        file-extension: yaml

# ===============================
# MinIO 对象存储配置
# ===============================
minio:
  # MinIO 服务访问地址
  # 💡 格式：http://host:port
  # 💡 开发环境默认值：http://localhost:9000
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  
  # MinIO 访问凭证
  # 💡 AccessKey（类似用户名）
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  # 💡 SecretKey（类似密码）
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  
  # 默认存储桶名称
  bucket-name: ${MINIO_BUCKET:nexusmall}
  
  # 是否自动创建存储桶
  # 💡 true: 开发环境方便调试
  # 💡 false: 生产环境提高安全性
  # ⚠️ 注意：如果 MinIO 未部署，请设置为 false
  auto-create-bucket: false
  
  # 文件上传最大大小（字节）
  # 💡 默认：104857600 (100MB)
  max-file-size: 104857600
  
  # 允许上传的文件后缀名列表
  # 💡 用于安全校验，防止上传危险文件
  allowed-extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .bmp
    - .webp
    - .svg
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
    - .ppt
    - .pptx
    - .txt
    - .md
    - .zip
    - .rar
    - .7z
    - .mp3
    - .wav
    - .mp4
    - .avi
    - .mov

# ===============================
# 服务器监听端口
# ===============================
server:
  # 服务监听端口
  port: 13000
  
  # 监听地址
  address: 0.0.0.0

# ===============================
# RocketMQ 配置
# ===============================
rocketmq:
  # NameServer 地址
  # 💡 格式：ip:port;ip:port（支持集群，用分号分隔）
  name-server: ${ROCKETMQ_NAME_SERVER:10.10.1.1:9876}
  
  # 生产者配置
  producer:
    # 生产者组名称
    # 💡 用途：标识一类生产者（通常按服务维度划分）
    group: third-party-producer-group
    
    # 发送消息超时时间（毫秒）
    send-message-timeout: 3000  # 3 秒

# ===============================
# 第三方服务业务配置
# ===============================
third-party:
  # ------------------------------
  # 短信服务配置
  # ------------------------------
  sms:
    # 是否启用短信能力
    # 💡 false 时不会装配短信客户端（节省资源）
    enabled: true
    
    # 短信服务商
    # 💡 可选值：aliyun（阿里云）/ tencent（腾讯云）/ huawei（华为云）
    provider: aliyun
    
    # 阿里云短信参数（provider=aliyun 时使用）
    aliyun:
      # 短信服务地域
      # 💡 常用值：cn-hangzhou（杭州）、cn-shanghai（上海）
      # 💡 选择离你用户最近的地域可降低延迟
      region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
      
      # 阿里云访问凭证（AccessKey）
      # 💡 获取方式：阿里云控制台 -> 用户信息管理
      # 💡 安全建议：生产环境使用环境变量或配置中心管理，不要硬编码
      access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
      
      # 短信签名（控制台已审核通过）
      # 💡 示例：【NexusMall 商城】
      sign-name: ${ALIYUN_SMS_SIGN_NAME:}
      
      # 短信模板 CODE（控制台已审核通过）
      # 💡 示例：SMS_123456789
      # 💡 模板内容示例："您的验证码是${code}，5 分钟内有效"
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
  
  # ------------------------------
  # 支付服务配置
  # ------------------------------
  payment:
    # 是否启用支付能力
    enabled: true
    
    # 启用的支付渠道列表
    # 💡 后续可按需扩展各渠道的详细参数
    providers:
      - alipay    # 支付宝
      - wechatpay # 微信支付
      - unionpay  # 银联支付
  
  # ------------------------------
  # 对象存储配置
  # ------------------------------
  storage:
    # 是否启用对象存储能力
    # 💡 false 时不会装配存储客户端
    # ⚠️ 如果 MinIO 未部署，请设置为 false
    enabled: false
    
    # 存储服务商
    # 💡 可选值：qiniu（七牛云）/ aliyun-oss（阿里云 OSS）/ tencent-cos（腾讯云 COS）/ minio（MinIO）
    provider: minio
    
    # MinIO 对象存储参数（provider=minio 时使用）
    minio:
      # MinIO 服务访问地址
      # 💡 格式：http://host:port
      # 💡 开发环境默认值：http://localhost:9000
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      
      # MinIO 访问凭证
      # 💡 AccessKey（类似用户名）
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      # 💡 SecretKey（类似密码）
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      
      # 默认 Bucket 名称
      bucket-name: ${MINIO_BUCKET:nexusmall}
    
    # 阿里云 OSS 参数（provider=aliyun-oss 时使用）
    aliyun-oss:
      # OSS 访问地址（Endpoint）
      # 💡 格式：oss-{地域}.aliyuncs.com
      # 💡 示例：oss-cn-hangzhou.aliyuncs.com
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      
      # 阿里云访问凭证（与短信共用 AccessKey）
      access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
      
      # Bucket 名称（存储空间名称）
      # 💡 全局唯一，类似域名命名规则
      bucket-name: ${ALIYUN_OSS_BUCKET:}

# ===============================
# 日志级别配置
# ===============================
logging:
  level:
    # 根日志级别（默认级别）
    root: INFO
    # 本服务业务日志（DEBUG 级别查看详细逻辑）
    com.nexusmall.thirdparty: DEBUG
    # RocketMQ 日志
    org.apache.rocketmq: INFO

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-third-party
    # 应用描述
    description: NexusMall 第三方服务集成模块
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8
