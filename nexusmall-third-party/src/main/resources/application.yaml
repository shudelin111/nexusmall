spring:
  profiles:
    active: dev
  application:
    name: nexusmall-third-party
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:}
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848 # Nacos服务器地址
        namespace: public # 命名空间
        group: DEFAULT_GROUP # 分组
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        namespace: ${spring.cloud.nacos.discovery.namespace}
        group: ${spring.cloud.nacos.discovery.group}
        file-extension: yaml # 配置文件格式

# 第三方服务配置
third-party:
  sms:
    enabled: true
    provider: aliyun # 可选: aliyun, tencent, huawei
  payment:
    enabled: true
    providers:
      - alipay
      - wechatpay
      - unionpay
  storage:
    enabled: true
    provider: qiniu # 可选: qiniu, aliyun-oss, tencent-cos

# 暴露所有端点用于监控
management:
  endpoints:
    web:
      exposure:
        include: "*"

# 服务端口
server:
  port: 17000

