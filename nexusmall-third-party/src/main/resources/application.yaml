# =====================================================
# NexusMall 第三方服务集成模块配置文件
# =====================================================
# 模块职责：
# 1. 短信服务（阿里云/腾讯云/华为云）
# 2. 支付服务（支付宝/微信支付/银联）
# 3. 对象存储（七牛云/阿里云 OSS/腾讯云 COS）
# 4. 邮件服务（预留）
# 5. 物流查询（预留）
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 13000
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-third-party
    # 应用描述
    description: NexusMall 第三方服务集成模块
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
spring:
  lifecycle:
    # 每个关闭阶段的超时时间
    timeout-per-shutdown-phase: 30s
