# ==============================================================================
# NexusMall Third Party Service Secret
# NexusMall 第三方服务集成 Kubernetes 密钥管理
# ==============================================================================
# 文件用途：存储敏感配置（密码、密钥等）
# 维护团队：平台架构组
# 安全级别：高（Base64 编码，生产环境建议启用 Encryption at Rest）
# ==============================================================================
# 
# ⚠️ 重要提示：
# 1. 此文件中的值是 Base64 编码的，不是加密的
# 2. 生产环境建议使用 Sealed Secrets 或 External Secrets
# 3. 不要将此文件提交到公共 Git 仓库
# 4. 定期轮换密码
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  # Secret 名称
  name: nexusmall-third-party-secret
  
  # 命名空间：与 Deployment 保持一致
  namespace: nexusmall
  
  # 资源标签
  labels:
    app: nexusmall-third-party
    app.kubernetes.io/name: nexusmall-third-party
    app.kubernetes.io/part-of: nexusmall

# Secret 类型：Opaque（不透明，用于任意数据）
type: Opaque

# 配置数据（Base64 编码）
# 生成 Base64 命令示例：
# echo -n 'root' | base64
# echo -n '123456' | base64
data:
  # Redis 密码（Base64: MTIzNDU2）
  # ⚠️ 生产环境请修改为强密码
  REDIS_PASSWORD: MTIzNDU2
  
  # Nacos 用户名（Base64: bmFjb3M=）
  NACOS_USERNAME: bmFjb3M=
  
  # Nacos 密码（Base64: bmFjb3M=）
  # ⚠️ 生产环境请修改为强密码
  NACOS_PASSWORD: bmFjb3M=
  
  # ========================================
  # 第三方服务敏感配置
  # ========================================
  
  # 阿里云 AccessKey（短信、OSS共用）
  ALIYUN_ACCESS_KEY_ID: eW91ci1hY2Nlc3Mta2V5LWlk      # your-access-key-id (Base64, 请替换为真实值)
  ALIYUN_ACCESS_KEY_SECRET: eW91ci1hY2Nlc3Mta2V5LXNlY3JldA==  # your-access-key-secret (Base64, 请替换为真实值)
  
  # 阿里云 OSS 配置
  ALIYUN_OSS_ENDPOINT: b3NzLWNuLWhhbmd6aG91LmFsaXl1bmNzLmNvbQ==  # oss-cn-hangzhou.aliyuncs.com (Base64)
  ALIYUN_OSS_BUCKET: bnV4dXNtYWxsLW9zcw==                        # nexusmall-oss (Base64)
  
  # MinIO 对象存储凭证
  MINIO_ACCESS_KEY: bWluaW9hZG1pbg==    # minioadmin (Base64)
  MINIO_SECRET_KEY: bWluaW9hZG1pbg==    # minioadmin (Base64)
