# ==============================================================================
# NexusMall Order Service Secret
# NexusMall 订单服务 Kubernetes 密钥管理
# ==============================================================================
# 文件用途：存储敏感配置（密码、密钥等）
# 维护团队：平台架构组
# 安全级别：高（Base64 编码，生产环境建议启用 Encryption at Rest）
# ==============================================================================
# 
# ⚠️ 重要提示：
# 1. 此文件中的值是 Base64 编码的，不是加密的
# 2. 生产环境建议使用 Sealed Secrets 或 External Secrets
# 3. 不要将此文件提交到公共 Git 仓库
# 4. 定期轮换密码
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  # Secret 名称
  name: nexusmall-order-secret
  
  # 命名空间：与 Deployment 保持一致
  namespace: nexusmall
  
  # 资源标签
  labels:
    app: nexusmall-order
    app.kubernetes.io/name: nexusmall-order
    app.kubernetes.io/part-of: nexusmall

# Secret 类型：Opaque（不透明，用于任意数据）
type: Opaque

# 配置数据（Base64 编码）
# 生成 Base64 命令示例：
# echo -n 'root' | base64
# echo -n '123456' | base64
data:
  # MySQL 用户名（Base64: cm9vdA==）
  MYSQL_USERNAME: cm9vdA==
  
  # MySQL 密码（Base64: MTIzNDU2）
  # ⚠️ 生产环境请修改为强密码
  MYSQL_PASSWORD: MTIzNDU2
  
  # Redis 密码（Base64: MTIzNDU2）
  # ⚠️ 生产环境请修改为强密码
  REDIS_PASSWORD: MTIzNDU2
