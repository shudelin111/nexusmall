apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusmall-order
  namespace: nexusmall  # ArgoCD 部署的目标命名空间
  annotations:
    # ArgoCD 自动同步配置
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: "PostSync"
    # 镜像更新通知
    argocd-image-updater.argoproj.io/image-list: "nexusmall-order=docker.io/shudlsys/nexusmall-order"
    argocd-image-updater.argoproj.io/nexusmall-order.update-strategy: "latest"
  labels:
    app: nexusmall-order
    app.kubernetes.io/name: nexusmall-order
    app.kubernetes.io/part-of: nexusmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexusmall-order
  template:
    metadata:
      labels:
        app: nexusmall-order
        app.kubernetes.io/name: nexusmall-order
    spec:
      containers:
        - name: nexusmall-order
          # 镜像标签由 GitHub Actions 自动更新
          # master 分支：latest + sha-{commit-hash}
          image: docker.io/shudlsys/nexusmall-order:latest
          ports:
            - containerPort: 11000
          # Spring Profile 配置（指定运行环境）
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"  # 可选值：dev, test, prod
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # 健康检查
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 11000
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 11000
            initialDelaySeconds: 120
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # 优雅关闭
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          terminationGracePeriodSeconds: 30