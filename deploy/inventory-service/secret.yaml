# ==============================================================================
# NexusMall Inventory Service Secret (生产环境)
# NexusMall 库存服务 Kubernetes 密钥配置
# ==============================================================================
# ⚠️ 重要安全提示：
# 1. 此文件包含真实凭证，切勿提交到 Git 仓库
# 2. 已在 .gitignore 中排除此文件
# 3. 请使用 kubectl apply -f secret.yaml 手动部署
# 4. 建议使用 Sealed Secrets 或 External Secrets Operator 管理密钥
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: nexusmall-inventory-secret
  namespace: nexusmall
  labels:
    app: nexusmall-inventory
    app.kubernetes.io/name: nexusmall-inventory
    app.kubernetes.io/part-of: nexusmall

# 密钥类型：Opaque 表示任意用户定义数据
type: Opaque

# 数据字段（Base64 编码）
# ⚠️ 请替换为真实的生产环境凭证
data:
  # MySQL 数据库凭证
  MYSQL_USERNAME: cm9vdA==                    # root (Base64)
  MYSQL_PASSWORD: MTIzNDU2                   # 请修改为真实密码
  
  # Redis 凭证
  REDIS_PASSWORD: MTIzNDU2                    # 请修改为真实密码
  
  # Nacos 认证凭证
  NACOS_USERNAME: bmFjb3M=                    # nacos (Base64)
  NACOS_PASSWORD: bmFjb3M=                    # 请修改为真实密码
