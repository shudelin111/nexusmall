# =====================================================
# Kubernetes Deployment 配置 - NexusMall Product Service
# =====================================================
# 用途：定义 Product 服务在 K8s 中的部署方式
# 服务：nexusmall-product（商品服务）
# 端口：12000
# 命名空间：nexusmall
# =====================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusmall-product
  namespace: nexusmall  # ArgoCD 部署的目标命名空间
  annotations:
    # ========================================
    # ArgoCD 自动同步配置
    # ========================================
    # sync-wave: 定义部署顺序（数字越小越先部署）
    # 0 = 第一批部署（基础服务）
    argocd.argoproj.io/sync-wave: "0"
    
    # hook: PostSync 表示在同步完成后执行
    # 用于在部署后执行一些后续操作
    argocd.argoproj.io/hook: "PostSync"
    
    # ========================================
    # ArgoCD Image Updater 配置
    # ========================================
    # 自动更新镜像标签的配置
    # image-list: 指定要监控的镜像
    # nexusmall-product=docker.io/shudlsys/nexusmall-product
    argocd-image-updater.argoproj.io/image-list: "nexusmall-product=docker.io/shudlsys/nexusmall-product"
    
    # update-strategy: 更新策略
    # latest = 始终使用 latest 标签（开发环境）
    # semver = 使用语义化版本（生产环境）
    argocd-image-updater.argoproj.io/nexusmall-product.update-strategy: "latest"
  
  labels:
    # K8s 资源标签（用于资源分组和选择）
    app: nexusmall-product
    app.kubernetes.io/name: nexusmall-product
    app.kubernetes.io/part-of: nexusmall  # 属于 nexusmall 项目

spec:
  # 副本数：1（开发环境）
  # 生产环境建议设置为 2+ 以实现高可用
  replicas: 1
  
  # 选择器：匹配 Pod 标签
  selector:
    matchLabels:
      app: nexusmall-product
  
  # Pod 模板
  template:
    metadata:
      labels:
        # Pod 标签（必须与 selector.matchLabels 一致）
        app: nexusmall-product
        app.kubernetes.io/name: nexusmall-product
    
    spec:
      # ========================================
      # 容器配置
      # ========================================
      containers:
        - name: nexusmall-product
          
          # ========================================
          # Docker 镜像配置
          # ========================================
          # 镜像标签由 GitHub Actions 自动更新
          # master 分支：latest（开发环境使用）
          # develop 分支：develop
          # 语义化版本：v1.0.0, v1.2.3 等（生产环境使用）
          image: docker.io/shudlsys/nexusmall-product:latest
          
          # ========================================
          # 端口配置
          # ========================================
          # 暴露容器端口（与 Dockerfile 中的 EXPOSE 一致）
          ports:
            - containerPort: 12000
              name: http
              protocol: TCP
          
          # ========================================
          # 环境变量配置
          # ========================================
          # Spring Profile 配置（指定运行环境）
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"  # 可选值：dev, test, prod
          
          # ========================================
          # 资源配额与限制
          # ========================================
          # 资源管理：确保集群资源合理分配
          resources:
            requests:
              # 请求资源（Pod 启动所需的最小资源）
              memory: "2Gi"   # 内存请求：1GB
              cpu: "500m"     # CPU 请求：0.5 核
            limits:
              # 限制资源（Pod 能使用的最大资源）
              memory: "4Gi"   # 内存限制：2GB
              cpu: "1000m"    # CPU 限制：1 核
          
          # ========================================
          # 健康检查配置（Kubernetes 探针）
          # ========================================
          
          # Liveness Probe（存活探针）
          # 作用：检测容器是否存活，失败会重启容器
          # 用于检测死锁、线程阻塞等无法自愈的问题
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness  # Spring Boot Actuator 健康检查端点
              port: 12000
            initialDelaySeconds: 240  # 容器启动后 240 秒开始检查（给足启动时间）
            periodSeconds: 10         # 每 10 秒检查一次
            timeoutSeconds: 5         # 超时 5 秒
            failureThreshold: 5       # 失败 5 次后重启容器
          
          # Readiness Probe（就绪探针）
          # 作用：检测容器是否准备好接收流量，失败会从 Service 中移除
          # 用于检测依赖服务未就绪、配置加载失败等临时问题
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 12000
            initialDelaySeconds: 200  # 容器启动后 200 秒开始检查
            periodSeconds: 5          # 每 5 秒检查一次
            timeoutSeconds: 3         # 超时 3 秒
            failureThreshold: 3       # 失败 3 次后标记为未就绪
          
          # ========================================
          # 生命周期钩子
          # ========================================
          lifecycle:
            # preStop: 容器停止前执行的命令
            # 作用：优雅关闭，给服务足够时间处理完剩余请求
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          
          # ========================================
          # 优雅关闭配置
          # ========================================
          # terminationGracePeriodSeconds: Pod 终止的宽限期
          # 流程：
          # 1. K8s 发送 SIGTERM 信号
          # 2. 执行 preStop 钩子（sleep 10 秒）
          # 3. Spring Boot 执行优雅关闭（处理剩余请求）
          # 4. 宽限期结束后发送 SIGKILL 强制终止
          terminationGracePeriodSeconds: 30

# =====================================================
# 部署策略说明
# =====================================================
# 滚动更新（RollingUpdate）：
# 1. 启动新的 Pod
# 2. 等待新 Pod 通过 Readiness Probe
# 3. 终止旧的 Pod
# 4. 确保服务始终可用（零停机部署）
#
# 资源配额说明：
# - requests: K8s 调度时保证的资源
# - limits: 容器能使用的资源上限
# - 超过 limits 会被限制（CPU 可超卖，内存超限会被 OOM Kill）
#
# 健康检查说明：
# - Liveness Probe: 检测是否存活，失败 → 重启
# - Readiness Probe: 检测是否就绪，失败 → 从 Service 移除
# - Startup Probe: 检测是否启动（慢启动服务使用）
# =====================================================
