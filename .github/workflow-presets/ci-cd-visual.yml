name: NexusMall CI/CD

on:
  push:
    branches: [master, dev]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - '*.log'
      - '*.ps1'
      - '*.bat'
      - '*.py'
      - '*.txt'
      - '*.sh'
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # 先识别模块变更，后续每个服务 job 只根据输出条件决定是否执行。
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      workflow-changed: ${{ steps.filter.outputs.workflow }}
      order-changed: ${{ steps.filter.outputs.order }}
      product-changed: ${{ steps.filter.outputs.product }}
      auth-changed: ${{ steps.filter.outputs.auth }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      member-changed: ${{ steps.filter.outputs.member }}
      payment-changed: ${{ steps.filter.outputs.payment }}
      cart-changed: ${{ steps.filter.outputs.cart }}
      notification-changed: ${{ steps.filter.outputs.notification }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      search-changed: ${{ steps.filter.outputs.search }}
      logistics-changed: ${{ steps.filter.outputs.logistics }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # PR 使用目标分支的 base SHA，push 使用 before，手动触发时回退到当前 ref。
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || github.ref }}
          filters: |
            workflow:
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            order:
              - 'nexusmall-order/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            product:
              - 'nexusmall-product/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            auth:
              - 'nexusmall-auth/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            gateway:
              - 'nexusmall-gateway/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            member:
              - 'nexusmall-member/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            payment:
              - 'nexusmall-payment/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            cart:
              - 'nexusmall-cart/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            notification:
              - 'nexusmall-notification/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            promotion:
              - 'nexusmall-promotion/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            search:
              - 'nexusmall-search/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            logistics:
              - 'nexusmall-logistics/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'

  product:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.product-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Product Service
      module_dir: nexusmall-product
      image_name: nexusmall-product
      deployment_file: deploy/product-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-product -am test -B
      # test_artifact_name: nexusmall-product-test-report
    secrets: inherit

  order:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.order-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Order Service
      module_dir: nexusmall-order
      image_name: nexusmall-order
      deployment_file: deploy/order-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-order -am test -B
      # test_artifact_name: nexusmall-order-test-report
    secrets: inherit

  gateway:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.gateway-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Gateway Service
      module_dir: nexusmall-gateway
      image_name: nexusmall-gateway
      deployment_file: deploy/gateway-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-gateway -am test -B
      # test_artifact_name: nexusmall-gateway-test-report
    secrets: inherit

  auth:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.auth-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Auth Service
      module_dir: nexusmall-auth
      image_name: nexusmall-auth
      deployment_file: deploy/auth-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-auth -am test -B
      # test_artifact_name: nexusmall-auth-test-report
    secrets: inherit

  member:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.member-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Member Service
      module_dir: nexusmall-member
      image_name: nexusmall-member
      deployment_file: deploy/member-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-member -am test -B
      # test_artifact_name: nexusmall-member-test-report
    secrets: inherit

  cart:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.cart-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Cart Service
      module_dir: nexusmall-cart
      image_name: nexusmall-cart
      deployment_file: deploy/cart-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-cart -am test -B
      # test_artifact_name: nexusmall-cart-test-report
    secrets: inherit

  notification:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.notification-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Notification Service
      module_dir: nexusmall-notification
      image_name: nexusmall-notification
      deployment_file: deploy/notification-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-notification -am test -B
      # test_artifact_name: nexusmall-notification-test-report
    secrets: inherit

  promotion:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.promotion-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Promotion Service
      module_dir: nexusmall-promotion
      image_name: nexusmall-promotion
      deployment_file: deploy/promotion-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-promotion -am test -B
      # test_artifact_name: nexusmall-promotion-test-report
    secrets: inherit

  search:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.search-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Search Service
      module_dir: nexusmall-search
      image_name: nexusmall-search
      deployment_file: deploy/search-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-search -am test -B
      # test_artifact_name: nexusmall-search-test-report
    secrets: inherit

  logistics:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.logistics-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Logistics Service
      module_dir: nexusmall-logistics
      image_name: nexusmall-logistics
      deployment_file: deploy/logistics-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-logistics -am test -B
      # test_artifact_name: nexusmall-logistics-test-report
    secrets: inherit

  inventory:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.inventory-changed == 'true' }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    with:
      service_name: Inventory Service
      module_dir: nexusmall-inventory
      image_name: nexusmall-inventory
      deployment_file: deploy/inventory-service/deployment.yaml
      # test_enabled: true
      # test_command: mvn -pl nexusmall-inventory -am test -B
      # test_artifact_name: nexusmall-inventory-test-report
    secrets: inherit

  payment:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.workflow-changed == 'true' || needs.detect-changes.outputs.payment-changed == 'true' }}
