# =====================================================
# 可复用 Workflow - 模块构建与测试
# =====================================================
# 用途：编译 Java 模块并运行单元测试
# 调用方式：通过 workflow_call 触发
# 作者：shudl
# 日期：2026-04-07
# =====================================================

name: Reusable Build Module

# ========================================
# 触发条件（只能通过 workflow_call 调用）
# ========================================
on:
  workflow_call:
    inputs:
      module-name:
        description: '模块名称（如 nexusmall-notification）'
        required: true
        type: string
      module-display-name:
        description: '模块显示名称（如 Notification Service）'
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false

# ========================================
# 权限配置
# ========================================
permissions:
  contents: read
  security-events: write

# ========================================
# 环境变量
# ========================================
env:
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

# ========================================
# Jobs
# ========================================
jobs:
  # ========== 编译与测试 ==========
  build-and-test:
    name: Build & Test - ${{ inputs.module-display-name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 安装父项目和公共模块 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Module
        run: |
          echo "====== 编译 ${{ inputs.module-display-name }} 模块 ======"
          mvn clean compile -f ${{ inputs.module-name }}/pom.xml -B
      
      - name: Run Module Tests with Coverage
        # ⚠️ 临时禁用：Nacos 为内网服务，GitHub Actions 无法访问
        # TODO: 恢复测试后移除此注释
        if: false  # 临时禁用
        run: |
          echo "====== 单元测试阶段 (带 JaCoCo 覆盖率检查) ======"
          if [ -d "${{ inputs.module-name }}/src/test/java" ] && [ "$(find ${{ inputs.module-name }}/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            # 执行测试并生成覆盖率报告,同时检查覆盖率阈值
            mvn clean test jacoco:check -f ${{ inputs.module-name }}/pom.xml -B
          else
            echo "⚠️ 未找到测试文件，跳过测试"
            echo "💡 提示：建议为业务模块编写单元测试以达到 50%+ 覆盖率要求"
          fi
      
      - name: Upload Test Results and Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module-name }}-test-and-coverage
          path: |
            ${{ inputs.module-name }}/target/surefire-reports/
            ${{ inputs.module-name }}/target/site/jacoco/
          retention-days: 30
