      - name: Update image tag in deployment.yaml
        run: |
          echo "闁哄洤鐡ㄩ弻?Member 闁哄牆绉存慨鐔兼⒐濠婂啫鍓奸柡宥呮川椤?.."
          # 闁哄秷顫夊畵渚€宕氶崱妯绘殰闂侇偄顦扮€氥劑寮介崶鈺婂姰缂佹稒鐗滈弳?
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 闁告帒妫欓弫顕€鏁嶅顐⑩枏闁?sha 闁哄秴娲ㄩ鐑芥晬瀹€鈧垾妯荤┍濠靛牆顣奸柡鍫墮瑜板弶娼婚懞銉ュ毐闁挎稑鐗忛弫鎾寸瑜忛獮鍡樻櫠閸愯法绀?
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:sha-${{ github.sha }}"
          else
            # dev 闁告帒妫欓弫顕€鏁嶅顐⑩枏闁?latest 闁哄秴娲ㄩ鐑芥晬瀹€鍐ㄦ闁告柣鍔嶆刊娲矗閺嶃劍浠橀柡鍌氬簻缁辨瑥顕ｉ埀顒勫矗閹寸姴绠氬褍鍠涚槐?
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:latest"
          fi
          echo "闁哄倷鍗抽弳鍛村磽韫囥儳绐?{NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/member-service/deployment.yaml
          
          echo "=== 闁告瑦蓱濞插潡宕ユ惔锝嗙暠闂佹澘绉堕悿?==="
          grep -A 2 "image:" deploy/member-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 闂佹彃绉烽惁顖炲嫉閸濆嫬鐓戦柨娑欒壘椤︹晠鎮堕崱妤婃▼濞戞搩浜濊啯闁秆勵殔閼荤喓鎮扮仦鎯ц吂闂侇偂鐒﹀鍌炴儍?Git 闁告劘灏欓悰?
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/member-service/deployment.yaml; then
              echo "婵☆偀鍋撴繛鏉戭儏閸╁矂宕ｅΟ缁樼函闁挎稑鏈ぐ浣圭?.."
              git add deploy/member-service/deployment.yaml
              # 闁哄秷顫夊畵渚€宕氶崱妯绘殰濞达綀娉曢弫銈嗙▔瀹ュ懏鍊遍柣銊ュ瑜颁焦绂嶉妶鍕箚闁?
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update member image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update member image to latest [skip ci]"
              fi
              
              # 閻忓繑绻嗛惁顖炲箳閵娾斁鍋撴笟濠勭濠碘€冲€归悘澶嬪緞鏉堫偉袝闁告帗鐟╅崳鍝ユ嫚?
              if git push origin ${{ github.ref_name }}; then
                echo "闁?Manifest 闁哄洤鐡ㄩ弻濠囧箣閹邦剙顫犻柨?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "闁宠法濯寸粭?闁规亽鍔戦埀顑跨閵囨垹鎷归妷顖滅闁告瑯鍨甸崗妯荤▔鎼粹€冲緭濞寸姵鐗楄啯闁秆勵殔閸熻法绮ｆ笟濠勭闁挎稑鐭傞崳鍝ユ嫚?$RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10  # 缂佹稑顦欢鐔煎礂閺堢數閾傛俊顖椻偓铏仴闁规亽鍔戦埀顑跨閻ｎ剟骞?
              fi
            else
              echo "闁宠法濯寸粭?婵炲备鍓濆﹢浣肝涢埀顒€霉鐎ｎ亜鐓傞柛娆惿戝ú鍧楁晬瀹€鍐劜閺夆晛娲﹁ぐ浣圭?
              exit 0
            fi
          done
          
          echo "闁?闂佹彃绉烽惁?$MAX_RETRIES 婵炲棌鈧櫕鍊靛ù鐘茬Ф閸斞勫緞鏉堫偉袝闁挎稑鐭侀顒€螞閳ь剟寮婚妷锔斤級闊?
          exit 1

  # ========== 闂傚啳鍩栭?6: 闁汇垻鍠嶆鍥偝椤栨凹鏆旈梺顔哄妿鐠佹煡鏁嶉崼銏℃殸 ArgoCD 闁煎浜滄慨鈺冣偓鐟版湰閸ㄦ岸鏁?=========
  # 婵炲鍔嶉崜浼存晬濮橆偆鐟濋柛鎰Ч濞撳墎鎲版担鐟邦杹闁告柣鍔戦崕瀵哥磾閸欏鍔勫Δ鐘€х槐婊眗goCD 濞村吋淇洪崵婊堝礉閵娿儲鍊辨慨?manifest 闁告瑦蓱濞?
  # 濠碘€冲€归悘澶愭閳ь剛鎲版担鐟邦杹闁告柣鍔岄鎼佸箥閻у摜绀夐柛娆樺灟娴滄帗鎷呯捄銊︽殢 ArgoCD 闁?manual sync 闁告梻鍠曢崗?

  # ========== Cart Service CI/CD Pipeline ==========
  
  # 闂傚啳鍩栭?1: 缂傚倹鐗為惁褎绋夋惔銏偞閻?- Cart 婵☆垪鈧櫕鍋?
  build-cart:
    name: Build & Test - Cart Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.cart-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
