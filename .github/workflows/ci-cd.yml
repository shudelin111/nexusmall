              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update auth image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update auth image to latest [skip ci]"
              fi
              
              # 灏濊瘯鎺ㄩ€侊紝濡傛灉澶辫触鍒欓噸璇?
              if git push origin ${{ github.ref_name }}; then
                echo "鉁?Manifest 鏇存柊鎴愬姛锛?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "鈿狅笍 鎺ㄩ€佸け璐ワ紙鍙兘涓庡叾浠栨ā鍧楀啿绐侊級锛岄噸璇?$RETRY_COUNT/$MAX_RETRIES..."
