            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:latest"
          fi
          echo "鏂伴暅鍍忥細${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/gateway-service/deployment.yaml
          
          echo "=== 鍙樻洿鍚庣殑閰嶇疆 ==="
          grep -A 2 "image:" deploy/gateway-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
