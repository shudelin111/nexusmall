  # ========== 闂冭埖顔?5: 閺囧瓨鏌?Kubernetes Manifest - Auth 濡€虫健 ==========
  update-manifest-auth:
    name: Update K8s Manifest - Auth Service
    runs-on: ubuntu-latest
    needs: [security-scan-auth]
    # dev 閸?master 闁姤娲块弬?Manifest閿涘湙itOps 閺嶅洤鍣€圭偠杩旈敍?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "閺囧瓨鏌?Auth 閺堝秴濮熼梹婊冨剼閺嶅洨顒?.."
          # 閺嶈宓侀崚鍡樻暜闁瀚ㄩ弽鍥╊劮缁涙牜鏆?
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 閸掑棙鏁敍姘▏閻?sha 閺嶅洨顒烽敍宀€鈥樻穱婵堝閺堫剙褰叉潻鑺ュ嚱閿涘牏鏁撴禍褏骞嗘晶鍐跨礆
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-auth:sha-${{ github.sha }}"
          else
            # dev 閸掑棙鏁敍姘▏閻?latest 閺嶅洨顒烽敍宀冨殰閸斻劍濯洪崣鏍ㄦ付閺傚府绱欏鈧崣鎴犲箚婢у喛绱?
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-auth:latest"
          fi
          echo "閺備即鏆呴崓蹇ョ窗${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/auth-service/deployment.yaml
          
          echo "=== 閸欐ɑ娲块崥搴ｆ畱闁板秶鐤?==="
          grep -A 2 "image:" deploy/auth-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 闁插秷鐦張鍝勫煑閿涙艾顦╅悶鍡楊樋娑擃亝膩閸ф鑻熺悰灞惧腹闁焦妞傞惃?Git 閸愯尙鐛?
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/auth-service/deployment.yaml; then
              echo "濡偓濞村鍩岄崣妯绘纯閿涘本褰佹禍?.."
