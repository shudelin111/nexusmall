      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-notification-results.sarif'
          category: 'trivy-notification-scan'

  update-manifest-notification:
    name: Update K8s Manifest - Notification Service
    runs-on: ubuntu-latest
    needs: [security-scan-notification]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag in deployment.yaml
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-notification:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-notification:latest"
          fi
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/notification-service/deployment.yaml
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/notification-service/deployment.yaml; then
              git add deploy/notification-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update notification image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update notification image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              exit 0
            fi
          done
          exit 1


# =====================================================
# GitHub Actions CI/CD Pipeline - NexusMall Multi-Module
# =====================================================
# GitOps 宸ヤ綔娴佺▼:
# 1. 鍩轰簬鏂囦欢鍙樻洿鏅鸿兘瑙﹀彂锛堣矾寰勮繃婊わ級
# 2. 鑷姩缂栬瘧 + 鍗曞厓娴嬭瘯 + 浠ｇ爜璐ㄩ噺妫€鏌?
# 3. 鏋勫缓 Docker 闀滃儚骞舵帹閫佸埌 Docker Hub
# 4. Trivy 瀹夊叏鎵弿
# 5. 鏇存柊 Kubernetes Manifest
# 6. ArgoCD 鑷姩鍚屾鍒?K8s 闆嗙兢
#
# 涓氱晫鏍囧噯瀹炶返锛?
# - 璺緞杩囨护锛氬彧鏋勫缓鍙樻洿鐨勬ā鍧?
# - 骞惰鏋勫缓锛氬涓ā鍧楀悓鏃舵瀯寤?
# - 澧為噺鏋勫缓锛氬彧缂栬瘧鍙樻洿鐨勪唬鐮?
# =====================================================

name: NexusMall CI/CD

# ========================================
# 瑙﹀彂鏉′欢锛堟敮鎸佽矾寰勮繃婊わ級
# ========================================
on:
  push:
    branches: [ master, dev ]  # master 鐢ㄤ簬鐢熶骇锛宒ev 鐢ㄤ簬寮€鍙?
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ master, dev ]  # master 鐢ㄤ簬鐢熶骇锛宒ev 鐢ㄤ簬寮€鍙?
  workflow_dispatch:  # 鍏佽鎵嬪姩瑙﹀彂

# ========================================
# 骞跺彂鎺у埗锛堣嚜鍔ㄥ彇娑堟棫鐨?workflow锛?
# ========================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ========================================
# 鏉冮檺閰嶇疆锛堜慨澶?CodeQL 鏉冮檺閿欒锛?
# ========================================
permissions:
  contents: write  # 闇€瑕佸啓鍏ユ潈闄愭墠鑳芥帹閫佷唬鐮?
  security-events: write
  actions: read

# ========================================
# 鐜鍙橀噺
# ========================================
env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"  # 缁熶竴璁剧疆 Java 缂栫爜涓?UTF-8锛岄伩鍏?Nacos 閰嶇疆瑙ｆ瀽涔辩爜

# ========================================
# 宸ヤ綔鐭╅樀閰嶇疆锛堜笟鐣屾爣鍑嗗仛娉曪級
# ========================================
# 瀹氫箟瑕佹瀯寤虹殑妯″潡鍙婂叾璺緞鏄犲皠
jobs:
  # ========== 闃舵 0: 妫€娴嬪彉鏇存ā鍧?==========
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      order-changed: ${{ steps.filter.outputs.order }}
      product-changed: ${{ steps.filter.outputs.product }}
      auth-changed: ${{ steps.filter.outputs.auth }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      common-changed: ${{ steps.filter.outputs.common }}
      member-changed: ${{ steps.filter.outputs.member }}
      payment-changed: ${{ steps.filter.outputs.payment }}
      cart-changed: ${{ steps.filter.outputs.cart }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      search-changed: ${{ steps.filter.outputs.search }}
      logistics-changed: ${{ steps.filter.outputs.logistics }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 浣跨敤 paths-filter 妫€娴嬪彉鏇达紙涓氱晫鏍囧噯宸ュ叿锛?
      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
