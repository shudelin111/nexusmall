          fi
          echo "閺備即鏆呴崓蹇ョ窗${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/auth-service/deployment.yaml
          
          echo "=== 閸欐ɑ娲块崥搴ｆ畱闁板秶鐤?==="
          grep -A 2 "image:" deploy/auth-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 闁插秷鐦張鍝勫煑閿涙艾顦╅悶鍡楊樋娑擃亝膩閸ф鑻熺悰灞惧腹闁焦妞傞惃?Git 閸愯尙鐛?
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/auth-service/deployment.yaml; then
