          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/gateway-service/deployment.yaml; then
              echo "濡偓濞村鍩岄崣妯绘纯閿涘本褰佹禍?.."
              git add deploy/gateway-service/deployment.yaml
              # 閺嶈宓侀崚鍡樻暜娴ｈ法鏁ゆ稉宥呮倱閻ㄥ嫭褰佹禍銈勪繆閹?
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
