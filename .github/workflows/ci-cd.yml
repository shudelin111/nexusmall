  build-docker-order:
    name: Build Docker Image - Order Service
    runs-on: ubuntu-latest
    needs: [build-order]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.order-changed == 'true'
    
    steps:
      - name: Checkout code
