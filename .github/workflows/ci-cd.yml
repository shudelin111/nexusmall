      - name: Check Code Coverage
        run: |
          echo "閻㈢喐鍨氱憰鍡欐磰閻滃洦濮ら崨?.."
          mvn jacoco:report -f nexusmall-gateway/pom.xml || echo "閳跨媴绗?鐟曞棛娲婇悳鍥ㄥГ閸涘﹦鏁撻幋鎰亼鐠?

