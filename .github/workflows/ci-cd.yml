    name: Quality Check - Cart Service
    runs-on: ubuntu-latest
    needs: [build-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-cart/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-cart/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-cart/pom.xml
        continue-on-error: true

  # 闂冭埖顔?3: 閺嬪嫬缂?Docker 闂€婊冨剼 - Cart 濡€虫健
  build-docker-cart:
    name: Build Docker Image - Cart Service
    runs-on: ubuntu-latest
    needs: [build-cart]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.cart-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-cart/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # 闂冭埖顔?4: 鐎瑰鍙忛幍顐ｅ伎 - Cart 濡€虫健
  security-scan-cart:
    name: Security Scan - Cart Service
    runs-on: ubuntu-latest
    needs: [build-docker-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-cart-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-cart-results.sarif'
          category: 'trivy-cart-scan'

  # 闂冭埖顔?5: 閺囧瓨鏌?Kubernetes Manifest - Cart 濡€虫健
  update-manifest-cart:
    name: Update K8s Manifest - Cart Service
    runs-on: ubuntu-latest
    needs: [security-scan-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "閺囧瓨鏌?Cart 閺堝秴濮熼梹婊冨剼閺嶅洨顒?.."
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:latest"
          fi
          echo "閺備即鏆呴崓蹇ョ窗${NEW_IMAGE}"
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/cart-service/deployment.yaml
          echo "=== 閸欐ɑ娲块崥搴ｆ畱闁板秶鐤?==="
          grep -A 2 "image:" deploy/cart-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/cart-service/deployment.yaml; then
              echo "濡偓濞村鍩岄崣妯绘纯閿涘本褰佹禍?.."
              git add deploy/cart-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update cart image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update cart image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                echo "閴?Manifest 閺囧瓨鏌婇幋鎰閿?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "閳跨媴绗?閹恒劑鈧礁銇戠拹銉礉闁插秷鐦?$RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              echo "閳跨媴绗?濞屸剝婀佸Λ鈧ù瀣煂閸欐ɑ娲块敍宀冪儲鏉╁洦褰佹禍?
              exit 0
            fi
          done
          echo "閴?闁插秷鐦?$MAX_RETRIES 濞嗏€虫倵娴犲秶鍔ф径杈Е閿涘矁顕Λ鈧弻銉︽）韫?
          exit 1

  # ========== promotion Service CI/CD Pipeline ==========
  
  build-promotion:
    name: Build & Test - promotion Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.promotion-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Install Parent and Common
        run: |
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      - name: Compile promotion Module
        run: mvn clean compile -f nexusmall-promotion/pom.xml -B
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promotion-test-results
          path: nexusmall-promotion/target/surefire-reports/
          retention-days: 30

  quality-check-promotion:
    name: Quality Check - promotion Service
    runs-on: ubuntu-latest
    needs: [build-promotion]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-promotion/pom.xml
        continue-on-error: true
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-promotion/pom.xml
        continue-on-error: true
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-promotion/pom.xml
        continue-on-error: true

  build-docker-promotion:
    name: Build Docker Image - promotion Service
    runs-on: ubuntu-latest
    needs: [build-promotion]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.promotion-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-promotion
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-promotion/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  security-scan-promotion:
    name: Security Scan - promotion Service
    runs-on: ubuntu-latest
    needs: [build-docker-promotion]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-promotion:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-promotion-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-promotion-results.sarif'
          category: 'trivy-promotion-scan'

  update-manifest-promotion:
    name: Update K8s Manifest - promotion Service
    runs-on: ubuntu-latest
    needs: [security-scan-promotion]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag in deployment.yaml
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-promotion:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-promotion:latest"
          fi
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/promotion-service/deployment.yaml
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/promotion-service/deployment.yaml; then
              git add deploy/promotion-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update promotion image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update promotion image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              exit 0
            fi
          done
          exit 1



# =====================================================
# GitHub Actions CI/CD Pipeline - NexusMall Multi-Module
# =====================================================
# GitOps 瀹搞儰缍斿ù浣衡柤:
# 1. 閸╄桨绨弬鍥︽閸欐ɑ娲块弲楦垮厴鐟欙箑褰傞敍鍫ｇ熅瀵板嫯绻冨銈忕礆
# 2. 閼奉亜濮╃紓鏍槯 + 閸楁洖鍘撳ù瀣槸 + 娴狅絿鐖滅拹銊╁櫤濡偓閺?
# 3. 閺嬪嫬缂?Docker 闂€婊冨剼楠炶埖甯归柅浣稿煂 Docker Hub
# 4. Trivy 鐎瑰鍙忛幍顐ｅ伎
# 5. 閺囧瓨鏌?Kubernetes Manifest
# 6. ArgoCD 閼奉亜濮╅崥灞绢劄閸?K8s 闂嗗棛鍏?
#
# 娑撴氨鏅弽鍥у櫙鐎圭偠杩旈敍?
# - 鐠侯垰绶炴潻鍥ㄦ姢閿涙艾褰ч弸鍕紦閸欐ɑ娲块惃鍕侀崸?
# - 楠炴儼顢戦弸鍕紦閿涙艾顦挎稉顏吥侀崸妤€鎮撻弮鑸电€?
# - 婢х偤鍣洪弸鍕紦閿涙艾褰х紓鏍槯閸欐ɑ娲块惃鍕敩閻?
# =====================================================

name: NexusMall CI/CD

# ========================================
# 鐟欙箑褰傞弶鈥叉閿涘牊鏁幐浣界熅瀵板嫯绻冨銈忕礆
# ========================================
on:
  push:
    branches: [ master, dev ]  # master 閻劋绨悽鐔堕獓閿涘畳ev 閻劋绨鈧崣?
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ master, dev ]  # master 閻劋绨悽鐔堕獓閿涘畳ev 閻劋绨鈧崣?
  workflow_dispatch:  # 閸忎浇顔忛幍瀣З鐟欙箑褰?

# ========================================
# 楠炶泛褰傞幒褍鍩楅敍鍫ｅ殰閸斻劌褰囧☉鍫熸＋閻?workflow閿?
# ========================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ========================================
# 閺夊啴妾洪柊宥囩枂閿涘牅鎱ㄦ径?CodeQL 閺夊啴妾洪柨娆掝嚖閿?
# ========================================
permissions:
  contents: write  # 闂団偓鐟曚礁鍟撻崗銉︽綀闂勬劖澧犻懗鑺ュ腹闁椒鍞惍?
  security-events: write
  actions: read

# ========================================
# 閻滎垰顣ㄩ崣姗€鍣?
# ========================================
env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"  # 缂佺喍绔寸拋鍓х枂 Java 缂傛牜鐖滄稉?UTF-8閿涘矂浼╅崗?Nacos 闁板秶鐤嗙憴锝嗙€芥稊杈╃垳

# ========================================
# 瀹搞儰缍旈惌鈺呮█闁板秶鐤嗛敍鍫滅瑹閻ｅ本鐖ｉ崙鍡椾粵濞夋洩绱?
# ========================================
# 鐎规矮绠熺憰浣圭€铏规畱濡€虫健閸欏﹤鍙剧捄顖氱窞閺勭姴鐨?
jobs:
  # ========== 闂冭埖顔?0: 濡偓濞村褰夐弴瀛樐侀崸?==========
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      order-changed: ${{ steps.filter.outputs.order }}
      product-changed: ${{ steps.filter.outputs.product }}
      auth-changed: ${{ steps.filter.outputs.auth }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      common-changed: ${{ steps.filter.outputs.common }}
      member-changed: ${{ steps.filter.outputs.member }}
      payment-changed: ${{ steps.filter.outputs.payment }}
      cart-changed: ${{ steps.filter.outputs.cart }}
      search-changed: ${{ steps.filter.outputs.search }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      search-changed: ${{ steps.filter.outputs.search }}
      logistics-changed: ${{ steps.filter.outputs.logistics }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 娴ｈ法鏁?paths-filter 濡偓濞村褰夐弴杈剧礄娑撴氨鏅弽鍥у櫙瀹搞儱鍙块敍?
      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            order: 
              - 'nexusmall-order/**'
              - 'nexusmall-common/**'  # common 閸欐ɑ娲挎稊鐔剁窗瑜板崬鎼?order
              - 'pom.xml'  # 閺?pom.xml 閸欐ɑ娲胯ぐ鍗炴惙閹碘偓閺堝膩閸?
              - 'nexusmall-common/pom.xml'  # 閻?POM 閸欐ɑ娲挎稊鐔峰閸濆秵澧嶉張澶嬆侀崸?
            product:
              - 'nexusmall-product/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            auth:
              - 'nexusmall-auth/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            gateway:
              - 'nexusmall-gateway/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            common:
              - 'nexusmall-common/**'
              - 'pom.xml'  # 閺?pom.xml 閸欐ɑ娲胯ぐ鍗炴惙 common 濡€虫健
            member:
              - 'nexusmall-member/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            payment:
              - 'nexusmall-payment/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            cart:
              - 'nexusmall-cart/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            search:
              - 'nexusmall-search/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            promotion:
              - 'nexusmall-promotion/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            search:
              - 'nexusmall-search/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            logistics:
              - 'nexusmall-logistics/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'

  # ========== 闂冭埖顔?1: 缂傛牞鐦ф稉搴㈢ゴ鐠?- Product 濡€虫健 ==========
  build-product:
    name: Build & Test - Product Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 鐎瑰顥婇悥鍫曘€嶉惄顔兼嫲閸忣剙鍙″Ο鈥虫健 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Product Module
        run: |
          echo "====== 缂傛牞鐦?Product 濡€虫健 ======"
          mvn clean compile -f nexusmall-product/pom.xml -B
      
      - name: Run Product Module Tests with Coverage
        # 閳跨媴绗?娑撳瓨妞傜粋浣烘暏閿涙瓊acos 娑撳搫鍞寸純鎴炴箛閸斺槄绱滸itHub Actions 閺冪姵纭剁拋鍧楁６
        # TODO: 閹垹顦插ù瀣槸閸氬海些闂勩倖顒濆▔銊╁櫞
