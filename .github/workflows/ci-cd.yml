  # ========== 闃舵 1: 缂栬瘧涓庢祴璇?- Product 妯″潡 ==========
  build-product:
    name: Build & Test - Product Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 瀹夎鐖堕」鐩拰鍏叡妯″潡 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Product Module
        run: |
          echo "====== 缂栬瘧 Product 妯″潡 ======"
          mvn clean compile -f nexusmall-product/pom.xml -B
      
      - name: Run Product Module Tests with Coverage
        # 鈿狅笍 涓存椂绂佺敤锛歂acos 涓哄唴缃戞湇鍔★紝GitHub Actions 鏃犳硶璁块棶
        # TODO: 鎭㈠娴嬭瘯鍚庣Щ闄ゆ娉ㄩ噴
        if: false  # 涓存椂绂佺敤
        run: |
          echo "====== 鍗曞厓娴嬭瘯闃舵 (甯?JaCoCo 瑕嗙洊鐜囨鏌? ======"
          if [ -d "nexusmall-product/src/test/java" ] && [ "$(find nexusmall-product/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            # 鎵ц娴嬭瘯骞剁敓鎴愯鐩栫巼鎶ュ憡,鍚屾椂妫€鏌ヨ鐩栫巼闃堝€?
            mvn clean test jacoco:check -f nexusmall-product/pom.xml -B
          else
            echo "鈿狅笍 鏈壘鍒版祴璇曟枃浠讹紝璺宠繃娴嬭瘯"
            echo "馃挕 鎻愮ず锛氬缓璁负涓氬姟妯″潡缂栧啓鍗曞厓娴嬭瘯浠ヨ揪鍒?50%+ 瑕嗙洊鐜囪姹?
          fi
      
      - name: Upload Test Results and Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-test-and-coverage
          path: |
            nexusmall-product/target/surefire-reports/
            nexusmall-product/target/site/jacoco/
          retention-days: 30

  # ========== 闃舵 2: 浠ｇ爜璐ㄩ噺妫€鏌?- Product 妯″潡 ==========
  quality-check-product:
    name: Quality Check - Product Service
    runs-on: ubuntu-latest
    needs: [build-product]
    # 淇敼锛歞ev 鍜?master 鍒嗘敮閮芥墽琛岃川閲忔鏌?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-product/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-product/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-product/pom.xml
        continue-on-error: true

  # ========== 闃舵 3: 鏋勫缓 Docker 闀滃儚 - Product 妯″潡 ==========
  build-docker-product:
    name: Build Docker Image - Product Service
    runs-on: ubuntu-latest
    needs: [build-product]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-product
          tags: |
            # dev 鍒嗘敮锛氫娇鐢?latest 鏍囩锛堟渶鏂板紑鍙戠増锛屽紑鍙戠幆澧冧娇鐢級
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            # 璇箟鍖栫増鏈紙浠呮墦 tag 鏃剁敓鎴愶紝濡?v1.2.3锛?
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 鎵€鏈夊垎鏀細閮界敓鎴?sha 鏍囩锛堢敤浜庣簿纭拷婧級
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-product/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 闃舵 4: 瀹夊叏鎵弿 - Product 妯″潡 ==========
  security-scan-product:
    name: Security Scan - Product Service
    runs-on: ubuntu-latest
    needs: [build-docker-product]
    # 淇敼锛歞ev 鍜?master 閮芥墽琛屽畨鍏ㄦ壂鎻忥紝浣嗘壂鎻忎弗鏍肩▼搴︿笉鍚?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-product:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-product-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-product-results.sarif'
          category: 'trivy-product-scan'

  # ========== 闃舵 5: 鏇存柊 Kubernetes Manifest - Product 妯″潡 ==========
  update-manifest-product:
    name: Update K8s Manifest - Product Service
    runs-on: ubuntu-latest
    needs: [security-scan-product]
    # 淇敼锛歞ev 鍜?master 閮芥洿鏂?Manifest锛圙itOps 鏍囧噯瀹炶返锛?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "鏇存柊 Product 鏈嶅姟闀滃儚鏍囩..."
          # 鏍规嵁鍒嗘敮閫夋嫨鏍囩绛栫暐
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 鍒嗘敮锛氫娇鐢?sha 鏍囩锛岀‘淇濈増鏈彲杩芥函锛堢敓浜х幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-product:sha-${{ github.sha }}"
          else
            # dev 鍒嗘敮锛氫娇鐢?latest 鏍囩锛岃嚜鍔ㄦ媺鍙栨渶鏂帮紙寮€鍙戠幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-product:latest"
          fi
          echo "鏂伴暅鍍忥細${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/product-service/deployment.yaml
          
          echo "=== 鍙樻洿鍚庣殑閰嶇疆 ==="
          grep -A 2 "image:" deploy/product-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 閲嶈瘯鏈哄埗锛氬鐞嗗涓ā鍧楀苟琛屾帹閫佹椂鐨?Git 鍐茬獊
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/product-service/deployment.yaml; then
              echo "妫€娴嬪埌鍙樻洿锛屾彁浜?.."
              git add deploy/product-service/deployment.yaml
              # 鏍规嵁鍒嗘敮浣跨敤涓嶅悓鐨勬彁浜や俊鎭?
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update product image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update product image to latest [skip ci]"
              fi
              
              # 灏濊瘯鎺ㄩ€侊紝濡傛灉澶辫触鍒欓噸璇?
              if git push origin ${{ github.ref_name }}; then
                echo "鉁?Manifest 鏇存柊鎴愬姛锛?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "鈿狅笍 鎺ㄩ€佸け璐ワ紙鍙兘涓庡叾浠栨ā鍧楀啿绐侊級锛岄噸璇?$RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10  # 绛夊緟鍏朵粬妯″潡鎺ㄩ€佸畬鎴?
              fi
            else
              echo "鈿狅笍 娌℃湁妫€娴嬪埌鍙樻洿锛岃烦杩囨彁浜?
              exit 0
            fi
          done
          
          echo "鉂?閲嶈瘯 $MAX_RETRIES 娆″悗浠嶇劧澶辫触锛岃妫€鏌ユ棩蹇?
          exit 1

