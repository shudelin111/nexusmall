  build-docker-product:
    name: Build Docker Image - Product Service
    runs-on: ubuntu-latest
    needs: [build-product]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
