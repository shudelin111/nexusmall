# =====================================================
# GitHub Actions CI/CD Pipeline - NexusMall Order Service
# =====================================================
# GitOps 工作流程:
# 1. 代码提交触发
# 2. 自动编译 + 单元测试 + 代码质量检查
# 3. 构建 Docker 镜像并推送到 Docker Hub
# 4. Trivy 安全扫描
# 5. 更新 Kubernetes Manifest
# 6. ArgoCD 自动同步到 K8s 集群
# =====================================================

name: NexusMall Order CI/CD

# ========================================
# 触发条件
# ========================================
on:
  push:
    branches: [ master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, develop ]

# ========================================
# 环境变量
# ========================================
env:
  APP_NAME: nexusmall-order
  IMAGE_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

# ========================================
# 工作任务
# ========================================
jobs:
  # ========== 阶段 1: 编译与测试 ==========
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 步骤 2: 设置 Java 环境
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      # 步骤 2.5: 安装父项目和所有模块到本地仓库（多模块项目标准做法）
      - name: Install Parent POM and All Modules
        run: |
          echo "====== 安装父项目和公共模块 ======"
          # 从项目根目录执行 mvn install，会自动安装父 POM 和所有子模块
          mvn clean install -DskipTests -B
      
      # 步骤 3: 编译 Order 模块（现在所有依赖都已安装）
      - name: Compile with Maven
        run: |
          echo "====== 编译阶段 ======"
          mvn clean compile -f nexusmall-order/pom.xml -B
      
      # 步骤 4: 运行单元测试（仅当存在测试时）
      - name: Run Unit Tests
        run: |
          echo "====== 单元测试阶段 ======"
          if [ -d "nexusmall-order/src/test/java" ] && [ "$(find nexusmall-order/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            mvn test -f nexusmall-order/pom.xml -Dtest=*Test
          else
            echo "⚠️ 未找到测试文件，跳过测试"
          fi
        continue-on-error: true
      
      # 步骤 5: 上传测试报告（仅当测试执行时）
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: nexusmall-order/target/surefire-reports/
        continue-on-error: true
      
      # 步骤 6: 代码覆盖率检查（仅当有测试时）
      - name: Check Code Coverage
        run: |
          echo "生成覆盖率报告..."
          mvn jacoco:report -f nexusmall-order/pom.xml || echo "⚠️ 覆盖率报告生成失败（可能是没有测试）"

  # ========== 阶段 2: 代码质量检查 ==========
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-order/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-order/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-order/pom.xml
        continue-on-error: true

  # ========== 阶段 3: 构建 Docker 镜像 ==========
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 设置 Docker Buildx (支持多平台构建)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      # 生成镜像标签
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=long
      
      # 构建并推送
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-order/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      # 输出镜像信息
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 阶段 4: 安全扫描 ==========
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 登录 Docker Hub（Trivy 需要认证才能扫描私有镜像）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      # 使用 Trivy 直接扫描 Docker Hub 上的镜像（最标准做法）
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          # 直接指定远程镜像，Trivy 会自动拉取并扫描
          image-ref: '${{ env.IMAGE_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      # 上传扫描结果到 GitHub Security
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ========== 阶段 5: 更新 Kubernetes Manifest (GitOps 核心) ==========
  update-manifest:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 更新 deployment.yaml 中的镜像标签
      - name: Update image tag in deployment.yaml
        run: |
          echo "更新镜像标签..."
          NEW_IMAGE="${{ env.IMAGE_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:sha-${{ github.sha }}"
          echo "新镜像：${NEW_IMAGE}"
          
          # 使用 sed 替换镜像标签
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/order-service/deployment.yaml
          
          # 显示变更
          echo "=== 变更后的配置 ==="
          grep -A 2 "image:" deploy/order-service/deployment.yaml
      
      # 提交并推送 manifest 变更
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 检查是否有变更
          if ! git diff --quiet deploy/order-service/deployment.yaml; then
            echo "检测到变更，提交..."
            git add deploy/order-service/deployment.yaml
            git commit -m "chore(deploy): update ${APP_NAME} image to sha-${{ github.sha }} [skip ci]"
            git push origin master
            echo "✅ Manifest 更新成功！"
          else
            echo "⚠️ 没有检测到变更，跳过提交"
          fi

  # ========== 阶段 6: 生产环境部署（由 ArgoCD 自动完成）==========
  # 注意：不再需要手动部署步骤，ArgoCD 会自动同步 manifest 变更
  # 如果需要手动审批，可以使用 ArgoCD 的 manual sync 功能
