              echo "婵☆偀鍋撴繛鏉戭儏閸╁矂宕ｅΟ缁樼函闁挎稑鏈ぐ浣圭?.."
              git add deploy/order-service/deployment.yaml
              # 闁哄秷顫夊畵渚€宕氶崱妯绘殰濞达綀娉曢弫銈嗙▔瀹ュ懏鍊遍柣銊ュ瑜颁焦绂嶉妶鍕箚闁?
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update order image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update order image to latest [skip ci]"
              fi
              
              # 閻忓繑绻嗛惁顖炲箳閵娾斁鍋撴笟濠勭濠碘€冲€归悘澶嬪緞鏉堫偉袝闁告帗鐟╅崳鍝ユ嫚?
              if git push origin ${{ github.ref_name }}; then
                echo "闁?Manifest 闁哄洤鐡ㄩ弻濠囧箣閹邦剙顫犻柨?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "闁宠法濯寸粭?闁规亽鍔戦埀顑跨閵囨垹鎷归妷顖滅闁告瑯鍨甸崗妯荤▔鎼粹€冲緭濞寸姵鐗楄啯闁秆勵殔閸熻法绮ｆ笟濠勭闁挎稑鐭傞崳鍝ユ嫚?$RETRY_COUNT/$MAX_RETRIES..."
