      - name: Update image tag in deployment.yaml
        run: |
          echo "鏇存柊 Gateway 鏈嶅姟闀滃儚鏍囩..."
          # 鏍规嵁鍒嗘敮閫夋嫨鏍囩绛栫暐
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 鍒嗘敮锛氫娇鐢?sha 鏍囩锛岀‘淇濈増鏈彲杩芥函锛堢敓浜х幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:sha-${{ github.sha }}"
          else
