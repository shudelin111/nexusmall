                sleep 10  # 绛夊緟鍏朵粬妯″潡鎺ㄩ€佸畬鎴?
              fi
            else
              echo "鈿狅笍 娌℃湁妫€娴嬪埌鍙樻洿锛岃烦杩囨彁浜?
              exit 0
            fi
