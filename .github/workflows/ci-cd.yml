# =====================================================
# GitHub Actions CI/CD Pipeline - NexusMall Multi-Module
# =====================================================
# 业界标准实践：单仓库直接在主文件中实现所有 jobs
# 可复用 workflow (workflow_call) 仅用于跨仓库场景
# =====================================================

name: NexusMall CI/CD

# ========================================
# 触发条件
# ========================================
on:
  push:
    branches: [ master, dev ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/workflows/**'  # CI/CD配置文件变更不触发构建
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:

# ========================================
# 并发控制
# ========================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ========================================
# 权限配置
# ========================================
permissions:
  contents: write
  security-events: write
  actions: read

# ========================================
# 环境变量
# ========================================
env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

# ========================================
# Jobs
# ========================================
jobs:
  # ========== 阶段 0: 检测变更模块 ==========
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      notification-changed: ${{ steps.filter.outputs.notification }}
      order-changed: ${{ steps.filter.outputs.order }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      common-changed: ${{ steps.filter.outputs.common }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 只获取最近2次提交，用于检测单次提交的变更
      
      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            notification:
              - 'nexusmall-notification/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            order:
              - 'nexusmall-order/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            gateway:
              - 'nexusmall-gateway/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            common:
              - 'nexusmall-common/**'
              - 'pom.xml'

  # ========== 阶段 1: 编译 Notification 模块 ==========
  build-notification:
    name: Build & Test - Notification Service
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.notification-changed == 'true' ||
      needs.detect-changes.outputs.common-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 安装父项目和公共模块 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Notification Module
        run: |
          echo "====== 编译 Notification 模块 ======"
          mvn clean compile -f nexusmall-notification/pom.xml -B

  # ========== 阶段 1: 编译 Order 模块 ==========
  build-order:
    name: Build & Test - Order Service
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.order-changed == 'true' ||
      needs.detect-changes.outputs.common-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 安装父项目和公共模块 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Order Module
        run: |
          echo "====== 编译 Order 模块 ======"
          mvn clean compile -f nexusmall-order/pom.xml -B

  # ========== 阶段 1: 编译 Gateway 模块 ==========
  build-gateway:
    name: Build & Test - Gateway Service
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.gateway-changed == 'true' ||
      needs.detect-changes.outputs.common-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 安装父项目和公共模块 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Gateway Module
        run: |
          echo "====== 编译 Gateway 模块 ======"
          mvn clean compile -f nexusmall-gateway/pom.xml -B

  # ========== 阶段 2: 构建 Docker 镜像 - Notification ==========
  build-docker-notification:
    name: Build Docker - Notification Service
    needs: [build-notification]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-notification/Dockerfile
          push: true
          tags: |
            ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-notification:sha-${{ github.sha }}
            ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-notification:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========== 阶段 2: 构建 Docker 镜像 - Order ==========
  build-docker-order:
    name: Build Docker - Order Service
    needs: [build-order]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-order/Dockerfile
          push: true
          tags: |
            ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-order:sha-${{ github.sha }}
            ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-order:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========== 阶段 2: 构建 Docker 镜像 - Gateway ==========
  build-docker-gateway:
    name: Build Docker - Gateway Service
    needs: [build-gateway]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:sha-${{ github.sha }}
            ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
