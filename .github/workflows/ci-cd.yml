  # 闂傚啳鍩栭?4: 閻庣懓顦崣蹇涘箥椤愶絽浼?- Cart 婵☆垪鈧櫕鍋?
  security-scan-cart:
    name: Security Scan - Cart Service
    runs-on: ubuntu-latest
    needs: [build-docker-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-cart-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-cart-results.sarif'
          category: 'trivy-cart-scan'

  # 闂傚啳鍩栭?5: 闁哄洤鐡ㄩ弻?Kubernetes Manifest - Cart 婵☆垪鈧櫕鍋?
  update-manifest-cart:
    name: Update K8s Manifest - Cart Service
    runs-on: ubuntu-latest
    needs: [security-scan-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "闁哄洤鐡ㄩ弻?Cart 闁哄牆绉存慨鐔兼⒐濠婂啫鍓奸柡宥呮川椤?.."
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:latest"
          fi
          echo "闁哄倷鍗抽弳鍛村磽韫囥儳绐?{NEW_IMAGE}"
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/cart-service/deployment.yaml
          echo "=== 闁告瑦蓱濞插潡宕ユ惔锝嗙暠闂佹澘绉堕悿?==="
          grep -A 2 "image:" deploy/cart-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/cart-service/deployment.yaml; then
              echo "婵☆偀鍋撴繛鏉戭儏閸╁矂宕ｅΟ缁樼函闁挎稑鏈ぐ浣圭?.."
              git add deploy/cart-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update cart image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update cart image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                echo "闁?Manifest 闁哄洤鐡ㄩ弻濠囧箣閹邦剙顫犻柨?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "闁宠法濯寸粭?闁规亽鍔戦埀顑跨閵囨垹鎷归妷顖滅闂佹彃绉烽惁?$RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              echo "闁宠法濯寸粭?婵炲备鍓濆﹢浣肝涢埀顒€霉鐎ｎ亜鐓傞柛娆惿戝ú鍧楁晬瀹€鍐劜閺夆晛娲﹁ぐ浣圭?
              exit 0
            fi
          done
          echo "闁?闂佹彃绉烽惁?$MAX_RETRIES 婵炲棌鈧櫕鍊靛ù鐘茬Ф閸斞勫緞鏉堫偉袝闁挎稑鐭侀顒€螞閳ь剟寮婚妷锔斤級闊?
          exit 1

  # ========== logistics Service CI/CD Pipeline ==========
  
  build-logistics:
    name: Build & Test - logistics Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.logistics-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Install Parent and Common
        run: |
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      - name: Compile logistics Module
        run: mvn clean compile -f nexusmall-logistics/pom.xml -B
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logistics-test-results
          path: nexusmall-logistics/target/surefire-reports/
          retention-days: 30

  quality-check-logistics:
    name: Quality Check - logistics Service
    runs-on: ubuntu-latest
    needs: [build-logistics]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-logistics/pom.xml
        continue-on-error: true
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-logistics/pom.xml
        continue-on-error: true
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-logistics/pom.xml
        continue-on-error: true

  build-docker-logistics:
    name: Build Docker Image - logistics Service
    runs-on: ubuntu-latest
    needs: [build-logistics]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.logistics-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-logistics/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  security-scan-logistics:
    name: Security Scan - logistics Service
    runs-on: ubuntu-latest
    needs: [build-docker-logistics]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-logistics-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-logistics-results.sarif'
          category: 'trivy-logistics-scan'

  update-manifest-logistics:
    name: Update K8s Manifest - logistics Service
    runs-on: ubuntu-latest
    needs: [security-scan-logistics]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag in deployment.yaml
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics:latest"
          fi
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/logistics-service/deployment.yaml
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/logistics-service/deployment.yaml; then
              git add deploy/logistics-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update logistics image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update logistics image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              exit 0
            fi
          done
          exit 1



# =====================================================
# GitHub Actions CI/CD Pipeline - NexusMall Multi-Module
# =====================================================
# GitOps 鐎规悶鍎扮紞鏂棵规担琛℃煠:
# 1. 闁糕晞妗ㄧ花顒勫棘閸ワ附顐介柛娆惿戝ú鍧楀疾妤﹀灝鍘撮悷娆欑畱瑜板倿鏁嶉崼锝囩唴鐎垫澘瀚换鍐煥閵堝繒绀?
# 2. 闁煎浜滄慨鈺冪磽閺嶎剛妲?+ 闁告娲栭崢鎾趁圭€ｎ厾妲?+ 濞寸媴绲块悥婊呮嫻閵娾晛娅ゆ俊顐熷亾闁?
# 3. 闁哄瀚紓?Docker 闂傗偓濠婂啫鍓兼鐐跺煐鐢綊鏌呮担绋跨厒 Docker Hub
# 4. Trivy 閻庣懓顦崣蹇涘箥椤愶絽浼?
# 5. 闁哄洤鐡ㄩ弻?Kubernetes Manifest
# 6. ArgoCD 闁煎浜滄慨鈺呭触鐏炵虎鍔勯柛?K8s 闂傚棗妫涢崗?
#
# 濞戞挻姘ㄩ弲顐﹀冀閸パ冩珯閻庡湱鍋犳潻鏃堟晬?
# - 閻犱警鍨扮欢鐐存交閸ャ劍濮㈤柨娑欒壘瑜把囧几閸曨偆绱﹂柛娆惿戝ú鍧楁儍閸曨儫渚€宕?
# - 妤犵偞鍎奸、鎴﹀几閸曨偆绱﹂柨娑欒壘椤︽寧绋夐鍚ヤ線宕稿Δ鈧幃鎾诲籍閼哥數鈧垰顕?
# - 濠⒀呭仱閸ｆ椽寮搁崟顐ょ处闁挎稒鑹捐ぐ褏绱撻弽顒傛Н闁告瑦蓱濞插潡鎯冮崟顏勬暕闁?
# =====================================================

name: NexusMall CI/CD

# ========================================
# 閻熸瑱绠戣ぐ鍌炲级閳ュ弶顐介柨娑樼墛閺侇噣骞愭担鐣岀唴鐎垫澘瀚换鍐煥閵堝繒绀?
# ========================================
on:
  push:
    branches: [ master, dev ]  # master 闁活潿鍔嬬花顒勬偨閻斿爼鐛撻柨娑樼暢ev 闁活潿鍔嬬花顒€顕ｉ埀顒勫矗?
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ master, dev ]  # master 闁活潿鍔嬬花顒勬偨閻斿爼鐛撻柨娑樼暢ev 闁活潿鍔嬬花顒€顕ｉ埀顒勫矗?
  workflow_dispatch:  # 闁稿繋娴囬蹇涘箥鐎ｎ亜袟閻熸瑱绠戣ぐ?

# ========================================
# 妤犵偠娉涜ぐ鍌炲箳瑜嶉崺妤呮晬閸絽娈伴柛鏂诲妼瑜板洤鈽夐崼鐔革紜闁?workflow闁?
# ========================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ========================================
# 闁哄鍟村娲煀瀹ュ洨鏋傞柨娑樼墔閹便劍寰?CodeQL 闁哄鍟村娲煥濞嗘帩鍤栭柨?
# ========================================
permissions:
  contents: write  # 闂傚洠鍋撻悷鏇氱閸熸捇宕楅妷锔界秬闂傚嫭鍔栨晶鐘绘嚄閼恒儱鑵归梺顐℃閸烆剟鎯?
  security-events: write
  actions: read

# ========================================
# 闁绘粠鍨伴。銊╁矗濮椻偓閸?
# ========================================
env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"  # 缂備胶鍠嶇粩瀵告媼閸撗呮瀭 Java 缂傚倹鐗滈悥婊勭▔?UTF-8闁挎稑鐭傛导鈺呭礂?Nacos 闂佹澘绉堕悿鍡欐喆閿濆棛鈧姤绋婃潏鈺冨灣

# ========================================
# 鐎规悶鍎扮紞鏃堟儗閳哄懏鈻堥梺鏉跨Ф閻ゅ棝鏁嶉崼婊呯懝闁伙絽鏈悥锝夊礄閸℃ぞ绮垫繛澶嬫穿缁?
# ========================================
# 閻庤鐭粻鐔烘啺娴ｅ湱鈧垰顕欓搹瑙勭暠婵☆垪鈧櫕鍋ラ柛娆忥工閸欏墽鎹勯姘辩獮闁哄嫮濮撮惃?
jobs:
  # ========== 闂傚啳鍩栭?0: 婵☆偀鍋撴繛鏉戭儏瑜板寮寸€涙◥渚€宕?==========
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      order-changed: ${{ steps.filter.outputs.order }}
      product-changed: ${{ steps.filter.outputs.product }}
      auth-changed: ${{ steps.filter.outputs.auth }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      common-changed: ${{ steps.filter.outputs.common }}
      member-changed: ${{ steps.filter.outputs.member }}
      payment-changed: ${{ steps.filter.outputs.payment }}
      cart-changed: ${{ steps.filter.outputs.cart }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      search-changed: ${{ steps.filter.outputs.search }}
      logistics-changed: ${{ steps.filter.outputs.logistics }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 濞达綀娉曢弫?paths-filter 婵☆偀鍋撴繛鏉戭儏瑜板寮存潏鍓х濞戞挻姘ㄩ弲顐﹀冀閸パ冩珯鐎规悶鍎遍崣鍧楁晬?
      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            order: 
              - 'nexusmall-order/**'
              - 'nexusmall-common/**'  # common 闁告瑦蓱濞叉寧绋婇悢鍓佺獥鐟滄澘宕幖?order
              - 'pom.xml'  # 闁?pom.xml 闁告瑦蓱濞茶儻銇愰崡鐐存儥闁圭鍋撻柡鍫濐槹鑶╅柛?
              - 'nexusmall-common/pom.xml'  # 闁?POM 闁告瑦蓱濞叉寧绋婇悢宄邦殯闁告繂绉垫晶宥夊嫉婢跺瑔渚€宕?
            product:
              - 'nexusmall-product/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            auth:
              - 'nexusmall-auth/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            gateway:
              - 'nexusmall-gateway/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            common:
              - 'nexusmall-common/**'
              - 'pom.xml'  # 闁?pom.xml 闁告瑦蓱濞茶儻銇愰崡鐐存儥 common 婵☆垪鈧櫕鍋?
            member:
              - 'nexusmall-member/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            payment:
              - 'nexusmall-payment/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            cart:
              - 'nexusmall-cart/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            promotion:
              - 'nexusmall-promotion/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            search:
              - 'nexusmall-search/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            logistics:
              - 'nexusmall-logistics/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'

  # ========== 闂傚啳鍩栭?1: 缂傚倹鐗為惁褎绋夋惔銏偞閻?- Product 婵☆垪鈧櫕鍋?==========
  build-product:
    name: Build & Test - Product Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 閻庣懓顦抽ˉ濠囨偉閸洏鈧秹鎯勯鍏煎闁稿浚鍓欓崣鈥澄熼垾铏仴 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Product Module
        run: |
          echo "====== 缂傚倹鐗為惁?Product 婵☆垪鈧櫕鍋?======"
