              exit 0
            fi
          done
          
          echo "閴?闁插秷鐦?$MAX_RETRIES 濞嗏€虫倵娴犲秶鍔ф径杈Е閿涘矁顕Λ鈧弻銉︽）韫?
          exit 1

  # ========== 闂冭埖顔?1: 缂傛牞鐦ф稉搴㈢ゴ鐠?- Gateway 濡€虫健 ==========
  build-gateway:
    name: Build & Test - Gateway Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.gateway-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
