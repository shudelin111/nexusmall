              exit 0
            fi
          done
          
          echo "闁?闂佹彃绉烽惁?$MAX_RETRIES 婵炲棌鈧櫕鍊靛ù鐘茬Ф閸斞勫緞鏉堫偉袝闁挎稑鐭侀顒€螞閳ь剟寮婚妷锔斤級闊?
          exit 1

  # ========== 闂傚啳鍩栭?1: 缂傚倹鐗為惁褎绋夋惔銏偞閻?- Gateway 婵☆垪鈧櫕鍋?==========
  build-gateway:
    name: Build & Test - Gateway Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.gateway-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 閻庣懓顦抽ˉ濠囨偉閸洏鈧秹鎯勯鍏煎闁稿浚鍓欓崣鈥澄熼垾铏仴 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Gateway Module
        run: |
          echo "====== 缂傚倹鐗為惁?Gateway 婵☆垪鈧櫕鍋?======"
          mvn clean compile -f nexusmall-gateway/pom.xml -B
      
      - name: Run Gateway Module Tests
        # 闁宠法濯寸粭?濞戞挸鐡ㄥ鍌滅矉娴ｇ儤鏆忛柨娑欑搳acos 濞戞挸鎼崬瀵哥磾閹寸偞绠涢柛鏂烘缁辨桓itHub Actions 闁哄啰濮电涵鍓佹媼閸ф锛?
        # TODO: 闁诡厹鍨归ˇ鎻捗圭€ｎ厾妲搁柛姘捣浜涢梻鍕╁€栭婵嗏枖閵娾晛娅?
        if: false  # 濞戞挸鐡ㄥ鍌滅矉娴ｇ儤鏆?
        run: |
          echo "====== 闁告娲栭崢鎾趁圭€ｎ厾妲搁梻鍐煐椤?======"
          if [ -d "nexusmall-gateway/src/test/java" ] && [ "$(find nexusmall-gateway/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            mvn test -f nexusmall-gateway/pom.xml -Dtest=*Test
          else
            echo "闁宠法濯寸粭?闁哄牜浜濇竟姗€宕氶悧鍫偞閻犲洦娲橀弸鍐╃鐠佸湱绀夐悹鍝勭枃缁诲啫霉鐎ｎ厾妲?
          fi
        continue-on-error: true
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-results
          path: nexusmall-gateway/target/surefire-reports/
        continue-on-error: true
      
      - name: Check Code Coverage
        run: |
          echo "闁汇垻鍠愰崹姘辨啺閸℃瑦纾伴柣婊冩处婵倝宕?.."
          mvn jacoco:report -f nexusmall-gateway/pom.xml || echo "闁宠法濯寸粭?閻熸洖妫涘ú濠囨偝閸ャ劌袚闁告稑锕﹂弫鎾诲箣閹邦兙浜奸悹?

  # ========== 闂傚啳鍩栭?2: 濞寸媴绲块悥婊呮嫻閵娾晛娅ゆ俊顐熷亾闁?- Gateway 婵☆垪鈧櫕鍋?==========
  quality-check-gateway:
    name: Quality Check - Gateway Service
    runs-on: ubuntu-latest
    needs: [build-gateway]
    # dev 闁?master 闁告帒妫欓弫顕€鏌堥懞銉モ挃閻炴稑鐭佸婵嬫煂韫囨棏姊鹃柡?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-gateway/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-gateway/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-gateway/pom.xml
        continue-on-error: true

  # ========== 闂傚啳鍩栭?3: 闁哄瀚紓?Docker 闂傗偓濠婂啫鍓?- Gateway 婵☆垪鈧櫕鍋?==========
  build-docker-gateway:
    name: Build Docker Image - Gateway Service
    runs-on: ubuntu-latest
    needs: [build-gateway]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.gateway-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway
          tags: |
            # dev 闁告帒妫欓弫顕€鏁嶅顐⑩枏闁?latest 闁哄秴娲ㄩ鐑芥晬閸喐浠橀柡鍌涙緲缁辨垿宕ｉ幋鐘差暭闁挎稑鑻槐鎴﹀矗閹寸姴绠氬褍鍟╂繛鍥偨椤帞绀?
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            # 閻犲浂鍘虹粻鐔煎礌閺嶎偄顣奸柡鍫墾缁辨瑦绂掗崨顔尖叺 tag 闁哄啫澧庨弫鎾诲箣閹板墎绀夊┑?v1.2.3闁?
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 闁圭鍋撻柡鍫濐槸閸ㄥ酣寮ㄩ銈囩獥闂侇喚鏅弫鎾诲箣?sha 闁哄秴娲ㄩ鐑芥晬閸垺鏆忓ù婊冩捣缁ㄨ法娑甸鎸庡婵犙屽灲缁?
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 闂傚啳鍩栭?4: 閻庣懓顦崣蹇涘箥椤愶絽浼?- Gateway 婵☆垪鈧櫕鍋?==========
  security-scan-gateway:
    name: Security Scan - Gateway Service
    runs-on: ubuntu-latest
    needs: [build-docker-gateway]
    # dev 闁?master 闂侇喛濮ゆ晶鐣屾偘鐏炵晫鏆旈柛蹇嬪妽婢瑰倿骞?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-gateway-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-gateway-results.sarif'
          category: 'trivy-gateway-scan'

