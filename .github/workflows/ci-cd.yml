          # 鏍规嵁鍒嗘敮閫夋嫨鏍囩绛栫暐
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 鍒嗘敮锛氫娇鐢?sha 鏍囩锛岀‘淇濈増鏈彲杩芥函锛堢敓浜х幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-auth:sha-${{ github.sha }}"
          else
            # dev 鍒嗘敮锛氫娇鐢?latest 鏍囩锛岃嚜鍔ㄦ媺鍙栨渶鏂帮紙寮€鍙戠幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-auth:latest"
          fi
          echo "鏂伴暅鍍忥細${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/auth-service/deployment.yaml
          
          echo "=== 鍙樻洿鍚庣殑閰嶇疆 ==="
          grep -A 2 "image:" deploy/auth-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 閲嶈瘯鏈哄埗锛氬鐞嗗涓ā鍧楀苟琛屾帹閫佹椂鐨?Git 鍐茬獊
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/auth-service/deployment.yaml; then
              echo "妫€娴嬪埌鍙樻洿锛屾彁浜?.."
              git add deploy/auth-service/deployment.yaml
