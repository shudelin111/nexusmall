          grep -A 2 "image:" deploy/member-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 闂佹彃绉烽惁顖炲嫉閸濆嫬鐓戦柨娑欒壘椤︹晠鎮堕崱妤婃▼濞戞搩浜濊啯闁秆勵殔閼荤喓鎮扮仦鎯ц吂闂侇偂鐒﹀鍌炴儍?Git 闁告劘灏欓悰?
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/member-service/deployment.yaml; then
              echo "婵☆偀鍋撴繛鏉戭儏閸╁矂宕ｅΟ缁樼函闁挎稑鏈ぐ浣圭?.."
              git add deploy/member-service/deployment.yaml
              # 闁哄秷顫夊畵渚€宕氶崱妯绘殰濞达綀娉曢弫銈嗙▔瀹ュ懏鍊遍柣銊ュ瑜颁焦绂嶉妶鍕箚闁?
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update member image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update member image to latest [skip ci]"
              fi
              
              # 閻忓繑绻嗛惁顖炲箳閵娾斁鍋撴笟濠勭濠碘€冲€归悘澶嬪緞鏉堫偉袝闁告帗鐟╅崳鍝ユ嫚?
              if git push origin ${{ github.ref_name }}; then
                echo "闁?Manifest 闁哄洤鐡ㄩ弻濠囧箣閹邦剙顫犻柨?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "闁宠法濯寸粭?闁规亽鍔戦埀顑跨閵囨垹鎷归妷顖滅闁告瑯鍨甸崗妯荤▔鎼粹€冲緭濞寸姵鐗楄啯闁秆勵殔閸熻法绮ｆ笟濠勭闁挎稑鐭傞崳鍝ユ嫚?$RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10  # 缂佹稑顦欢鐔煎礂閺堢數閾傛俊顖椻偓铏仴闁规亽鍔戦埀顑跨閻ｎ剟骞?
              fi
            else
              echo "闁宠法濯寸粭?婵炲备鍓濆﹢浣肝涢埀顒€霉鐎ｎ亜鐓傞柛娆惿戝ú鍧楁晬瀹€鍐劜閺夆晛娲﹁ぐ浣圭?
              exit 0
            fi
          done
          
          echo "闁?闂佹彃绉烽惁?$MAX_RETRIES 婵炲棌鈧櫕鍊靛ù鐘茬Ф閸斞勫緞鏉堫偉袝闁挎稑鐭侀顒€螞閳ь剟寮婚妷锔斤級闊?
          exit 1

  # ========== 闂傚啳鍩栭?6: 闁汇垻鍠嶆鍥偝椤栨凹鏆旈梺顔哄妿鐠佹煡鏁嶉崼銏℃殸 ArgoCD 闁煎浜滄慨鈺冣偓鐟版湰閸ㄦ岸鏁?=========
  # 婵炲鍔嶉崜浼存晬濮橆偆鐟濋柛鎰Ч濞撳墎鎲版担鐟邦杹闁告柣鍔戦崕瀵哥磾閸欏鍔勫Δ鐘€х槐婊眗goCD 濞村吋淇洪崵婊堝礉閵娿儲鍊辨慨?manifest 闁告瑦蓱濞?
  # 濠碘€冲€归悘澶愭閳ь剛鎲版担鐟邦杹闁告柣鍔岄鎼佸箥閻у摜绀夐柛娆樺灟娴滄帗鎷呯捄銊︽殢 ArgoCD 闁?manual sync 闁告梻鍠曢崗?

  # ========== Cart Service CI/CD Pipeline ==========
  
  # 闂傚啳鍩栭?1: 缂傚倹鐗為惁褎绋夋惔銏偞閻?- Cart 婵☆垪鈧櫕鍋?
  build-cart:
    name: Build & Test - Cart Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.cart-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 閻庣懓顦抽ˉ濠囨偉閸洏鈧秹鎯勯鍏煎闁稿浚鍓欓崣鈥澄熼垾铏仴 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Cart Module
        run: |
          echo "====== 缂傚倹鐗為惁?Cart 婵☆垪鈧櫕鍋?======"
          mvn clean compile -f nexusmall-cart/pom.xml -B
      
      - name: Run Cart Module Tests with Coverage
        if: false  # 濞戞挸鐡ㄥ鍌滅矉娴ｇ儤鏆忛柨娑欑搳acos 濞戞挸鎼崬瀵哥磾閹寸偞绠涢柛?
        run: |
          echo "====== 闁告娲栭崢鎾趁圭€ｎ厾妲搁梻鍐煐椤?(閻?JaCoCo 閻熸洖妫涘ú濠囨偝閸ヮ煈姊鹃柡? ======"
          if [ -d "nexusmall-cart/src/test/java" ] && [ "$(find nexusmall-cart/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            mvn clean test jacoco:check -f nexusmall-cart/pom.xml -B
          else
            echo "闁宠法濯寸粭?闁哄牜浜濇竟姗€宕氶悧鍫偞閻犲洦娲橀弸鍐╃鐠佸湱绀夐悹鍝勭枃缁诲啫霉鐎ｎ厾妲?
          fi
      
      - name: Upload Test Results and Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cart-test-and-coverage
          path: |
            nexusmall-cart/target/surefire-reports/
            nexusmall-cart/target/site/jacoco/
          retention-days: 30

  # 闂傚啳鍩栭?2: 濞寸媴绲块悥婊呮嫻閵娾晛娅ゆ俊顐熷亾闁?- Cart 婵☆垪鈧櫕鍋?
  quality-check-cart:
    name: Quality Check - Cart Service
    runs-on: ubuntu-latest
    needs: [build-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-cart/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-cart/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-cart/pom.xml
        continue-on-error: true

  # 闂傚啳鍩栭?3: 闁哄瀚紓?Docker 闂傗偓濠婂啫鍓?- Cart 婵☆垪鈧櫕鍋?
  build-docker-cart:
    name: Build Docker Image - Cart Service
    runs-on: ubuntu-latest
    needs: [build-cart]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.cart-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-cart/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # 闂傚啳鍩栭?4: 閻庣懓顦崣蹇涘箥椤愶絽浼?- Cart 婵☆垪鈧櫕鍋?
  security-scan-cart:
