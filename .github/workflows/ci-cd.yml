  build-docker-auth:
    name: Build Docker Image - Auth Service
    runs-on: ubuntu-latest
    needs: [build-auth]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.auth-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-auth
          tags: |
            # dev 閸掑棙鏁敍姘▏閻?latest 閺嶅洨顒烽敍鍫熸付閺傛澘绱戦崣鎴犲閿涘苯绱戦崣鎴犲箚婢у啩濞囬悽顭掔礆
