          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 閸掑棙鏁敍姘▏閻?sha 閺嶅洨顒烽敍宀€鈥樻穱婵堝閺堫剙褰叉潻鑺ュ嚱閿涘牏鏁撴禍褏骞嗘晶鍐跨礆
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:sha-${{ github.sha }}"
          else
            # dev 閸掑棙鏁敍姘▏閻?latest 閺嶅洨顒烽敍宀冨殰閸斻劍濯洪崣鏍ㄦ付閺傚府绱欏鈧崣鎴犲箚婢у喛绱?
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-gateway:latest"
          fi
          echo "閺備即鏆呴崓蹇ョ窗${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/gateway-service/deployment.yaml
          
          echo "=== 閸欐ɑ娲块崥搴ｆ畱闁板秶鐤?==="
          grep -A 2 "image:" deploy/gateway-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
