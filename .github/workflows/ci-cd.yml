  # ========== 闂冭埖顔?3: 閺嬪嫬缂?Docker 闂€婊冨剼 - Order 濡€虫健 ==========
  build-docker-order:
    name: Build Docker Image - Order Service
    runs-on: ubuntu-latest
    needs: [build-order]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.order-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-order
          tags: |
            # dev 閸掑棙鏁敍姘▏閻?latest 閺嶅洨顒烽敍鍫熸付閺傛澘绱戦崣鎴犲閿涘苯绱戦崣鎴犲箚婢у啩濞囬悽顭掔礆
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            # 鐠囶厺绠熼崠鏍閺堫剨绱欐禒鍛ⅵ tag 閺冨墎鏁撻幋鎰剁礉婵?v1.2.3閿?
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 閹碘偓閺堝鍨庨弨顖ょ窗闁晫鏁撻幋?sha 閺嶅洨顒烽敍鍫㈡暏娴滃海绨跨涵顔挎嫹濠ь垽绱?
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-order/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

