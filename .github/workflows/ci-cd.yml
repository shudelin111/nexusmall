  # ========== 闂傚啳鍩栭?3: 闁哄瀚紓?Docker 闂傗偓濠婂啫鍓?- Order 婵☆垪鈧櫕鍋?==========
  build-docker-order:
    name: Build Docker Image - Order Service
    runs-on: ubuntu-latest
    needs: [build-order]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.order-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-order
          tags: |
            # dev 闁告帒妫欓弫顕€鏁嶅顐⑩枏闁?latest 闁哄秴娲ㄩ鐑芥晬閸喐浠橀柡鍌涙緲缁辨垿宕ｉ幋鐘差暭闁挎稑鑻槐鎴﹀矗閹寸姴绠氬褍鍟╂繛鍥偨椤帞绀?
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            # 閻犲浂鍘虹粻鐔煎礌閺嶎偄顣奸柡鍫墾缁辨瑦绂掗崨顔尖叺 tag 闁哄啫澧庨弫鎾诲箣閹板墎绀夊┑?v1.2.3闁?
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 闁圭鍋撻柡鍫濐槸閸ㄥ酣寮ㄩ銈囩獥闂侇喚鏅弫鎾诲箣?sha 闁哄秴娲ㄩ鐑芥晬閸垺鏆忓ù婊冩捣缁ㄨ法娑甸鎸庡婵犙屽灲缁?
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-order/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 闂傚啳鍩栭?4: 閻庣懓顦崣蹇涘箥椤愶絽浼?- Order 婵☆垪鈧櫕鍋?==========
  security-scan-order:
    name: Security Scan - Order Service
    runs-on: ubuntu-latest
    needs: [build-docker-order]
    # 濞ｅ浂鍠楅弫濂告晬濮濈€峷 闁?master 闂侇喛濮ゆ晶鐣屾偘鐏炵晫鏆旈柛蹇嬪妽婢瑰倿骞?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
