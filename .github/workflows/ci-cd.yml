name: NexusMall CI/CD

on:
  push:
    branches: [master, dev]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - '*.log'
      - '*.ps1'
      - '*.bat'
      - '*.py'
      - '*.txt'
      - '*.sh'
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # 先识别本次变更影响了哪些模块，再决定后续实际要跑哪些服务。
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      workflow-changed: ${{ steps.filter.outputs.workflow }}
      order-changed: ${{ steps.filter.outputs.order }}
      product-changed: ${{ steps.filter.outputs.product }}
      auth-changed: ${{ steps.filter.outputs.auth }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      member-changed: ${{ steps.filter.outputs.member }}
      payment-changed: ${{ steps.filter.outputs.payment }}
      cart-changed: ${{ steps.filter.outputs.cart }}
      notification-changed: ${{ steps.filter.outputs.notification }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      search-changed: ${{ steps.filter.outputs.search }}
      logistics-changed: ${{ steps.filter.outputs.logistics }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
      service-matrix: ${{ steps.build-matrix.outputs.service-matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # PR 使用目标分支的 base SHA，push 使用 before，手动触发时回退到当前 ref。
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || github.ref }}
          filters: |
            workflow:
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            order:
              - 'nexusmall-order/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            product:
              - 'nexusmall-product/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            auth:
              - 'nexusmall-auth/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            gateway:
              - 'nexusmall-gateway/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            member:
              - 'nexusmall-member/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            payment:
              - 'nexusmall-payment/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            cart:
              - 'nexusmall-cart/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            notification:
              - 'nexusmall-notification/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            promotion:
              - 'nexusmall-promotion/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            search:
              - 'nexusmall-search/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            logistics:
              - 'nexusmall-logistics/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
              - '.github/workflows/**'
              - '.github/workflow-presets/**'

      - name: Build service matrix
        id: build-matrix
        shell: pwsh
        run: |
          # 这里维护“服务元数据单一来源”，主流程只消费组装后的矩阵。
          $services = @(
            @{ key = 'product'; changed = '${{ steps.filter.outputs.product }}'; service_name = 'Product Service'; module_dir = 'nexusmall-product'; image_name = 'nexusmall-product'; deployment_file = 'deploy/product-service/deployment.yaml' },
            @{ key = 'order'; changed = '${{ steps.filter.outputs.order }}'; service_name = 'Order Service'; module_dir = 'nexusmall-order'; image_name = 'nexusmall-order'; deployment_file = 'deploy/order-service/deployment.yaml' },
            @{ key = 'gateway'; changed = '${{ steps.filter.outputs.gateway }}'; service_name = 'Gateway Service'; module_dir = 'nexusmall-gateway'; image_name = 'nexusmall-gateway'; deployment_file = 'deploy/gateway-service/deployment.yaml' },
            @{ key = 'auth'; changed = '${{ steps.filter.outputs.auth }}'; service_name = 'Auth Service'; module_dir = 'nexusmall-auth'; image_name = 'nexusmall-auth'; deployment_file = 'deploy/auth-service/deployment.yaml' },
            @{ key = 'member'; changed = '${{ steps.filter.outputs.member }}'; service_name = 'Member Service'; module_dir = 'nexusmall-member'; image_name = 'nexusmall-member'; deployment_file = 'deploy/member-service/deployment.yaml' },
            @{ key = 'cart'; changed = '${{ steps.filter.outputs.cart }}'; service_name = 'Cart Service'; module_dir = 'nexusmall-cart'; image_name = 'nexusmall-cart'; deployment_file = 'deploy/cart-service/deployment.yaml' },
            @{ key = 'notification'; changed = '${{ steps.filter.outputs.notification }}'; service_name = 'Notification Service'; module_dir = 'nexusmall-notification'; image_name = 'nexusmall-notification'; deployment_file = 'deploy/notification-service/deployment.yaml' },
            @{ key = 'promotion'; changed = '${{ steps.filter.outputs.promotion }}'; service_name = 'Promotion Service'; module_dir = 'nexusmall-promotion'; image_name = 'nexusmall-promotion'; deployment_file = 'deploy/promotion-service/deployment.yaml' },
            @{ key = 'search'; changed = '${{ steps.filter.outputs.search }}'; service_name = 'Search Service'; module_dir = 'nexusmall-search'; image_name = 'nexusmall-search'; deployment_file = 'deploy/search-service/deployment.yaml' },
            @{ key = 'logistics'; changed = '${{ steps.filter.outputs.logistics }}'; service_name = 'Logistics Service'; module_dir = 'nexusmall-logistics'; image_name = 'nexusmall-logistics'; deployment_file = 'deploy/logistics-service/deployment.yaml' },
            @{ key = 'inventory'; changed = '${{ steps.filter.outputs.inventory }}'; service_name = 'Inventory Service'; module_dir = 'nexusmall-inventory'; image_name = 'nexusmall-inventory'; deployment_file = 'deploy/inventory-service/deployment.yaml' },
            @{ key = 'payment'; changed = '${{ steps.filter.outputs.payment }}'; service_name = 'Payment Service'; module_dir = 'nexusmall-payment'; image_name = 'nexusmall-payment'; deployment_file = 'deploy/payment-service/deployment.yaml' }
          )

          # 手动触发或 workflow 基础设施变更时，默认跑全部服务，避免 CI 自己改坏了却没有真实校验。
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -or '${{ steps.filter.outputs.workflow }}' -eq 'true') {
            $selected = $services
          } else {
            $selected = $services | Where-Object { $_.changed -eq 'true' }
          }

          $matrix = @{ include = @($selected) } | ConvertTo-Json -Compress -Depth 4
          "service-matrix=$matrix" >> $env:GITHUB_OUTPUT

  # 将受影响的服务分发到同一套 reusable workflow 中执行，避免主流程复制多份相同逻辑。
  service-pipeline:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.service-matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.service-matrix) }}
    uses: ./.github/workflows/reusable-service-pipeline.yml
    permissions:
      contents: write
      security-events: write
    with:
      service_name: ${{ matrix.service_name }}
      module_dir: ${{ matrix.module_dir }}
      image_name: ${{ matrix.image_name }}
      deployment_file: ${{ matrix.deployment_file }}
      # 如需启用模块测试，请取消下面三行注释，并按模块实际情况调整命令。
      # test_enabled: true
      # test_command: mvn -pl ${{ matrix.module_dir }} -am test -B
      # test_artifact_name: ${{ matrix.image_name }}-test-report
    secrets: inherit
