          echo "=== 闁告瑦蓱濞插潡宕ユ惔锝嗙暠闂佹澘绉堕悿?==="
          grep -A 2 "image:" deploy/order-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 闂佹彃绉烽惁顖炲嫉閸濆嫬鐓戦柨娑欒壘椤︹晠鎮堕崱妤婃▼濞戞搩浜濊啯闁秆勵殔閼荤喓鎮扮仦鎯ц吂闂侇偂鐒﹀鍌炴儍?Git 闁告劘灏欓悰?
          MAX_RETRIES=3
