    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "鏇存柊 Order 鏈嶅姟闀滃儚鏍囩..."
          # 鏍规嵁鍒嗘敮閫夋嫨鏍囩绛栫暐
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 鍒嗘敮锛氫娇鐢?sha 鏍囩锛岀‘淇濈増鏈彲杩芥函锛堢敓浜х幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-order:sha-${{ github.sha }}"
          else
            # dev 鍒嗘敮锛氫娇鐢?latest 鏍囩锛岃嚜鍔ㄦ媺鍙栨渶鏂帮紙寮€鍙戠幆澧冿級
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-order:latest"
          fi
          echo "鏂伴暅鍍忥細${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/order-service/deployment.yaml
          
          echo "=== 鍙樻洿鍚庣殑閰嶇疆 ==="
          grep -A 2 "image:" deploy/order-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 閲嶈瘯鏈哄埗锛氬鐞嗗涓ā鍧楀苟琛屾帹閫佹椂鐨?Git 鍐茬獊
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/order-service/deployment.yaml; then
              echo "妫€娴嬪埌鍙樻洿锛屾彁浜?.."
              git add deploy/order-service/deployment.yaml
              # 鏍规嵁鍒嗘敮浣跨敤涓嶅悓鐨勬彁浜や俊鎭?
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update order image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update order image to latest [skip ci]"
              fi
              
              # 灏濊瘯鎺ㄩ€侊紝濡傛灉澶辫触鍒欓噸璇?
              if git push origin ${{ github.ref_name }}; then
                echo "鉁?Manifest 鏇存柊鎴愬姛锛?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "鈿狅笍 鎺ㄩ€佸け璐ワ紙鍙兘涓庡叾浠栨ā鍧楀啿绐侊級锛岄噸璇?$RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10  # 绛夊緟鍏朵粬妯″潡鎺ㄩ€佸畬鎴?
              fi
            else
              echo "鈿狅笍 娌℃湁妫€娴嬪埌鍙樻洿锛岃烦杩囨彁浜?
              exit 0
            fi
          done
          
          echo "鉂?閲嶈瘯 $MAX_RETRIES 娆″悗浠嶇劧澶辫触锛岃妫€鏌ユ棩蹇?
