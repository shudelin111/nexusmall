  # ========== 闂冭埖顔?5: 閺囧瓨鏌?Kubernetes Manifest - Auth 濡€虫健 ==========
  update-manifest-auth:
    name: Update K8s Manifest - Auth Service
    runs-on: ubuntu-latest
    needs: [security-scan-auth]
    # dev 閸?master 闁姤娲块弬?Manifest閿涘湙itOps 閺嶅洤鍣€圭偠杩旈敍?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "閺囧瓨鏌?Auth 閺堝秴濮熼梹婊冨剼閺嶅洨顒?.."
          # 閺嶈宓侀崚鍡樻暜闁瀚ㄩ弽鍥╊劮缁涙牜鏆?
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 閸掑棙鏁敍姘▏閻?sha 閺嶅洨顒烽敍宀€鈥樻穱婵堝閺堫剙褰叉潻鑺ュ嚱閿涘牏鏁撴禍褏骞嗘晶鍐跨礆
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-auth:sha-${{ github.sha }}"
          else
