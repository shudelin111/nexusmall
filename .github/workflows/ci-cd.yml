  # ========== 闂冭埖顔?1: 缂傛牞鐦ф稉搴㈢ゴ鐠?- Gateway 濡€虫健 ==========
  build-gateway:
    name: Build & Test - Gateway Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
