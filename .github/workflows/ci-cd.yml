          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 闁告帒妫欓弫顕€鏁嶅顐⑩枏闁?sha 闁哄秴娲ㄩ鐑芥晬瀹€鈧垾妯荤┍濠靛牆顣奸柡鍫墮瑜板弶娼婚懞銉ュ毐闁挎稑鐗忛弫鎾寸瑜忛獮鍡樻櫠閸愯法绀?
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:sha-${{ github.sha }}"
          else
            # dev 闁告帒妫欓弫顕€鏁嶅顐⑩枏闁?latest 闁哄秴娲ㄩ鐑芥晬瀹€鍐ㄦ闁告柣鍔嶆刊娲矗閺嶃劍浠橀柡鍌氬簻缁辨瑥顕ｉ埀顒勫矗閹寸姴绠氬褍鍠涚槐?
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:latest"
          fi
          echo "闁哄倷鍗抽弳鍛村磽韫囥儳绐?{NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/member-service/deployment.yaml
          
          echo "=== 闁告瑦蓱濞插潡宕ユ惔锝嗙暠闂佹澘绉堕悿?==="
          grep -A 2 "image:" deploy/member-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 闂佹彃绉烽惁顖炲嫉閸濆嫬鐓戦柨娑欒壘椤︹晠鎮堕崱妤婃▼濞戞搩浜濊啯闁秆勵殔閼荤喓鎮扮仦鎯ц吂闂侇偂鐒﹀鍌炴儍?Git 闁告劘灏欓悰?
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/member-service/deployment.yaml; then
