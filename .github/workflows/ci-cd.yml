        with:
          sarif_file: 'trivy-cart-results.sarif'
          category: 'trivy-cart-scan'

  # 闃舵 5: 鏇存柊 Kubernetes Manifest - Cart 妯″潡
  update-manifest-cart:
    name: Update K8s Manifest - Cart Service
    runs-on: ubuntu-latest
    needs: [security-scan-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "鏇存柊 Cart 鏈嶅姟闀滃儚鏍囩..."
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:latest"
          fi
          echo "鏂伴暅鍍忥細${NEW_IMAGE}"
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/cart-service/deployment.yaml
          echo "=== 鍙樻洿鍚庣殑閰嶇疆 ==="
          grep -A 2 "image:" deploy/cart-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/cart-service/deployment.yaml; then
              echo "妫€娴嬪埌鍙樻洿锛屾彁浜?.."
              git add deploy/cart-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update cart image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update cart image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                echo "鉁?Manifest 鏇存柊鎴愬姛锛?
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "鈿狅笍 鎺ㄩ€佸け璐ワ紝閲嶈瘯 $RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              echo "鈿狅笍 娌℃湁妫€娴嬪埌鍙樻洿锛岃烦杩囨彁浜?
              exit 0
            fi
          done
          echo "鉂?閲嶈瘯 $MAX_RETRIES 娆″悗浠嶇劧澶辫触锛岃妫€鏌ユ棩蹇?
          exit 1

  # ========== logistics Service CI/CD Pipeline ==========
  
  build-logistics:
    name: Build & Test - logistics Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.logistics-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Install Parent and Common
        run: |
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      - name: Compile logistics Module
        run: mvn clean compile -f nexusmall-logistics/pom.xml -B
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logistics-test-results
          path: nexusmall-logistics/target/surefire-reports/
          retention-days: 30

  quality-check-logistics:
    name: Quality Check - logistics Service
    runs-on: ubuntu-latest
    needs: [build-logistics]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-logistics/pom.xml
        continue-on-error: true
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-logistics/pom.xml
        continue-on-error: true
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-logistics/pom.xml
        continue-on-error: true

  build-docker-logistics:
    name: Build Docker Image - logistics Service
    runs-on: ubuntu-latest
    needs: [build-logistics]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.logistics-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-logistics/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  security-scan-logistics:
    name: Security Scan - logistics Service
    runs-on: ubuntu-latest
    needs: [build-docker-logistics]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-logistics-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-logistics-results.sarif'
          category: 'trivy-logistics-scan'

  update-manifest-logistics:
    name: Update K8s Manifest - logistics Service
    runs-on: ubuntu-latest
    needs: [security-scan-logistics]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag in deployment.yaml
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-logistics:latest"
          fi
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/logistics-service/deployment.yaml
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/logistics-service/deployment.yaml; then
              git add deploy/logistics-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update logistics image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update logistics image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              exit 0
            fi
          done
          exit 1



# =====================================================
# GitHub Actions CI/CD Pipeline - NexusMall Multi-Module
# =====================================================
# GitOps 宸ヤ綔娴佺▼:
# 1. 鍩轰簬鏂囦欢鍙樻洿鏅鸿兘瑙﹀彂锛堣矾寰勮繃婊わ級
# 2. 鑷姩缂栬瘧 + 鍗曞厓娴嬭瘯 + 浠ｇ爜璐ㄩ噺妫€鏌?
# 3. 鏋勫缓 Docker 闀滃儚骞舵帹閫佸埌 Docker Hub
# 4. Trivy 瀹夊叏鎵弿
# 5. 鏇存柊 Kubernetes Manifest
# 6. ArgoCD 鑷姩鍚屾鍒?K8s 闆嗙兢
#
# 涓氱晫鏍囧噯瀹炶返锛?
# - 璺緞杩囨护锛氬彧鏋勫缓鍙樻洿鐨勬ā鍧?
# - 骞惰鏋勫缓锛氬涓ā鍧楀悓鏃舵瀯寤?
# - 澧為噺鏋勫缓锛氬彧缂栬瘧鍙樻洿鐨勪唬鐮?
# =====================================================

name: NexusMall CI/CD

# ========================================
# 瑙﹀彂鏉′欢锛堟敮鎸佽矾寰勮繃婊わ級
# ========================================
on:
  push:
    branches: [ master, dev ]  # master 鐢ㄤ簬鐢熶骇锛宒ev 鐢ㄤ簬寮€鍙?
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ master, dev ]  # master 鐢ㄤ簬鐢熶骇锛宒ev 鐢ㄤ簬寮€鍙?
  workflow_dispatch:  # 鍏佽鎵嬪姩瑙﹀彂

# ========================================
# 骞跺彂鎺у埗锛堣嚜鍔ㄥ彇娑堟棫鐨?workflow锛?
# ========================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ========================================
# 鏉冮檺閰嶇疆锛堜慨澶?CodeQL 鏉冮檺閿欒锛?
# ========================================
permissions:
  contents: write  # 闇€瑕佸啓鍏ユ潈闄愭墠鑳芥帹閫佷唬鐮?
  security-events: write
  actions: read

# ========================================
# 鐜鍙橀噺
# ========================================
env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"  # 缁熶竴璁剧疆 Java 缂栫爜涓?UTF-8锛岄伩鍏?Nacos 閰嶇疆瑙ｆ瀽涔辩爜

# ========================================
# 宸ヤ綔鐭╅樀閰嶇疆锛堜笟鐣屾爣鍑嗗仛娉曪級
# ========================================
# 瀹氫箟瑕佹瀯寤虹殑妯″潡鍙婂叾璺緞鏄犲皠
jobs:
  # ========== 闃舵 0: 妫€娴嬪彉鏇存ā鍧?==========
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      order-changed: ${{ steps.filter.outputs.order }}
      product-changed: ${{ steps.filter.outputs.product }}
      auth-changed: ${{ steps.filter.outputs.auth }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      common-changed: ${{ steps.filter.outputs.common }}
      member-changed: ${{ steps.filter.outputs.member }}
      payment-changed: ${{ steps.filter.outputs.payment }}
      cart-changed: ${{ steps.filter.outputs.cart }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
      promotion-changed: ${{ steps.filter.outputs.promotion }}
      search-changed: ${{ steps.filter.outputs.search }}
      logistics-changed: ${{ steps.filter.outputs.logistics }}
      inventory-changed: ${{ steps.filter.outputs.inventory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 浣跨敤 paths-filter 妫€娴嬪彉鏇达紙涓氱晫鏍囧噯宸ュ叿锛?
      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            order: 
              - 'nexusmall-order/**'
              - 'nexusmall-common/**'  # common 鍙樻洿涔熶細褰卞搷 order
              - 'pom.xml'  # 鏍?pom.xml 鍙樻洿褰卞搷鎵€鏈夋ā鍧?
              - 'nexusmall-common/pom.xml'  # 鐖?POM 鍙樻洿涔熷奖鍝嶆墍鏈夋ā鍧?
            product:
              - 'nexusmall-product/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            auth:
              - 'nexusmall-auth/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            gateway:
              - 'nexusmall-gateway/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            common:
              - 'nexusmall-common/**'
              - 'pom.xml'  # 鏍?pom.xml 鍙樻洿褰卞搷 common 妯″潡
            member:
              - 'nexusmall-member/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            payment:
              - 'nexusmall-payment/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            cart:
              - 'nexusmall-cart/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            promotion:
              - 'nexusmall-promotion/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            search:
              - 'nexusmall-search/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            logistics:
              - 'nexusmall-logistics/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'
            inventory:
              - 'nexusmall-inventory/**'
              - 'nexusmall-common/**'
              - 'pom.xml'
              - 'nexusmall-common/pom.xml'

  # ========== 闃舵 1: 缂栬瘧涓庢祴璇?- Product 妯″潡 ==========
  build-product:
    name: Build & Test - Product Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 瀹夎鐖堕」鐩拰鍏叡妯″潡 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Product Module
        run: |
          echo "====== 缂栬瘧 Product 妯″潡 ======"
          mvn clean compile -f nexusmall-product/pom.xml -B
      
      - name: Run Product Module Tests with Coverage
        # 鈿狅笍 涓存椂绂佺敤锛歂acos 涓哄唴缃戞湇鍔★紝GitHub Actions 鏃犳硶璁块棶
        # TODO: 鎭㈠娴嬭瘯鍚庣Щ闄ゆ娉ㄩ噴
        if: false  # 涓存椂绂佺敤
        run: |
          echo "====== 鍗曞厓娴嬭瘯闃舵 (甯?JaCoCo 瑕嗙洊鐜囨鏌? ======"
          if [ -d "nexusmall-product/src/test/java" ] && [ "$(find nexusmall-product/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            # 鎵ц娴嬭瘯骞剁敓鎴愯鐩栫巼鎶ュ憡,鍚屾椂妫€鏌ヨ鐩栫巼闃堝€?
            mvn clean test jacoco:check -f nexusmall-product/pom.xml -B
          else
            echo "鈿狅笍 鏈壘鍒版祴璇曟枃浠讹紝璺宠繃娴嬭瘯"
            echo "馃挕 鎻愮ず锛氬缓璁负涓氬姟妯″潡缂栧啓鍗曞厓娴嬭瘯浠ヨ揪鍒?50%+ 瑕嗙洊鐜囪姹?
          fi
      
      - name: Upload Test Results and Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-test-and-coverage
          path: |
            nexusmall-product/target/surefire-reports/
            nexusmall-product/target/site/jacoco/
          retention-days: 30

  # ========== 闃舵 2: 浠ｇ爜璐ㄩ噺妫€鏌?- Product 妯″潡 ==========
  quality-check-product:
    name: Quality Check - Product Service
    runs-on: ubuntu-latest
    needs: [build-product]
    # 淇敼锛歞ev 鍜?master 鍒嗘敮閮芥墽琛岃川閲忔鏌?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-product/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-product/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-product/pom.xml
        continue-on-error: true

  # ========== 闃舵 3: 鏋勫缓 Docker 闀滃儚 - Product 妯″潡 ==========
  build-docker-product:
    name: Build Docker Image - Product Service
    runs-on: ubuntu-latest
    needs: [build-product]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.product-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-product
          tags: |
            # dev 鍒嗘敮锛氫娇鐢?latest 鏍囩锛堟渶鏂板紑鍙戠増锛屽紑鍙戠幆澧冧娇鐢級
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            # 璇箟鍖栫増鏈紙浠呮墦 tag 鏃剁敓鎴愶紝濡?v1.2.3锛?
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 鎵€鏈夊垎鏀細閮界敓鎴?sha 鏍囩锛堢敤浜庣簿纭拷婧級
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-product/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 闃舵 4: 瀹夊叏鎵弿 - Product 妯″潡 ==========
  security-scan-product:
    name: Security Scan - Product Service
    runs-on: ubuntu-latest
    needs: [build-docker-product]
    # 淇敼锛歞ev 鍜?master 閮芥墽琛屽畨鍏ㄦ壂鎻忥紝浣嗘壂鎻忎弗鏍肩▼搴︿笉鍚?
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
