          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member
          tags: |
            # dev 分支：使用 latest 标签（最新开发版，开发环境使用）
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            # 语义化版本（仅打 tag 时生成，如 v1.2.3）
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 所有分支：都生成 sha 标签（用于精确追溯）
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-member/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 阶段 4: 安全扫描 - Member 模块 ==========
  security-scan-member:
    name: Security Scan - Member Service
    runs-on: ubuntu-latest
    needs: [build-docker-member]
    # 修改：dev 和 master 都执行安全扫描
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-member-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-member-results.sarif'
          category: 'trivy-member-scan'

  # ========== 阶段 5: 更新 Kubernetes Manifest - Member 模块 ==========
  update-manifest-member:
    name: Update K8s Manifest - Member Service
    runs-on: ubuntu-latest
    needs: [security-scan-member]
    # 修改：dev 和 master 都更新 Manifest（GitOps 标准实践）
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "更新 Member 服务镜像标签..."
          # 根据分支选择标签策略
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # master 分支：使用 sha 标签，确保版本可追溯（生产环境）
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:sha-${{ github.sha }}"
          else
            # dev 分支：使用 latest 标签，自动拉取最新（开发环境）
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-member:latest"
          fi
          echo "新镜像：${NEW_IMAGE}"
          
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/member-service/deployment.yaml
          
          echo "=== 变更后的配置 ==="
          grep -A 2 "image:" deploy/member-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 重试机制：处理多个模块并行推送时的 Git 冲突
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/member-service/deployment.yaml; then
              echo "检测到变更，提交..."
              git add deploy/member-service/deployment.yaml
              # 根据分支使用不同的提交信息
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update member image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update member image to latest [skip ci]"
              fi
              
              # 尝试推送，如果失败则重试
              if git push origin ${{ github.ref_name }}; then
                echo "✅ Manifest 更新成功！"
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "⚠️ 推送失败（可能与其他模块冲突），重试 $RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10  # 等待其他模块推送完成
              fi
            else
              echo "⚠️ 没有检测到变更，跳过提交"
              exit 0
            fi
          done
          
          echo "❌ 重试 $MAX_RETRIES 次后仍然失败，请检查日志"
          exit 1

  # ========== 阶段 6: 生产环境部署（由 ArgoCD 自动完成）==========
  # 注意：不再需要手动部署步骤，ArgoCD 会自动同步 manifest 变更
  # 如果需要手动审批，可以使用 ArgoCD 的 manual sync 功能

  # ========== Cart Service CI/CD Pipeline ==========
  
  # 阶段 1: 编译与测试 - Cart 模块
  build-cart:
    name: Build & Test - Cart Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.cart-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Parent and Common
        run: |
          echo "====== 安装父项目和公共模块 ======"
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      
      - name: Compile Cart Module
        run: |
          echo "====== 编译 Cart 模块 ======"
          mvn clean compile -f nexusmall-cart/pom.xml -B
      
      - name: Run Cart Module Tests with Coverage
        if: false  # 临时禁用：Nacos 为内网服务
        run: |
          echo "====== 单元测试阶段 (带 JaCoCo 覆盖率检查) ======"
          if [ -d "nexusmall-cart/src/test/java" ] && [ "$(find nexusmall-cart/src/test/java -name '*Test.java' | wc -l)" -gt 0 ]; then
            mvn clean test jacoco:check -f nexusmall-cart/pom.xml -B
          else
            echo "⚠️ 未找到测试文件，跳过测试"
          fi
      
      - name: Upload Test Results and Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cart-test-and-coverage
          path: |
            nexusmall-cart/target/surefire-reports/
            nexusmall-cart/target/site/jacoco/
          retention-days: 30

  # 阶段 2: 代码质量检查 - Cart 模块
  quality-check-cart:
    name: Quality Check - Cart Service
    runs-on: ubuntu-latest
    needs: [build-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-cart/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-cart/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-cart/pom.xml
        continue-on-error: true

  # 阶段 3: 构建 Docker 镜像 - Cart 模块
  build-docker-cart:
    name: Build Docker Image - Cart Service
    runs-on: ubuntu-latest
    needs: [build-cart]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.cart-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-cart/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # 阶段 4: 安全扫描 - Cart 模块
  security-scan-cart:
    name: Security Scan - Cart Service
    runs-on: ubuntu-latest
    needs: [build-docker-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-cart-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-cart-results.sarif'
          category: 'trivy-cart-scan'

  # 阶段 5: 更新 Kubernetes Manifest - Cart 模块
  update-manifest-cart:
    name: Update K8s Manifest - Cart Service
    runs-on: ubuntu-latest
    needs: [security-scan-cart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "更新 Cart 服务镜像标签..."
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-cart:latest"
          fi
          echo "新镜像：${NEW_IMAGE}"
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/cart-service/deployment.yaml
          echo "=== 变更后的配置 ==="
          grep -A 2 "image:" deploy/cart-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if ! git diff --quiet deploy/cart-service/deployment.yaml; then
              echo "检测到变更，提交..."
              git add deploy/cart-service/deployment.yaml
              if [ "${{ github.ref }}" == "refs/heads/master" ]; then
                git commit -m "chore(deploy): update cart image to sha-${{ github.sha }} [skip ci]"
              else
                git commit -m "chore(deploy): update cart image to latest [skip ci]"
              fi
              if git push origin ${{ github.ref_name }}; then
                echo "✅ Manifest 更新成功！"
                exit 0
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "⚠️ 推送失败，重试 $RETRY_COUNT/$MAX_RETRIES..."
                git fetch origin ${{ github.ref_name }}
                git reset --hard origin/${{ github.ref_name }}
                sleep 10
              fi
            else
              echo "⚠️ 没有检测到变更，跳过提交"
              exit 0
            fi
          done
          echo "❌ 重试 $MAX_RETRIES 次后仍然失败，请检查日志"
          exit 1

  # ========== Notification Service CI/CD Pipeline ==========
  
  build-notification:
    name: Build & Test - Notification Service
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.notification-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Install Parent and Common
        run: |
          mvn clean install -N -B
          mvn clean install -f nexusmall-common/pom.xml -DskipTests -B
      - name: Compile Notification Module
        run: mvn clean compile -f nexusmall-notification/pom.xml -B
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-test-results
          path: nexusmall-notification/target/surefire-reports/
          retention-days: 30

  quality-check-notification:
    name: Quality Check - Notification Service
    runs-on: ubuntu-latest
    needs: [build-notification]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-notification/pom.xml
        continue-on-error: true
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-notification/pom.xml
        continue-on-error: true
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-notification/pom.xml
        continue-on-error: true

  build-docker-notification:
    name: Build Docker Image - Notification Service
    runs-on: ubuntu-latest
    needs: [build-notification]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.notification-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-notification
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-notification/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
