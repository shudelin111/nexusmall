            nexusmall-inventory/target/surefire-reports/
            nexusmall-inventory/target/site/jacoco/
          retention-days: 30

  # ========== 阶段 2: 代码质量检?- Inventory 模块 ==========
  quality-check-inventory:
    name: Quality Check - Inventory Service
    runs-on: ubuntu-latest
    needs: [build-inventory]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Checkstyle
        run: mvn checkstyle:check -f nexusmall-inventory/pom.xml
        continue-on-error: true
      
      - name: Run PMD
        run: mvn pmd:check -f nexusmall-inventory/pom.xml
        continue-on-error: true
      
      - name: Run SpotBugs
        run: mvn spotbugs:check -f nexusmall-inventory/pom.xml
        continue-on-error: true

  # ========== 阶段 3: 构建 Docker 镜像 - Inventory 模块 ==========
  build-docker-inventory:
    name: Build Docker Image - Inventory Service
    runs-on: ubuntu-latest
    needs: [build-inventory]
    if: |
      github.event_name == 'push' && 
      needs.detect-changes.outputs.inventory-changed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-inventory
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long
      
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexusmall-inventory/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========== 阶段 4: 安全扫描 - Inventory 模块 ==========
  security-scan-inventory:
    name: Security Scan - Inventory Service
    runs-on: ubuntu-latest
    needs: [build-docker-inventory]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-inventory:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-inventory-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-inventory-results.sarif'
          category: 'trivy-inventory-scan'

  # ========== 阶段 5: 更新 Kubernetes Manifest - Inventory 模块 ==========
  update-manifest-inventory:
    name: Update K8s Manifest - Inventory Service
    runs-on: ubuntu-latest
    needs: [security-scan-inventory]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in deployment.yaml
        run: |
          echo "更新 Inventory 服务镜像标签..."
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-inventory:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/nexusmall-inventory:latest"
          fi
          echo "新镜像：${NEW_IMAGE}"
          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" deploy/inventory-service/deployment.yaml
          echo "=== 变更后的配置 ==="
          grep -A 2 "image:" deploy/inventory-service/deployment.yaml
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Check if there are changes to commit
          if git diff --quiet deploy/inventory-service/deployment.yaml; then
            echo "No changes detected, skipping"
            exit 0
          fi
          
          echo "Changes detected, committing..."
          git add deploy/inventory-service/deployment.yaml
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            git commit -m "chore(deploy): update inventory image to sha-${{ github.sha }} [skip ci]"
          else
            git commit -m "chore(deploy): update inventory image to latest [skip ci]"
          fi
          
          # Retry push with rebase on conflict
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push origin ${{ github.ref_name }}; then
              echo "SUCCESS: Manifest updated!"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Push failed (conflict), retry $RETRY_COUNT/$MAX_RETRIES..."
              git fetch origin ${{ github.ref_name }}
              git pull --rebase origin ${{ github.ref_name }} || {
                echo "Rebase failed, aborting"
                exit 1
              }
              sleep $((RANDOM % 11 + 5))
            fi
          done
          
          echo "ERROR: Failed after $MAX_RETRIES retries"
          exit 1

