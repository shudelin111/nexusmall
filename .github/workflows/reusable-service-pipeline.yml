name: Reusable Service Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      module_dir:
        required: true
        type: string
      image_name:
        required: true
        type: string
      deployment_file:
        required: true
        type: string
      test_enabled:
        required: false
        type: boolean
        default: false
      test_command:
        required: false
        type: string
        default: ''
      test_artifact_name:
        required: false
        type: string
        default: ''
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

permissions:
  contents: read
  actions: read

env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

jobs:
  build:
    name: Build & Test - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Compile module with dependencies
        run: |
          # 通过 -pl + -am 让 Maven 自动解析当前模块依赖闭包，
          # 避免只安装 common 时遗漏其他内部模块。
          mvn -pl ${{ inputs.module_dir }} -am clean compile -DskipTests -B

      - name: Run module tests
        if: ${{ inputs.test_enabled }}
        shell: bash
        run: ${{ inputs.test_command }}

      - name: Upload test results
        if: ${{ inputs.test_enabled && inputs.test_artifact_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.test_artifact_name }}
          path: |
            ${{ inputs.module_dir }}/target/surefire-reports/
            ${{ inputs.module_dir }}/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 30

  quality-check:
    name: Quality Check - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check -f ${{ inputs.module_dir }}/pom.xml
        # 当前阶段质量检查只提供反馈，不阻塞交付；
        # 后续如需升级为门禁，删除 continue-on-error 即可。
        continue-on-error: true

      - name: Run PMD
        run: mvn pmd:check -f ${{ inputs.module_dir }}/pom.xml
        continue-on-error: true

      - name: Run SpotBugs
        run: mvn spotbugs:check -f ${{ inputs.module_dir }}/pom.xml
        continue-on-error: true

  build-docker:
    name: Build Docker Image - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=long

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.module_dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  security-scan:
    name: Security Scan - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: build-docker
    permissions:
      contents: read
      security-events: write
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: '${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ inputs.image_name }}:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ inputs.image_name }}-scan'

  update-manifest:
    name: Update K8s Manifest - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: write
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Update image tag
        shell: bash
        run: |
          # master 固定到 sha 标签，dev 维持 latest，
          # 这样开发环境可以持续跟进最新镜像，生产环境则保持可追溯。
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ inputs.image_name }}:sha-${{ github.sha }}"
          else
            NEW_IMAGE="${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest"
          fi

          sed -i "s|image: .*|image: ${NEW_IMAGE}|g" "${{ inputs.deployment_file }}"
          grep -A 2 "image:" "${{ inputs.deployment_file }}"

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if git diff --quiet "${{ inputs.deployment_file }}"; then
            echo "No changes detected, skipping"
            exit 0
          fi

          git add "${{ inputs.deployment_file }}"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            git commit -m "chore(deploy): update ${{ inputs.image_name }} image to sha-${{ github.sha }} [skip ci]"
          else
            git commit -m "chore(deploy): update ${{ inputs.image_name }} image to latest [skip ci]"
          fi

          # Manifest 回写可能和并发提交发生竞争，这里做有限次重试并自动 rebase。
          max_retries=3
          retry_count=0

          while [ "${retry_count}" -lt "${max_retries}" ]; do
            if git push origin "${{ github.ref_name }}"; then
              echo "Manifest updated"
              exit 0
            fi

            retry_count=$((retry_count + 1))
            git fetch origin "${{ github.ref_name }}"
            git pull --rebase origin "${{ github.ref_name }}"
            sleep $((RANDOM % 11 + 5))
          done

          echo "Failed to push manifest update after retries"
          exit 1
