# =====================================================
# 可复用 Workflow - Docker 镜像构建
# =====================================================
# 用途：构建 Docker 镜像并推送到 Docker Hub
# 调用方式：通过 workflow_call 触发
# 作者：shudl
# 日期：2026-04-07
# =====================================================

name: Reusable Docker Build

# ========================================
# 触发条件（只能通过 workflow_call 调用）
# ========================================
on:
  workflow_call:
    inputs:
      module-name:
        description: '模块名称（如 nexusmall-notification）'
        required: true
        type: string
      dockerfile-path:
        description: 'Dockerfile 路径'
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

# ========================================
# 权限配置
# ========================================
permissions:
  contents: read
  packages: write

# ========================================
# 环境变量
# ========================================
env:
  DEFAULT_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

# ========================================
# Jobs
# ========================================
jobs:
  # ========== 构建 Docker 镜像 ==========
  build-docker:
    name: Build Docker - ${{ inputs.module-name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'amd64,arm64'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEFAULT_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ inputs.module-name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'dev') }}
            type=raw,value=stable,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}
