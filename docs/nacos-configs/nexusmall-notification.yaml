# =====================================================
# NexusMall 通知服务配置
# =====================================================
# Data ID: nexusmall-notification.yaml
# Group: MALL_GROUP
# Namespace: dev/test/prod（根据环境选择）
# 用途：通知服务专属业务配置（所有环境共享）
# 说明：
# - 此文件存放所有环境共享的通用配置
# - 环境特定配置请创建 nexusmall-notification-{profile}.yaml
# - 示例：nexusmall-notification-dev.yaml, nexusmall-notification-test.yaml
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复
  
  # Redis 连接池配置（通用参数，所有环境共享）
  redis:
    # 连接超时时间（毫秒）
    timeout: 5000  # 5 秒
    # Lettuce 连接池配置
    lettuce:
      pool:
        # 最大活跃连接数
        max-active: 16
        # 最大空闲连接数
        max-idle: 8
        # 最小空闲连接数
        min-idle: 0
        # 获取连接的最大等待时间（毫秒）
        max-wait: 1000ms  # 1 秒

  # Spring Cloud 配置
  cloud:
    # Sentinel 熔断限流配置
    sentinel:
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            dataId: nexusmall-notification-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 熔断降级规则数据源
        ds2:
          nacos:
            dataId: nexusmall-notification-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            dataId: nexusmall-notification-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

# ===============================
# Seata 分布式事务配置（服务特定）
# ===============================
seata:
  application-id: nexusmall-notification

# ===============================
# SpringDoc + Knife4j API 文档配置（模块特定）
# ===============================
springdoc:
  # 扫描的包路径（Notification 模块特定）
  packages-to-scan: com.nexusmall.notification.controller
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.nexusmall.notification.controller
