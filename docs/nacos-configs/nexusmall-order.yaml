# =====================================================
# NexusMall 订单服务配置
# =====================================================
# Data ID: nexusmall-order.yaml
# Group: MALL_GROUP
# Namespace: dev/test/prod（根据环境选择）
# 用途：订单服务专属业务配置（所有环境共享）
# 说明：
# - 此文件存放所有环境共享的通用配置
# - 环境特定配置请创建 nexusmall-order-{profile}.yaml
# - 示例：nexusmall-order-dev.yaml, nexusmall-order-test.yaml
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 应用名称
  application:
    name: nexusmall-order
  
  # Redis 配置
  redis:
    # Redis 服务器地址
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}
    # 连接超时时间（毫秒）
    timeout: 5000  # 5 秒
    # Lettuce 连接池配置
    lettuce:
      pool:
        # 最大活跃连接数
        max-active: 16
        # 最大空闲连接数
        max-idle: 8
        # 最小空闲连接数
        min-idle: 0
        # 获取连接的最大等待时间（毫秒）
        max-wait: 1000ms  # 1 秒

  # Spring Cloud 配置
  cloud:
    # OpenFeign 服务调用配置
    openfeign:
      sentinel:
        enabled: true
      client:
        config:
          default:
            # 连接超时
            connectTimeout: 5000
            # 读取超时
            readTimeout: 5000
      httpclient:
        enabled: true
      compression:
        request:
          enabled: true
        response:
          enabled: true

    # Sentinel 熔断限流配置
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      transport:
        dashboard: 10.10.1.1:8858
        port: 8719
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: dev
            dataId: nexusmall-order-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: nacos
            password: nacos

        # 熔断降级规则数据源
        ds2:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: dev
            dataId: nexusmall-order-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: nacos
            password: nacos

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: dev
            dataId: nexusmall-order-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: nacos
            password: nacos

# ===============================
# MyBatis-Plus 配置
# ===============================
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类别名包路径
  type-aliases-package: com.nexusmall.order.entity
  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 禁用二级缓存
    cache-enabled: false
    # SQL 日志实现类
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  # 全局配置
  global-config:
    db-config:
      # 主键生成策略
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===============================
# RocketMQ 配置
# ===============================
rocketmq:
  # NameServer 地址
  name-server: 10.10.1.1:9876
  # 生产者配置
  producer:
    group: order-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  enabled: true
  application-id: nexusmall-order
  tx-service-group: nexusmall-tx-group
  service:
    vgroup-mapping:
      nexusmall-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: dev
      group: SEATA_GROUP
      cluster: default
      username: nacos
      password: nacos
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: dev
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seataServer.properties

# ===============================
# Actuator 监控端点配置
