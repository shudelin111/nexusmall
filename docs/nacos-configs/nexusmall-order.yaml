# =====================================================
# NexusMall 订单服务配置
# =====================================================
# Data ID: nexusmall-order.yaml
# Group: DEFAULT_GROUP
# 用途：订单服务专属业务配置（所有环境共享）
# 说明：
# - 此文件存放所有环境共享的通用配置
# - 环境特定配置请创建 nexusmall-order-{profile}.yaml
# - 示例：nexusmall-order-dev.yaml, nexusmall-order-test.yaml
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 应用名称
  application:
    name: nexusmall-order
  
  # 数据库连接配置（完整配置，符合业界标准）
  datasource:
    # JDBC 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据源类型：HikariCP（Spring Boot 2.x 默认，性能最优）
    type: com.zaxxer.hikari.HikariDataSource
    # JDBC 连接 URL（订单服务专用数据库）
    url: jdbc:mysql://10.10.1.1:3306/nexusmall_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&serverTimezone=GMT%2B8
    # 数据库用户名
    username: root
    # 数据库密码（生产环境建议使用环境变量）
    password: "123456"
    # HikariCP 连接池参数
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 空闲连接超时时间（毫秒）
      idle-timeout: 30000
      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试查询语句
      connection-test-query: SELECT 1
  
  # Redis 配置
  redis:
    # Redis 服务器地址
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}
    # 连接超时时间（毫秒）
    timeout: 5000  # 5 秒
    # Lettuce 连接池配置
    lettuce:
      pool:
        # 最大活跃连接数
        max-active: 16
        # 最大空闲连接数
        max-idle: 8
        # 最小空闲连接数
        min-idle: 0
        # 获取连接的最大等待时间（毫秒）
        max-wait: 1000ms  # 1 秒
  
  # Spring Cloud 配置
  cloud:
    # OpenFeign 服务调用配置
    openfeign:
      sentinel:
        enabled: true
      client:
        config:
          default:
            # 连接超时
            connectTimeout: 5000
            # 读取超时
            readTimeout: 5000
      httpclient:
        enabled: true
      compression:
        request:
          enabled: true
        response:
          enabled: true
    
    # Sentinel 熔断限流配置
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      transport:
        dashboard: 10.10.1.1:8858
        port: 8719
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: ""
            dataId: nexusmall-order-flow-rule.json
            groupId: DEFAULT_GROUP
            rule-type: flow
            data-type: json
            username: nacos
            password: nacos
        
        # 熔断降级规则数据源
        ds2:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: ""
            dataId: nexusmall-order-degrade-rule.json
            groupId: DEFAULT_GROUP
            rule-type: degrade
            data-type: json
            username: nacos
            password: nacos
        
        # 系统自适应保护规则数据源
        ds3:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: ""
            dataId: nexusmall-order-system-rule.json
            groupId: DEFAULT_GROUP
            rule-type: system
            data-type: json
            username: nacos
            password: nacos

# ===============================
# 服务端口配置
# ===============================
server:
  port: 11000

# ===============================
# MyBatis-Plus 配置
# ===============================
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类别名包路径
  type-aliases-package: com.nexusmall.order.entity
  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 禁用二级缓存
    cache-enabled: false
    # SQL 日志实现类
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  # 全局配置
  global-config:
    db-config:
      # 主键生成策略
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===============================
# RocketMQ 配置
# ===============================
rocketmq:
  # NameServer 地址
  name-server: 10.10.1.1:9876
  # 生产者配置
  producer:
    group: order-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

# ===============================
# Kafka 配置（用于日志收集）
# ===============================
spring:
  kafka:
    bootstrap-servers: mall-kafka-ok-kafka-bootstrap.kafka.svc.cluster.local:9092
    producer:
      acks: 1
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  enabled: true
  application-id: nexusmall-order
  tx-service-group: nexusmall-tx-group
  service:
    vgroup-mapping:
      nexusmall-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: ""
      group: SEATA_GROUP
      cluster: default
      username: nacos
      password: nacos
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: ""
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seataServer.properties

# ===============================
# Actuator 监控端点配置
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true

# ===============================
# 日志级别配置
# ===============================
logging:
  level:
    root: INFO
    io.seata: INFO
    com.alibaba.csp.sentinel: DEBUG
    com.nexusmall.order: DEBUG
    com.nexusmall.common: DEBUG
    com.nexusmall.order.dao: DEBUG
order:
  # 订单超时自动取消时间（分钟）
  timeout-cancel: 30
  # 订单号前缀
  order-no-prefix: "ORD"
  # 最大购买数量
  max-purchase-quantity: 100
