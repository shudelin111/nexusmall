# ===============================
# 日志级别配置
# ===============================
logging:
  level:
    root: INFO
    io.seata: INFO
    com.alibaba.csp.sentinel: DEBUG
    com.nexusmall.order: DEBUG
    com.nexusmall.common: DEBUG
    com.nexusmall.order.dao: DEBUG
order:
  # 订单超时自动取消时间（分钟）
  timeout-cancel: 30
  # 订单号前缀
  order-no-prefix: "ORD"
  # 最大购买数量
  max-purchase-quantity: 100
