# =====================================================
# NexusMall 订单服务配置
# =====================================================
# Data ID: nexusmall-order.yaml
# Group: MALL_GROUP
# Namespace: dev/test/prod（根据环境选择）
# 用途：订单服务专属业务配置（所有环境共享）
# 说明：
# - 此文件存放所有环境共享的通用配置
# - 环境特定配置请创建 nexusmall-order-{profile}.yaml
# - 示例：nexusmall-order-dev.yaml, nexusmall-order-test.yaml
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复
  
  # Redis 连接池配置（通用参数，所有环境共享）
  redis:
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  # Spring Cloud 配置
  cloud:
    sentinel:
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            dataId: nexusmall-order-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 熔断降级规则数据源
        ds2:
          nacos:
            dataId: nexusmall-order-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            dataId: nexusmall-order-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}


order:
  # 订单超时自动取消时间（分钟）
  timeout-cancel: 30
  # 订单号前缀
  order-no-prefix: "ORD"
  # 最大购买数量
  max-purchase-quantity: 100
