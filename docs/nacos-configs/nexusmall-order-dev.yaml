# =====================================================
# NexusMall 订单服务 - 开发环境配置
# =====================================================
# Data ID: nexusmall-order-dev.yaml
# Group: MALL_GROUP
# Namespace: dev
# Profile: dev
# 用途：开发环境专属配置（优先级高于 nexusmall-order.yaml）
# 说明：
# - 此文件仅包含开发环境特有的差异化配置
# - 共享配置已在 nexusmall-common.yaml 中定义
# - 业务通用配置已在 nexusmall-order.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（开发环境）
# ===============================
spring:
  # 数据库连接配置（完整配置，符合业界标准）
  datasource:
    # JDBC 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据源类型：HikariCP（Spring Boot 2.x 默认，性能最优）
    type: com.zaxxer.hikari.HikariDataSource
    # JDBC 连接 URL（订单服务专用数据库）
    url: jdbc:mysql://10.10.1.1:3306/nexusmall_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&serverTimezone=GMT%2B8
    # 数据库用户名
    username: root
    # 数据库密码（生产环境建议使用环境变量）
    password: "123456"
    # HikariCP 连接池参数
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 空闲连接超时时间（毫秒）
      idle-timeout: 30000
      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试查询语句
      connection-test-query: SELECT 1
  
  # Redis 配置（开发环境）
  redis:
    # Redis 服务器地址
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}

# ===============================
# RocketMQ 配置（开发环境）
# ===============================
rocketmq:
  # NameServer 地址
  name-server: 10.10.1.1:9876
  # 生产者配置
  producer:
    group: order-producer-group-dev
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

# ===============================
# Seata 分布式事务配置（开发环境）
# ===============================
seata:
  enabled: true
  application-id: nexusmall-order
  tx-service-group: nexusmall-tx-group
  service:
    vgroup-mapping:
      nexusmall-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      # Seata Server 注册的命名空间（通常为 public 或 ""）
      namespace: ""
      group: SEATA_GROUP
      cluster: default
      username: nacos
      password: nacos
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: dev
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seataServer.properties

# ===============================
# 业务特定配置（开发环境）
# ===============================
order:
  # 订单超时自动取消时间（分钟）
  timeout-cancel: 30
  # 订单号前缀
  order-no-prefix: "ORD-DEV"
  # 最大购买数量
  max-purchase-quantity: 100