# =====================================================
# NexusMall 支付服务配置
# =====================================================
# Data ID: nexusmall-payment.yaml
# Group: MALL_GROUP
# Namespace: dev/test/prod（根据环境选择）
# 用途：支付服务专属业务配置（所有环境共享）
# 说明：
# - 此文件存放所有环境共享的通用配置
# - 环境特定配置请创建 nexusmall-payment-{profile}.yaml
# - 示例：nexusmall-payment-dev.yaml, nexusmall-payment-test.yaml
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复
  
  # Redis 连接池配置（通用参数，所有环境共享）
  redis:
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  # Spring Cloud 配置
  cloud:
    sentinel:
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            dataId: nexusmall-payment-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 熔断降级规则数据源
        ds2:
          nacos:
            dataId: nexusmall-payment-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            dataId: nexusmall-payment-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  application-id: nexusmall-payment

# ===============================
# SpringDoc + Knife4j API 文档配置
# ===============================
springdoc:
  packages-to-scan: com.nexusmall.payment.controller
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.nexusmall.payment.controller

# ===============================
# 业务特定配置
# ===============================
payment:
  # 支付渠道配置
  channels:
    # 支付宝
    alipay:
      enabled: true
      # 超时时间（分钟）
      timeout: 30
    # 微信支付
    wechat:
      enabled: true
      timeout: 30
    # 银联
    unionpay:
      enabled: false
      timeout: 30
  # 对账配置
  reconciliation:
    # 是否启用自动对账
    auto-enabled: true
    # 对账时间（每天凌晨2点）
    cron: "0 0 2 * * ?"
  # 退款配置
  refund:
    # 退款审核是否需要人工确认
    manual-review: true
    # 退款超时时间（天）
    timeout-days: 7
