# =====================================================
# NexusMall 用户行为服务配置
# =====================================================
# Data ID: nexusmall-behavior.yaml
# Group: MALL_GROUP
# Namespace: dev/test/prod（根据环境选择）
# 用途：用户行为服务专属业务配置（所有环境共享）
# 说明：
# - 此文件存放所有环境共享的通用配置
# - 环境特定配置请创建 nexusmall-behavior-{profile}.yaml
# - 示例：nexusmall-behavior-dev.yaml, nexusmall-behavior-test.yaml
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复

  # 数据库连接池配置（通用参数，所有环境共享）
  datasource:
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 空闲连接超时时间（毫秒）
      idle-timeout: 30000
      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接超时时间（毫秒）
      connection-timeout: 30000

  # Spring Cloud 配置
  cloud:
    # OpenFeign 服务调用配置（已移除，behavior模块不使用）
    # openfeign:
    #   sentinel:
    #     enabled: true
    #   client:
    #     config:
    #       default:
    #         connectTimeout: 5000
    #         readTimeout: 5000
    #   compression:
    #     request:
    #       enabled: true
    #     response:
    #       enabled: true

    # Sentinel 熔断限流配置（通用参数）
    sentinel:
      # 启用 Sentinel
      enabled: true
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      # ⚠️ 注意：以下环境相关配置在 nexusmall-behavior-{profile}.yaml 中定义：
      # - spring.cloud.sentinel.transport.dashboard (Dashboard 地址)
      # - spring.cloud.sentinel.transport.port (本地通信端口)
      # - spring.cloud.sentinel.datasource.* (完整数据源配置)

  # Kafka 配置（通用参数）
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 发送失败后重试次数
      retries: 3
      # 批量发送的数据量
      batch-size: 16384
      # 缓冲区内存大小
      buffer-memory: 33554432
      # 确认模式：all 表示所有副本都确认才算是发送成功
      acks: all
    consumer:
      group-id: behavior-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
      auto-commit-interval: 1000

# ===============================
# 用户行为日志存储策略配置
# ===============================
user:
  behavior:
    # ===============================
    # Elasticsearch 存储开关
    # ===============================
    # 用途：控制用户行为日志是否同步到 Elasticsearch
    # 默认值：true（生产环境建议开启，用于数据分析）
    # 适用场景：
    #   - true：开启 ES 存储，支持行为数据检索与分析
    #   - false：关闭 ES 存储，仅保留 MySQL + Kafka
    es:
      enabled: true
    
    # ===============================
    # Kafka 发送开关
    # ===============================
    # 用途：控制用户行为日志是否发送到 Kafka
    # 默认值：true（生产环境建议开启，用于实时流处理）
    # 适用场景：
    #   - true：开启 Kafka 发送，支持实时行为分析
    #   - false：关闭 Kafka 发送，仅保留 MySQL + ES
    kafka:
      enabled: true

# ===============================
# MyBatis-Plus 配置
# ===============================
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类别名包路径
  type-aliases-package: com.nexusmall.behavior.entity
  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 禁用二级缓存
    cache-enabled: false
    # SQL 日志实现类
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  # 全局配置
  global-config:
    db-config:
      # 主键生成策略
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===============================
# RocketMQ 配置（通用参数）
# ===============================
rocketmq:
  # ⚠️ 注意：以下环境相关配置在 nexusmall-behavior-{profile}.yaml 中定义：
  # - rocketmq.name-server (NameServer 地址)
  # - rocketmq.producer.group (生产者组名称)
  # 生产者配置（通用参数）
  producer:
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

