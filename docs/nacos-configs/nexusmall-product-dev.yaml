# =====================================================
# NexusMall 商品服务 - Dev 环境配置
# =====================================================
# 说明：此文件存储在 Nacos 配置中心，Data ID 为 nexusmall-product-dev.yaml
# 用途：Product 服务在开发环境的特定配置
# 注意：Profile 应通过启动参数指定（-Dspring.profiles.active=dev）
#       不应在配置文件中写死
# =====================================================

# ===============================
# Seata 详细配置（覆盖通用配置）
# ===============================
seata:
  service:
    grouplist:
      default: 127.0.0.1:8091
  registry:
    nacos:
      server-addr: 10.10.1.1:8848
      group: SEATA_GROUP
      application: seata-server
  config:
    nacos:
      server-addr: 10.10.1.1:8848
      group: SEATA_GROUP
      data-id: seataServer.properties
