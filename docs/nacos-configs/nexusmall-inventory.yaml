# =====================================================
# NexusMall Inventory Service - Nacos Configuration
# 库存服务 Nacos 托管配置
# =====================================================
# 配置说明：
# - Data ID: nexusmall-inventory.yaml
# - Group: MALL_GROUP
# - 适用环境：所有环境共享（具体环境差异通过环境变量区分）
# - 维护团队：平台架构组
# =====================================================

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  # ⚠️ 注意：其他 Seata 通用参数已在 nexusmall-common-web.yaml 中定义
  application-id: nexusmall-inventory

# ===============================
# Sentinel 数据源配置（从 Nacos 加载流控规则）
# ===============================
spring:
  cloud:
    sentinel:
      datasource:
        # 流控规则
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            data-id: ${spring.application.name}-flow-rules
            group-id: DEFAULT_GROUP
            rule-type: flow
        # 降级规则
        ds2:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            data-id: ${spring.application.name}-degrade-rules
            group-id: DEFAULT_GROUP
            rule-type: degrade
        # 系统规则
        ds3:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            data-id: ${spring.application.name}-system-rules
            group-id: DEFAULT_GROUP
            rule-type: system

# ===============================
# SpringDoc + Knife4j API 文档配置（模块特定）
# ===============================
# ⚠️ 注意：通用配置（path、enable、language）已在 nexusmall-common-web.yaml 中定义
springdoc:
  # 扫描的包路径（Inventory 模块特定）
  packages-to-scan: com.nexusmall.inventory
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.nexusmall.inventory
