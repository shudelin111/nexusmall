# =====================================================
# NexusMall Promotion Service - Nacos Configuration
# 营销服务 Nacos 托管配置
# =====================================================
# 配置说明：
# - Data ID: nexusmall-promotion.yaml
# - Group: MALL_GROUP
# - 适用环境：所有环境共享（具体环境差异通过环境变量区分）
# - 维护团队：平台架构组
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复
  
  # Redis 连接池配置（通用参数，所有环境共享）
  redis:
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  # Spring Cloud 配置
  cloud:
    sentinel:
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            dataId: nexusmall-promotion-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 熔断降级规则数据源
        ds2:
          nacos:
            dataId: nexusmall-promotion-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            dataId: nexusmall-promotion-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  application-id: nexusmall-promotion

# ===============================
# SpringDoc + Knife4j API 文档配置
# ===============================
springdoc:
  packages-to-scan: com.nexusmall.promotion.controller
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.nexusmall.promotion.controller
