# =====================================================
# NexusMall Third-Party Service - Test Environment Configuration
# 第三方服务集成 - 测试环境配置
# =====================================================
# Data ID: nexusmall-third-party-test.yaml
# Group: MALL_GROUP
# Namespace: test
# Profile: test
# 用途：测试环境专属配置（优先级高于 nexusmall-third-party.yaml）
# 说明：
# - 此文件仅包含测试环境特有的差异化配置
# - 共享配置已在 nexusmall-common*.yaml 中定义
# - 业务通用配置已在 nexusmall-third-party.yaml 中定义
# =====================================================

# ===============================
# Redis 配置（测试环境）
# ===============================
spring:
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 3000ms

  # Spring Cloud 配置（测试环境）
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:nexusmall-sentinel.test.svc:8080}
        port: ${SENTINEL_TRANSPORT_PORT:8719}

  # Kafka 配置（测试环境）
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:mall-kafka-ok-kafka-bootstrap.kafka.svc:9092}

# ===============================
# RocketMQ 配置（测试环境）
# ===============================
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  producer:
    group: third-party-producer-group-test

# ===============================
# Seata 分布式事务配置（测试环境，默认禁用）
# ===============================
seata:
  enabled: false
  registry:
    type: nacos
    nacos:
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      namespace: ${SEATA_NAMESPACE:}
      group: ${SEATA_GROUP:SEATA_GROUP}
      cluster: default
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      namespace: ${SEATA_NAMESPACE:}
      group: ${SEATA_GROUP:SEATA_GROUP}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      data-id: seataServer.properties

# ===============================
# MinIO 对象存储配置（测试环境）
# ===============================
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio.test.svc:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

# ===============================
# 第三方服务业务配置（测试环境）
# ===============================
third-party:
  sms:
    aliyun:
      access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
  
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://minio.test.svc:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
    aliyun-oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
      bucket-name: ${ALIYUN_OSS_BUCKET:}

# ===============================
# SpringDoc OpenAPI 文档配置（测试环境）
# ===============================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Kafka 日志收集开关（测试环境默认关闭）
nexusmall:
  logging:
    kafka:
      enabled: false

# ===============================
# 日志文件路径配置（测试环境）
# ===============================
logging:
  file:
    path: /var/log/nexusmall

# ===============================
# Zipkin 链路追踪配置（测试环境）
# ===============================
zipkin:
  enabled: false
  base-url: ${ZIPKIN_BASE_URL:http://zipkin.test.svc:9411}
