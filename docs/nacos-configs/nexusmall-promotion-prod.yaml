# =====================================================
# NexusMall Promotion Service - Production Environment Configuration
# 营销服务 - 生产环境配置
# =====================================================
# Data ID: nexusmall-promotion-prod.yaml
# Group: MALL_GROUP
# Namespace: prod
# Profile: prod
# 用途：生产环境专属配置（优先级高于 nexusmall-promotion.yaml）
# 说明：
# - 此文件仅包含生产环境特有的差异化配置
# - 共享配置已在 nexusmall-common*.yaml 中定义
# - 业务通用配置已在 nexusmall-promotion.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（生产环境）
# ===============================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:10.10.1.1}:${MYSQL_PORT:3306}/nexusmall_promotion?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=false&connectTimeout=3000&socketTimeout=5000
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  # Redis 配置（生产环境）
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 3000ms

  # Spring Cloud 配置（生产环境）
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:nexusmall-sentinel.prod.svc:8080}
        port: ${SENTINEL_TRANSPORT_PORT:8719}

  # Kafka 配置（生产环境）
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:mall-kafka-ok-kafka-bootstrap.kafka.svc:9092}

# ===============================
# RocketMQ 配置（生产环境）
# ===============================
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  producer:
    group: promotion-producer-group-prod

# ===============================
# Seata 分布式事务配置（生产环境）
# ===============================
seata:
  registry:
    type: nacos
    nacos:
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      namespace: ${SEATA_NAMESPACE:}
      group: ${SEATA_GROUP:SEATA_GROUP}
      cluster: default
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      namespace: ${SEATA_NAMESPACE:}
      group: ${SEATA_GROUP:SEATA_GROUP}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      data-id: seataServer.properties

# ===============================
# SpringDoc + Knife4j API 文档配置（生产环境）
# ===============================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false
  production: true

# Kafka 日志收集开关（生产环境启用）
nexusmall:
  logging:
    kafka:
      enabled: true

# ===============================
# 日志文件路径配置（生产环境）
# ===============================
logging:
  file:
    path: /data/logs/nexusmall

# ===============================
# Zipkin 链路追踪配置（生产环境）
# ===============================
zipkin:
  enabled: true
  base-url: ${ZIPKIN_BASE_URL:http://zipkin.prod.svc:9411}
