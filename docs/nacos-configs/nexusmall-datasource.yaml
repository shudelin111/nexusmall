# =====================================================
# NexusMall 数据库连接池公共配置
# =====================================================
# 用途：统一数据库连接池配置
# 适用：所有使用 MySQL 的微服务
# =====================================================

spring:
  datasource:
    # MySQL 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据源类型：HikariCP（Spring Boot 2.x 默认，性能最优）
    type: com.zaxxer.hikari.HikariDataSource
    
    # HikariCP 连接池详细配置
    hikari:
      # 最小空闲连接数
      # 含义：池中保持的最少空闲连接
      # 建议值：根据并发量调整，公式：CPU 核心数 * 2 + 1
      minimum-idle: 5
      
      # 最大连接数
      # 含义：池中允许的最大活跃连接数
      # 建议值：根据业务并发量调整，一般 20-50
      maximum-pool-size: 20
      
      # 空闲连接超时时间（毫秒）
      # 含义：连接空闲超过此时间将被回收
      # 建议：小于数据库的 wait_timeout 参数
      idle-timeout: 30000  # 30 秒
      
      # 连接最大生命周期（毫秒）
      # 含义：连接从创建到强制关闭的总时长
      # 建议：比数据库的 wait_timeout 短几分钟
      # MySQL 默认 wait_timeout=28800 秒（8 小时）
      max-lifetime: 1800000  # 30 分钟
      
      # 连接超时时间（毫秒）
      # 含义：获取连接时最多等待多久
      # 建议：根据业务容忍度调整，一般 30 秒
      connection-timeout: 30000  # 30 秒
      
      # 连接测试查询语句
      # 作用：检测连接是否有效
      # MySQL 常用：SELECT 1
      connection-test-query: SELECT 1
      
      # 连接池名称
      # 作用：用于日志和监控标识
      pool-name: NexusMall-HikariCP
      
      # 是否启用 JMX
      # 作用：允许通过 JMX 监控连接池
      register-mbeans: true
      
      # JMX 名称前缀
      jmx:
        pool-name: NexusMall
