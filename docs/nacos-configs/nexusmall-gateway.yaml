# =====================================================
# NexusMall 网关服务配置（Nacos 托管）
# =====================================================
# 说明：此文件存储在 Nacos 配置中心，Data ID 为 nexusmall-gateway.yaml
# 用途：Gateway 服务的通用业务配置（所有环境共享）
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 9000

# ===============================
# Spring 应用配置
# ===============================
spring:
  # ------------------------------
  # Redis 缓存配置
  # ------------------------------
  redis:
    host: 10.10.1.1
    port: 6379
    database: 0
    password: "123456"
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms
  
  # ------------------------------
  # Spring Cloud 配置
  # ------------------------------
  cloud:
    # Sentinel 熔断限流配置
    sentinel:
      # 取消控制台懒加载（启动时立即注册到 Dashboard）
      eager: true
      transport:
        dashboard: 10.10.1.1:8858
        port: 8719
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: ""
            dataId: nexusmall-gateway-flow-rule.json
            groupId: DEFAULT_GROUP
            rule-type: flow
            data-type: json
            username: nacos
            password: nacos
        
        # 熔断降级规则数据源
        ds2:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: ""
            dataId: nexusmall-gateway-degrade-rule.json
            groupId: DEFAULT_GROUP
            rule-type: degrade
            data-type: json
            username: nacos
            password: nacos
        
        # 系统自适应保护规则数据源
        ds3:
          nacos:
            server-addr: 10.10.1.1:8848
            namespace: ""
            dataId: nexusmall-gateway-system-rule.json
            groupId: DEFAULT_GROUP
            rule-type: system
            data-type: json
            username: nacos
            password: nacos
    
    # Kafka 配置（用于日志收集）
    kafka:
      bootstrap-servers: mall-kafka-ok-kafka-bootstrap.kafka.svc.cluster.local:9092
      producer:
        acks: 1
        retries: 3
        batch-size: 16384
        buffer-memory: 33554432
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.apache.kafka.common.serialization.StringSerializer

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  enabled: true
  application-id: nexusmall-gateway
  tx-service-group: nexusmall-tx-group
  service:
    vgroup-mapping:
      nexusmall-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: ""
      group: SEATA_GROUP
      cluster: default
      username: nacos
      password: nacos
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: 10.10.1.1:8848
      namespace: ""
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seataServer.properties

# ===============================
# Actuator 监控端点配置
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true

# ===============================
# 日志级别配置
# ===============================
logging:
  level:
    root: INFO
    io.seata: INFO
    com.alibaba.csp.sentinel: DEBUG
    com.nexusmall.gateway: DEBUG
    com.nexusmall.common: DEBUG

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    name: nexusmall-gateway
    description: NexusMall 网关服务
    version: 0.0.1-SNAPSHOT
  java.version: 1.8
