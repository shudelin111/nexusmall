# =====================================================
# NexusMall Gateway Service - Nacos Configuration
# 网关服务 Nacos 托管配置
# =====================================================
# 配置说明：
# - Data ID: nexusmall-gateway.yaml
# - Group: MALL_GROUP
# - 适用环境：所有环境共享（具体环境差异通过环境变量区分）
# - 维护团队：平台架构组
# =====================================================

# ===============================
# Spring Cloud Gateway 路由配置
# ===============================
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      routes:
        # 订单服务
        - id: order-service
          uri: lb://nexusmall-order
          predicates:
            - Path=/order/**
          filters:
            - RewritePath=/order/(?<segment>.*), /$\{segment}
            - PreserveHostHeader

        # 认证服务
        - id: auth-service
          uri: lb://nexusmall-auth
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 商品服务
        - id: product-service
          uri: lb://nexusmall-product
          predicates:
            - Path=/product/**
          filters:
            - RewritePath=/product/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 会员服务
        - id: member-service
          uri: lb://nexusmall-member
          predicates:
            - Path=/member/**
          filters:
            - RewritePath=/member/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 支付服务
        - id: payment-service
          uri: lb://nexusmall-payment
          predicates:
            - Path=/payment/**
          filters:
            - RewritePath=/payment/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 购物车服务
        - id: cart-service
          uri: lb://nexusmall-cart
          predicates:
            - Path=/cart/**
          filters:
            - RewritePath=/cart/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 行为服务
        - id: behavior-service
          uri: lb://nexusmall-behavior
          predicates:
            - Path=/behavior/**
          filters:
            - RewritePath=/behavior/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 第三方服务
        - id: third-party-service
          uri: lb://nexusmall-third-party
          predicates:
            - Path=/third-party/**
          filters:
            - RewritePath=/third-party/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 库存服务
        - id: inventory-service
          uri: lb://nexusmall-inventory
          predicates:
            - Path=/inventory/**
          filters:
            - RewritePath=/inventory/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 营销服务
        - id: promotion-service
          uri: lb://nexusmall-promotion
          predicates:
            - Path=/promotion/**
          filters:
            - RewritePath=/promotion/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 搜索服务
        - id: search-service
          uri: lb://nexusmall-search
          predicates:
            - Path=/search/**
          filters:
            - RewritePath=/search/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 通知服务
        - id: notification-service
          uri: lb://nexusmall-notification
          predicates:
            - Path=/notification/**
          filters:
            - RewritePath=/notification/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
        
        # 物流服务
        - id: logistics-service
          uri: lb://nexusmall-logistics
          predicates:
            - Path=/logistics/**
          filters:
            - RewritePath=/logistics/(?<segment>.*), /$\{segment}
            - PreserveHostHeader
      
      # CORS 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

