# ===============================
# Knife4j Gateway API 文档聚合配置
# ===============================
knife4j:
  gateway:
    enabled: true
    strategy: discover
    routes:
      - name: 认证服务
        service-name: nexusmall-auth
        url: /auth/v3/api-docs?group=default
      - name: 商品服务
        service-name: nexusmall-product
        url: /product/v3/api-docs?group=default
      - name: 订单服务
        service-name: nexusmall-order
        url: /order/v3/api-docs?group=default
      - name: 购物车服务
        service-name: nexusmall-cart
        url: /cart/v3/api-docs?group=default
      - name: 通知服务
        service-name: nexusmall-notification
        url: /notification/v3/api-docs?group=default
      - name: 物流服务
        service-name: nexusmall-logistics
        url: /logistics/v3/api-docs?group=default
    sort-order: 0
