# =====================================================
# NexusMall Cart Service - Nacos Configuration
# 购物车服务 Nacos 托管配置
# =====================================================
# 配置说明：
# - Data ID: nexusmall-cart.yaml
# - Group: MALL_GROUP
# - 适用环境：所有环境共享（具体环境差异通过环境变量区分）
# - 维护团队：平台架构组
# =====================================================

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  # ⚠️ 注意：其他 Seata 通用参数已在 nexusmall-common-web.yaml 中定义
  application-id: nexusmall-cart

# ===============================
# 业务配置
# ===============================
cart:
  # 购物车最大商品种类数
  max-items: 100
  
  # 登录用户购物车过期天数
  logged-in-expire-days: 30
  
  # 匿名用户购物车过期小时数
  anonymous-expire-hours: 24
  
  # 批量操作最大数量
  batch-operation-max-size: 50

# ===============================
# SpringDoc + Knife4j API 文档配置（模块特定）
# ===============================
# ⚠️ 注意：通用配置（path、enable、language）已在 nexusmall-common-web.yaml 中定义
springdoc:
  # 扫描的包路径（Cart 模块特定）
  packages-to-scan: com.nexusmall.cart
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.nexusmall.cart
