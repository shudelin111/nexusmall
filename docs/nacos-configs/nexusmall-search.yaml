# =====================================================
# NexusMall Search Service - Nacos Configuration
# 搜索服务 Nacos 托管配置
# =====================================================
# 配置说明：
# - Data ID: nexusmall-search.yaml
# - Group: MALL_GROUP
# - 适用环境：所有环境共享（具体环境差异通过环境变量区分）
# - 维护团队：平台架构组
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复
  
  # Elasticsearch 配置（Search 模块核心）
  elasticsearch:
    # ⚠️ 注意：uris、username、password 在 nexusmall-search-{profile}.yaml 中定义
    rest:
      connection-timeout: 5s
      socket-timeout: 30s

  # Redis 缓存配置（搜索建议缓存）
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5分钟（毫秒）
      key-prefix: "search:cache:"  # Key 前缀
      use-key-prefix: true
      cache-null-values: false  # 不缓存空值
  
  # Redis 连接池配置（通用参数，所有环境共享）
  redis:
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  # Spring Cloud 配置
  cloud:
    sentinel:
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            dataId: nexusmall-search-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 熔断降级规则数据源
        ds2:
          nacos:
            dataId: nexusmall-search-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            dataId: nexusmall-search-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

# ===============================
# SpringDoc + Knife4j API 文档配置
# ===============================
springdoc:
  packages-to-scan: com.nexusmall.search.interfaces.rest
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.nexusmall.search.interfaces.rest

# ===============================
# Search 业务配置（通用参数）
# ===============================
nexusmall:
  search:
    # 索引别名
    index-alias: nexusmall_product
    # 默认页码
    default-page-no: 1
    # 默认每页大小
    default-page-size: 20
    # 最大每页大小
    max-page-size: 100
    # 索引分片数
    index-shards: 1
    # 索引副本数
    index-replicas: 1
    # 商品同步 Topic
    product-sync-topic: PRODUCT_INDEX_SYNC_TOPIC
