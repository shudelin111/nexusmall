# ===============================
# SpringDoc + Knife4j API 文档配置（模块特定）
# ===============================
# ⚠️ 注意：通用配置（path、enable、language）已在 nexusmall-common-web.yaml 中定义
springdoc:
  # 扫描的包路径（Auth 模块特定）
  packages-to-scan: com.nexusmall.auth
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.nexusmall.auth
