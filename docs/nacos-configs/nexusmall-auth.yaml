# ===============================
# Spring Boot Actuator 监控配置
# ===============================
# 业界标准配置：暴露 Prometheus 监控端点
management:
  endpoints:
    web:
      # 暴露所有端点（生产环境建议只暴露 health,info,prometheus）
      exposure:
        include: "*"
  # 端点详细配置
  endpoint:
    health:
      # 显示健康检查详情
      show-details: always
    info:
      # 启用 info 端点
      enabled: true
    prometheus:
      # 启用 Prometheus 端点（必需）
      enabled: true
  # 指标监控配置
  metrics:
    # 启用指标收集
    enabled: true
    # 标签配置（用于区分不同微服务）
    tags:
      # 应用名称标签（Prometheus 中通过此标签区分服务）
      application: ${spring.application.name}
    # 导出配置
    export:
      # Prometheus 导出配置
      prometheus:
        # 启用 Prometheus 导出（必需）
        enabled: true

# ===============================
# 日志级别配置（通用参数）
# ===============================
# ⚠️ 注意：具体日志级别在 nexusmall-auth-{profile}.yaml 中定义
logging:
  level:
    # 根日志级别（默认级别）
    root: INFO
    # Seata 分布式事务日志
    io.seata: INFO
