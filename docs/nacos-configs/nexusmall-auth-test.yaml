# =====================================================
# NexusMall 认证服务 - 测试环境配置
# =====================================================
# Data ID: nexusmall-auth-test.yaml
# Group: MALL_GROUP
# Namespace: test
# Profile: test
# 用途：测试环境专属配置（优先级高于 nexusmall-auth.yaml）
# 说明：
# - 此文件仅包含测试环境特有的差异化配置
# - 共享配置已在 nexusmall-common.yaml 中定义
# - 业务通用配置已在 nexusmall-auth.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（测试环境）
# ===============================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:10.10.1.1}:${MYSQL_PORT:3306}/nexusmall_auth?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=3000&socketTimeout=5000
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  # Redis 配置（测试环境）
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 5000ms

  # Kafka 配置（测试环境 - 仅定义 bootstrap-servers，其他参数在 nexusmall-common-mq.yaml 中）
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:10.10.1.1:9092}

  # Spring Cloud 配置（测试环境）
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        port: ${SENTINEL_TRANSPORT_PORT:8719}
      datasource:
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            data-id: ${spring.application.name}-sentinel-rules
            group-id: ${NACOS_GROUP:MALL_GROUP}
            rule-type: flow
    sleuth:
      sampler:
        probability: 0.5  # 测试环境 50% 采样
  zipkin:
    enabled: true
    base-url: ${ZIPKIN_BASE_URL:http://10.10.1.1:9411}

# ===============================
# RocketMQ 配置（测试环境）
# ===============================
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  producer:
    group: auth-producer-group-test

# ===============================
# 日志配置（测试环境）
# ===============================
logging:
  level:
    root: INFO
    com.nexusmall.auth: DEBUG
    com.nexusmall.common: DEBUG
    com.nexusmall.auth.infrastructure.persistence.dao: DEBUG
  file:
    path: /var/log/nexusmall

# ===============================
# SpringDoc + Knife4j API 文档配置（测试环境）
# ===============================
springdoc:
  api-docs:
    enabled: true  # 测试环境启用 API 文档
  swagger-ui:
    enabled: true  # 测试环境启用 Swagger UI

knife4j:
  enable: true  # 测试环境启用 Knife4j
  production: false  # 测试环境非生产模式

# Kafka 日志收集开关（测试环境默认开启）
nexusmall:
  logging:
    kafka:
      enabled: true
