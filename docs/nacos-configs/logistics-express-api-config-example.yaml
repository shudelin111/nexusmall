# =====================================================
# 第三方物流API配置示例
# =====================================================
# 使用说明：
# 1. 在 Nacos 配置中心添加以下配置
# 2. Data ID: nexusmall-logistics.yaml
# 3. Group: MALL_GROUP
# 4. 替换实际的 API Key 和 Business ID
# =====================================================

logistics:
  express:
    # 默认使用的物流查询服务商：kuaidiniao（快递鸟）或 kuaidi100（快递100）
    default-provider: kuaidiniao
    
    # 快递鸟配置（推荐）
    # 官网：http://www.kdniao.com
    # 免费注册即可获得 API Key
    kuaidiniao:
      # 商户ID（从快递鸟后台获取）
      business-id: your_business_id_here
      # API密钥（从快递鸟后台获取）
      api-key: your_api_key_here
      # API端点（无需修改）
      api-url: http://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx
      # 是否启用
      enabled: true
    
    # 快递100配置（备用）
    # 官网：https://www.kuaidi100.com/openapi/
    # 需要企业认证才能使用完整功能
    kuaidi100:
      # 客户ID（从快递100后台获取）
      customer-id: your_customer_id_here
      # API密钥（从快递100后台获取）
      api-key: your_api_key_here
      # API端点（无需修改）
      api-url: https://poll.kuaidi100.com/poll/query.do
      # 是否启用
      enabled: false

# =====================================================
# 配置说明
# =====================================================
# 1. 快递鸟 vs 快递100 对比：
#    - 快递鸟：
#      ✓ 免费额度高（每天3000次查询）
#      ✓ 支持快递公司多（覆盖99%以上）
#      ✓ 实时性好
#      ✗ 需要实名认证
#    
#    - 快递100：
#      ✓ 接口稳定
#      ✓ 文档完善
#      ✗ 免费版有限制（每天500次）
#      ✗ 需要企业认证才能订阅推送
# 
# 2. 推荐使用策略：
#    - 开发环境：使用快递鸟免费版
#    - 生产环境：
#      * 主用：快递鸟（购买套餐，约0.01元/次）
#      * 备用：快递100（自动降级）
#
# 3. 获取 API Key 步骤：
#    快递鸟：
#    ① 访问 http://www.kdniao.com/reg
#    ② 注册账号并实名认证
#    ③ 登录后进入"我的账户" -> "API密钥管理"
#    ④ 复制 Business ID 和 API Key
#
#    快递100：
#    ① 访问 https://www.kuaidi100.com/openapi/apply.shtml
#    ② 申请开放平台账号（需要企业认证）
#    ③ 审核通过后获取 Customer ID 和 Key
#
# 4. 测试配置是否正确：
#    curl -X GET "http://localhost:18000/express-tracks/query?expressCompany=顺丰速运&expressNo=SF1234567890" \
#      -H "X-API-Version: v1"
#
# 5. 常见问题：
#    Q: 查询返回空数据？
#    A: 检查快递单号是否正确，或者该快递公司是否支持
#
#    Q: 签名验证失败？
#    A: 检查 Business ID 和 API Key 是否正确，注意不要有多余空格
#
#    Q: 如何切换服务商？
#    A: 修改 default-provider 配置，重启服务即可
# =====================================================
