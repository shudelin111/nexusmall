# =====================================================
# NexusMall 购物车服务 - 开发环境配置
# =====================================================
# Data ID: nexusmall-cart-dev.yaml
# Group: MALL_GROUP
# Namespace: dev
# Profile: dev
# 用途：开发环境专属配置（优先级高于 nexusmall-cart.yaml）
# 说明：
# - 此文件仅包含开发环境特有的差异化配置
# - 共享配置已在 nexusmall-common.yaml 中定义
# - 业务通用配置已在 nexusmall-cart.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（开发环境）
# ===============================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:10.10.1.1}:${MYSQL_PORT:3306}/nexusmall_cart?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=3000&socketTimeout=5000
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  # Redis 配置（开发环境）
  redis:
    host: ${REDIS_HOST:10.10.1.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:123456}
    timeout: 3000ms

  # Spring Cloud 配置（开发环境）
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        port: ${SENTINEL_TRANSPORT_PORT:8719}
      datasource:
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
            data-id: ${spring.application.name}-sentinel-rules
            group-id: ${NACOS_GROUP:MALL_GROUP}
            rule-type: flow
    sleuth:
      sampler:
        probability: 1.0  # 开发环境全量采样
  zipkin:
    enabled: false  # 开发环境默认关闭
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}

  # Kafka 配置（开发环境）
  kafka:
    # Kafka 集群地址（K8s 内部服务地址）
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:mall-kafka-ok-kafka-bootstrap.kafka.svc:9092}

# ===============================
# RocketMQ 配置（开发环境）
# ===============================
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  producer:
    group: cart-producer-group-dev

# ===============================
# SpringDoc + Knife4j API 文档配置（开发环境）
# ===============================
# ⚠️ 注意：API 文档通用配置（path、packages-to-scan、group-configs、language）在 nexusmall-cart.yaml 中定义
springdoc:
  api-docs:
    # 开发环境启用 API 文档
    enabled: true
  swagger-ui:
    # 开发环境启用 Swagger UI
    enabled: true

knife4j:
  # 开发环境启用 Knife4j
  enable: true
  # 开发环境非生产模式
  production: false

# Kafka 日志收集开关（开发环境默认关闭）
nexusmall:
  logging:
    kafka:
      enabled: false

# ===============================
# 日志文件路径配置（开发环境）
# ===============================
logging:
  file:
    path: ./logs

# ===============================
# Seata 分布式事务配置（开发环境）
# ===============================
seata:
  registry:
    type: nacos
    nacos:
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      namespace: ${SEATA_NAMESPACE:}
      group: ${SEATA_GROUP:SEATA_GROUP}
      cluster: default
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      namespace: ${SEATA_NAMESPACE:}
      group: ${SEATA_GROUP:SEATA_GROUP}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      data-id: seataServer.properties

