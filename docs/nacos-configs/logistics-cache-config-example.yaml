# =====================================================
# 物流模块缓存配置
# =====================================================
# 使用说明：
# 1. 在 Nacos 配置中心添加以下配置
# 2. Data ID: nexusmall-logistics.yaml
# 3. Group: MALL_GROUP
# =====================================================

logistics:
  cache:
    # 是否启用缓存
    enabled: true
    
    # 仓库信息缓存配置
    warehouse:
      # 缓存前缀
      key-prefix: "logistics:warehouse:"
      # 单个仓库缓存TTL（秒），默认1小时
      ttl-seconds: 3600
      # 仓库列表缓存TTL（秒），默认30分钟
      list-ttl-seconds: 1800
      # 最大缓存数量
      max-size: 100
    
    # 运费模板缓存配置
    freight-template:
      # 缓存前缀
      key-prefix: "logistics:freight:template:"
      # 缓存TTL（秒），默认1小时
      ttl-seconds: 3600
      # 默认模板缓存TTL（秒），默认2小时（访问频率高）
      default-ttl-seconds: 7200
      # 最大缓存数量
      max-size: 50

# =====================================================
# Redis配置（确保已配置Redis连接）
# =====================================================
spring:
  redis:
    # Redis服务器地址
    host: localhost
    # Redis服务器端口
    port: 6379
    # Redis数据库索引（默认为0）
    database: 0
    # Redis密码（如果没有密码则注释掉）
    # password: your_password
    # 连接超时时间
    timeout: 3000ms
    # Redisson配置
    redisson:
      # 单节点配置
      single-server-config:
        # 最小空闲连接数
        connection-minimum-idle-size: 10
        # 连接池大小
        connection-pool-size: 64
        # 命令等待超时
        timeout: 3000
        # 发布和订阅连接池大小
        subscription-connection-pool-size: 50

# =====================================================
# 性能优化说明
# =====================================================
# 1. 缓存策略：Cache-Aside模式（旁路缓存）
#    - 读操作：先查缓存，命中则返回；未命中则查数据库并写入缓存
#    - 写操作：先更新数据库，再删除缓存
#
# 2. 缓存优势：
#    ✓ 减少数据库查询压力（预计降低80%+）
#    ✓ 提升响应速度（从50ms降至5ms）
#    ✓ 支持高并发访问
#
# 3. 缓存失效策略：
#    - TTL过期：仓库1小时，运费模板1小时，默认模板2小时
#    - 主动删除：数据更新时立即删除对应缓存
#    - 列表缓存：新增/删除时清除整个列表缓存
#
# 4. 降级机制：
#    - 缓存读取失败时自动降级到数据库查询
#    - 保证系统可用性不受Redis影响
#
# 5. 监控建议：
#    - 监控缓存命中率（目标 > 90%）
#    - 监控Redis内存使用率
#    - 监控缓存穿透/击穿/雪崩风险
#
# 6. 常见问题：
#    Q: 缓存不一致怎么办？
#    A: 采用"更新数据库 + 删除缓存"策略，下次读取时会重新加载最新数据
#
#    Q: 缓存穿透怎么解决？
#    A: 对空值也进行缓存（TTL设置较短），或使用布隆过滤器
#
#    Q: 如何查看缓存数据？
#    A: 使用Redis客户端执行：KEYS logistics:*
#
#    Q: 如何手动清除缓存？
#    A: 使用Redis客户端执行：DEL logistics:warehouse:* 或 logistics:freight:template:*
# =====================================================
