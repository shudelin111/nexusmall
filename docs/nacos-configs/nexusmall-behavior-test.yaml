# =====================================================
# NexusMall 用户行为服务 - 测试环境配置
# =====================================================
# Data ID: nexusmall-behavior-test.yaml
# Group: MALL_GROUP
# Namespace: test
# Profile: test
# 用途：测试环境专属配置（优先级高于 nexusmall-behavior.yaml）
# 说明：
# - 此文件仅包含测试环境特有的差异化配置
# - 共享配置已在 nexusmall-common.yaml 中定义
# - 业务通用配置已在 nexusmall-behavior.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（测试环境）
# ===============================
spring:
  # 数据库连接配置（完整配置，符合业界标准）
  datasource:
    # JDBC 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据源类型：HikariCP（Spring Boot 2.x 默认，性能最优）
    type: com.zaxxer.hikari.HikariDataSource
    # JDBC 连接 URL（用户行为服务专用数据库）
    url: jdbc:mysql://${MYSQL_HOST:10.10.1.1}:${MYSQL_PORT:3306}/nexusmall_behavior?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&serverTimezone=GMT%2B8
    # 数据库用户名
    username: ${MYSQL_USERNAME:root}
    # 数据库密码（生产环境建议使用环境变量或密钥管理服务）
    password: ${MYSQL_PASSWORD:123456}
  
  # Elasticsearch 配置（测试环境）
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://10.10.1.1:9200}
    username: ${ELASTICSEARCH_USERNAME:elastic}
    password: ${ELASTICSEARCH_PASSWORD:G2M9CI4OHL1T9E4j123vIq9M}
  
  # Kafka 配置（测试环境）
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:mall-kafka-ok-kafka-bootstrap.kafka.svc:9092}
  
  # Spring Cloud 配置（测试环境）
  cloud:
    # Sentinel 配置（测试环境）
    # ⚠️ 注意：Sentinel 数据源完整配置（包括 server-addr、namespace、username、password、dataId、groupId、rule-type、data-type）
    sentinel:
      transport:
        # Sentinel Dashboard 地址（测试环境）
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        port: 8719
      # Sentinel 规则数据源配置（Push 模式，从 Nacos 拉取规则）
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:test}
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}
            dataId: nexusmall-behavior-flow-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: flow
            data-type: json
        # 熔断降级规则数据源
        ds2:
          nacos:
            server-addr: ${NACOS_SERVER:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:test}
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}
            dataId: nexusmall-behavior-degrade-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: degrade
            data-type: json
        # 系统自适应保护规则数据源
        ds3:
          nacos:
            server-addr: ${NACOS_SERVER:10.10.1.1:8848}
            namespace: ${NACOS_NAMESPACE:test}
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}
            dataId: nexusmall-behavior-system-rule.json
            groupId: ${NACOS_GROUP:MALL_GROUP}
            rule-type: system
            data-type: json

# ===============================
# 用户行为日志存储策略配置（测试环境）
# ===============================
user:
  behavior:
    # 测试环境开启所有存储（模拟生产环境）
    es:
      enabled: true
    kafka:
      enabled: true

# ===============================
# RocketMQ 配置（测试环境）
# ===============================
# ⚠️ 注意：RocketMQ 生产者通用参数（timeout、retry）在 nexusmall-behavior.yaml 中定义
rocketmq:
  # NameServer 地址
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  # 生产者配置
  producer:
    group: behavior-producer-group-test

# ===============================
# 日志级别配置（测试环境）
# ===============================
logging:
  level:
    root: INFO
    com.alibaba.csp.sentinel: DEBUG
    com.nexusmall.behavior: DEBUG
    com.nexusmall.common: DEBUG
    com.nexusmall.behavior.dao: DEBUG

# Kafka 日志收集开关（测试环境默认关闭）
nexusmall:
  logging:
    kafka:
      enabled: false
