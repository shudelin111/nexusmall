# =====================================================
# NexusMall Behavior Service - Test Environment Configuration
# 用户行为日志服务 - 测试环境配置
# =====================================================
# Data ID: nexusmall-behavior-test.yaml
# Group: MALL_GROUP
# Namespace: test
# Profile: test
# 用途：测试环境专属配置（优先级高于 nexusmall-behavior.yaml）
# 说明：
# - 此文件仅包含测试环境特有的差异化配置
# - 共享配置已在 nexusmall-common.yaml 中定义
# - 业务通用配置已在 nexusmall-behavior.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（测试环境）
# ===============================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:10.10.1.1}:${MYSQL_PORT:3306}/nexusmall_behavior?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=3000&socketTimeout=5000
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  # Spring Cloud 配置（测试环境）
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        port: ${SENTINEL_TRANSPORT_PORT:8719}

  # Elasticsearch 配置（测试环境）
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://es-cluster-es-http.nexusmall-infra.svc:9200}
    username: ${ELASTICSEARCH_USERNAME:elastic}
    password: ${ELASTICSEARCH_PASSWORD:G2M9CI4OHL1T9E4j123vIq9M}

  # Kafka 配置（测试环境）
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:mall-kafka-ok-kafka-bootstrap.kafka.svc:9092}

# ===============================
# RocketMQ 配置（测试环境）
# ===============================
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  producer:
    group: behavior-producer-group-test

# ===============================
# 日志配置（测试环境）
# ===============================
logging:
  level:
    root: INFO
    io.seata: INFO
    com.alibaba.csp.sentinel: INFO
    com.nexusmall.behavior: INFO
    com.nexusmall.common: INFO
  file:
    path: /var/log/nexusmall

# Kafka 日志收集开关（测试环境默认关闭）
nexusmall:
  logging:
    kafka:
      enabled: false
