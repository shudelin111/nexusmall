# =====================================================
# NexusMall 订单服务 - 测试环境配置
# =====================================================
# Data ID: nexusmall-order-test.yaml
# Group: MALL_GROUP
# Namespace: test
# Profile: test
# 用途：测试环境专属配置（优先级高于 nexusmall-order.yaml）
# 说明：
# - 此文件仅包含测试环境特有的差异化配置
# - 共享配置已在 nexusmall-common.yaml 中定义
# - 业务通用配置已在 nexusmall-order.yaml 中定义
# =====================================================

# ===============================
# 数据库连接配置（测试环境）
# ===============================
spring:
  # 数据库连接配置（完整配置，符合业界标准）
  datasource:
    # JDBC 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据源类型：HikariCP（Spring Boot 2.x 默认，性能最优）
    type: com.zaxxer.hikari.HikariDataSource
    # JDBC 连接 URL（订单服务专用数据库）
    url: jdbc:mysql://${MYSQL_HOST:10.10.1.1}:${MYSQL_PORT:3306}/nexusmall_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&serverTimezone=GMT%2B8
    # 数据库用户名
    username: ${MYSQL_USERNAME:root}
    # 数据库密码（生产环境建议使用环境变量或密钥管理服务）
    password: "${MYSQL_PASSWORD:123456}"
    # HikariCP 连接池参数
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 空闲连接超时时间（毫秒）
      idle-timeout: 30000
      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接超时时间（毫秒）
      connection-timeout: 30000

  # Redis 配置（测试环境）
  redis:
    # Redis 服务器地址
    host: ${REDIS_HOST:10.10.1.1}
    # Redis 端口
    port: ${REDIS_PORT:6379}
    # 使用的数据库编号
    database: ${REDIS_DATABASE:0}
    # Redis 密码
    password: ${REDIS_PASSWORD:123456}

  # Spring Cloud 配置（测试环境）
  cloud:
    # Sentinel 配置（测试环境）
    # ⚠️ 注意：Sentinel 数据源规则定义（dataId、groupId、rule-type等）在 nexusmall-order.yaml 中定义
    sentinel:
      transport:
        # Sentinel Dashboard 地址（测试环境）
        dashboard: ${SENTINEL_DASHBOARD:10.10.1.1:8858}
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER:10.10.1.1:8848}
            namespace: test
        ds2:
          nacos:
            server-addr: ${NACOS_SERVER:10.10.1.1:8848}
            namespace: test
        ds3:
          nacos:
            server-addr: ${NACOS_SERVER:10.10.1.1:8848}
            namespace: test

# ===============================
# RocketMQ 配置（测试环境）
# ===============================
# ⚠️ 注意：RocketMQ 生产者通用参数（timeout、retry）在 nexusmall-order.yaml 中定义
rocketmq:
  # NameServer 地址
  name-server: ${ROCKETMQ_NAMESRV:10.10.1.1:9876}
  # 生产者配置
  producer:
    group: order-producer-group-test

# ===============================
# Seata 分布式事务配置（测试环境）
# ===============================
# ⚠️ 注意：Seata 通用参数（enabled、tx-service-group、vgroup-mapping、type、cluster、username、password、application、data-id）在 nexusmall-order.yaml 中定义
seata:
  registry:
    nacos:
      # Seata Server 地址（测试环境）
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      # Seata Server 注册的命名空间（通常为 public 或 ""）
      namespace: ""
      # Seata Server 所在的分组
      group: SEATA_GROUP
  config:
    nacos:
      # Seata 配置中心地址（测试环境）
      server-addr: ${SEATA_SERVER:10.10.1.1:8848}
      # Seata 配置所在的命名空间（通常与 registry 保持一致，使用 public）
      # 注意：如果 seataServer.properties 在 test 命名空间，则改为 test
      namespace: ""
      # Seata 配置所在的分组
      group: SEATA_GROUP

# ===============================
# 业务特定配置（测试环境）
# ===============================
order:
  # 订单号前缀（测试环境标识）
  order-no-prefix: "ORD-TEST"

# ===============================
# SpringDoc + Knife4j API 文档配置（测试环境）
# ===============================
# ⚠️ 注意：API 文档通用配置（path、packages-to-scan、group-configs、language）在 nexusmall-order.yaml 中定义
springdoc:
  api-docs:
    # 测试环境启用 API 文档
    enabled: true
  swagger-ui:
    # 测试环境启用 Swagger UI
    enabled: true

knife4j:
  # 测试环境启用 Knife4j
  enable: true
  # 测试环境非生产模式
  production: false