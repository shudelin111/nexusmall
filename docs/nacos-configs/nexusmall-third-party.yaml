# =====================================================
# NexusMall 第三方服务配置（专属配置）
# =====================================================
# Data ID: nexusmall-third-party.yaml
# Group: DEFAULT_GROUP
# 用途：存放第三方服务的专属业务配置
# 包含：MinIO 对象存储、短信服务等
# =====================================================

# ===============================
# MinIO 对象存储配置（业界标准）
# ===============================
# 说明：只有 ThirdParty 服务需要此配置，其他微服务通过 Feign 调用
minio:
  # MinIO 服务器地址（开发环境）
  endpoint: http://localhost:9000
  # 访问密钥（类似用户名）
  access-key: admin
  # 秘密密钥（类似密码）
  secret-key: password123
  # 默认存储桶名称
  bucket-name: nexusmall
  # 是否启用自动创建桶
  # 开发环境：true（方便调试）
  # 生产环境：false（需要手动创建，提高安全性）
  auto-create-bucket: true
  # 文件上传最大大小（字节）
  max-file-size: 104857600  # 100MB
  # 允许的文件后缀（防止上传危险文件）
  allowed-extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .bmp
    - .webp
    - .mp4
    - .avi
    - .mov
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx

# ===============================
# 阿里云 OSS 配置（可选，生产环境使用）
# ===============================
# 说明：如果生产环境使用阿里云 OSS，取消以下注释并配置
# aliyun:
#   oss:
#     # OSS 端点地址
#     endpoint: https://oss-cn-shanghai.aliyuncs.com
#     # 访问密钥 ID
#     access-key-id: ${OSS_ACCESS_KEY_ID}
#     # 访问密钥 Secret
#     access-key-secret: ${OSS_ACCESS_KEY_SECRET}
#     # 存储桶名称
#     bucket-name: nexusmall-prod

# ===============================
# 阿里云短信配置（可选）
# ===============================
# aliyun:
#   sms:
#     # 短信 API 产品 ID
#     product: Dysmsapi
#     # 域名
#     domain: dysmsapi.aliyuncs.com
#     # AccessKey ID
#     access-key-id: ${SMS_ACCESS_KEY_ID}
#     # AccessKey Secret
#     access-key-secret: ${SMS_ACCESS_KEY_SECRET}
#     # 签名名称
#     sign-name: NexusMall
#     # 模板代码（示例）
#     template-code: SMS_123456789

# ===============================
# Kafka 日志收集开关（Logback Appender）
# ===============================
KAFKA_LOGGING_ENABLED: ${KAFKA_LOGGING_ENABLED:false}
