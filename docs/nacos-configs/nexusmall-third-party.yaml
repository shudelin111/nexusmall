# =====================================================
# NexusMall Third-Party Service - Nacos Configuration
# 第三方服务集成 Nacos 托管配置
# =====================================================
# 配置说明：
# - Data ID: nexusmall-third-party.yaml
# - Group: MALL_GROUP
# - 适用环境：所有环境共享（具体环境差异通过环境变量区分）
# - 维护团队：平台架构组
# =====================================================

# ===============================
# Spring 应用配置
# ===============================
spring:
  # 注意：spring.application.name 已在 bootstrap.yml 中定义，此处无需重复
  
  # Redis 连接池配置（通用参数，所有环境共享）
  redis:
    timeout: 5000
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms

  # Spring Cloud 配置
  cloud:
    sentinel:
      datasource:
        # 流控规则数据源
        ds1:
          nacos:
            dataId: nexusmall-third-party-flow-rule.json
            groupId: MALL_GROUP
            rule-type: flow
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 熔断降级规则数据源
        ds2:
          nacos:
            dataId: nexusmall-third-party-degrade-rule.json
            groupId: MALL_GROUP
            rule-type: degrade
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

        # 系统自适应保护规则数据源
        ds3:
          nacos:
            dataId: nexusmall-third-party-system-rule.json
            groupId: MALL_GROUP
            rule-type: system
            data-type: json
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}

# ===============================
# Seata 分布式事务配置
# ===============================
seata:
  enabled: false
  application-id: nexusmall-third-party

# ===============================
# MinIO 对象存储配置（通用参数）
# ===============================
minio:
  # ⚠️ 注意：endpoint、access-key、secret-key 在 nexusmall-third-party-{profile}.yaml 中定义
  # 默认存储桶名称
  bucket-name: ${MINIO_BUCKET:nexusmall}
  # 是否自动创建存储桶
  auto-create-bucket: false
  # 文件上传最大大小（字节）- 100MB
  max-file-size: 104857600
  # 允许上传的文件后缀名列表
  allowed-extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .bmp
    - .webp
    - .svg
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
    - .ppt
    - .pptx
    - .txt
    - .md
    - .zip
    - .rar
    - .7z
    - .mp3
    - .wav
    - .mp4
    - .avi
    - .mov

# ===============================
# RocketMQ 消息队列配置（通用参数）
# ===============================
# ⚠️ 注意：RocketMQ 生产者通用参数（timeout、retry）已在 nexusmall-common-mq.yaml 中定义
rocketmq:
  # ⚠️ 注意：name-server 在 nexusmall-third-party-{profile}.yaml 中定义
  producer:
    group: third-party-producer-group

# ===============================
# 第三方服务业务配置（通用参数）
# ===============================
third-party:
  # ------------------------------
  # 短信服务配置
  # ------------------------------
  sms:
    # 是否启用短信能力
    enabled: true
    # 短信服务商
    provider: aliyun
    # 阿里云短信参数（provider=aliyun 时使用）
    aliyun:
      # 短信服务地域
      region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
      # ⚠️ 注意：access-key-id、access-key-secret 在 nexusmall-third-party-{profile}.yaml 中定义
      # 短信签名（控制台已审核通过）
      sign-name: ${ALIYUN_SMS_SIGN_NAME:}
      # 短信模板 CODE（控制台已审核通过）
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
  
  # ------------------------------
  # 支付服务配置
  # ------------------------------
  payment:
    # 是否启用支付能力
    enabled: true
    # 启用的支付渠道列表
    providers:
      - alipay    # 支付宝
      - wechatpay # 微信支付
      - unionpay  # 银联支付
  
  # ------------------------------
  # 对象存储配置
  # ------------------------------
  storage:
    # 是否启用对象存储能力
    enabled: false
    # 存储服务商
    provider: minio
    # MinIO 对象存储参数（provider=minio 时使用）
    minio:
      # ⚠️ 注意：endpoint、access-key、secret-key 在 nexusmall-third-party-{profile}.yaml 中定义
      bucket-name: ${MINIO_BUCKET:nexusmall}
    # 阿里云 OSS 参数（provider=aliyun-oss 时使用）
    aliyun-oss:
      # ⚠️ 注意：endpoint、access-key-id、access-key-secret、bucket-name 在 nexusmall-third-party-{profile}.yaml 中定义
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      bucket-name: ${ALIYUN_OSS_BUCKET:}

# ===============================
# SpringDoc OpenAPI 文档配置
# ===============================
springdoc:
  packages-to-scan: com.nexusmall.thirdparty.controller
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.nexusmall.thirdparty.controller
