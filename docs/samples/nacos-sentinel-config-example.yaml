# =====================================================
# Sentinel 熔断降级规则配置示例
# 用途：在 Nacos 配置中心创建配置文件，实现动态熔断降级
# =====================================================

# 配置说明：
# 1. 在 Nacos 控制台创建配置文件
#    - Data ID: nexusmall-order-sentinel.yaml
#    - Group: DEFAULT_GROUP
#    - 配置格式：YAML
#
# 2. 重启 Order 服务或刷新配置（@RefreshScope）
#
# 3. 查看 Sentinel Dashboard 确认规则生效
#    - 地址：http://10.10.1.1:8858
# =====================================================

spring:
  cloud:
    sentinel:
      datasource:
        # ===============================
        # 流控规则配置（控制 QPS 或并发数）
        # ===============================
        flow:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            dataId: nexusmall-order-flow-rule.yaml
            groupId: DEFAULT_GROUP
            rule-type: flow
            data-type: json
        
        # ===============================
        # 熔断降级规则配置
        # ===============================
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            dataId: nexusmall-order-degrade-rule.yaml
            groupId: DEFAULT_GROUP
            rule-type: degrade
            data-type: json
        
        # ===============================
        # 系统自适应保护规则
        # ===============================
        system:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            dataId: nexusmall-order-system-rule.yaml
            groupId: DEFAULT_GROUP
            rule-type: system
            data-type: json

---
# =====================================================
# 流控规则详细配置（JSON 格式）
# Data ID: nexusmall-order-flow-rule.yaml
# =====================================================
[
  {
    "resource": "/order/create",
    "limitApp": "default",
    "grade": 1,
    "count": 100,
    "strategy": 0,
    "controlBehavior": 0,
    "clusterMode": false
  },
  {
    "resource": "createOrder",
    "limitApp": "default",
    "grade": 1,
    "count": 50,
    "strategy": 0,
    "controlBehavior": 1,
    "warmUpPeriodSec": 10,
    "clusterMode": false
  },
  {
    "resource": "getOrderById",
    "limitApp": "default",
    "grade": 0,
    "count": 200,
    "strategy": 0,
    "controlBehavior": 2,
    "maxQueueingTimeMs": 500,
    "clusterMode": false
  }
]

---
# =====================================================
# 熔断降级规则详细配置（JSON 格式）
# Data ID: nexusmall-order-degrade-rule.yaml
# =====================================================
[
  {
    "resource": "createOrder",
    "count": 0.5,
    "timeWindow": 60,
    "grade": 0,
    "limitApp": "default",
    "minRequestAmount": 5
  },
  {
    "resource": "decreaseStock",
    "count": 1000,
    "timeWindow": 30,
    "grade": 2,
    "limitApp": "default",
    "minRequestAmount": 10
  },
  {
    "resource": "getOrderById",
    "count": 10,
    "timeWindow": 90,
    "grade": 1,
    "limitApp": "default",
    "minRequestAmount": 5
  }
]

---
# =====================================================
# 系统自适应保护规则（JSON 格式）
# Data ID: nexusmall-order-system-rule.yaml
# =====================================================
[
  {
    "highestSystemLoad": 5.0,
    "highestCpuUsage": 80.0,
    "qps": 500,
    "avgRt": 1000,
    "maxThread": 100
  }
]
