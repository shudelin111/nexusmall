spring:
  profiles:
    active: dev
  application:
    name: nexusmall-common

# 日志配置（统一）
nexusmall:
  logging:
    path: ${LOG_PATH:D:/IdeaProjects/nexusmall/logs}

# 通用配置
common:
  response:
    success-code: 200
    success-message: "操作成功"
    error-code: 500
    error-message: "系统异常，请联系管理员"

# 验证配置
validation:
  enabled: true
  fail-fast: true

# Jackson配置
jackson:
  date-format: yyyy-MM-dd HH:mm:ss
  time-zone: GMT+8

# 服务端口（仅用于测试）
server:
  port: 8083
