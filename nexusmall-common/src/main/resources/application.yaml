# =====================================================
# NexusMall 公共模块配置文件
# =====================================================
# 职责说明：
# 1. 提供全项目通用的基础配置
# 2. 定义统一的响应格式标准
# 3. 配置全局验证规则
# 4. 设置 JSON 序列化格式
# =====================================================

spring:
  # ------------------------------
  # 环境配置
  # ------------------------------
  profiles:
    # 当前激活的运行环境
    # 可选值：dev(开发) / test(测试) / prod(生产)
    # 建议：生产环境通过启动参数覆盖，如 --spring.profiles.active=prod
    active: dev
  
  application:
    # 应用名称（用于日志标识、监控分组等）
    name: nexusmall-common
  
  # Kafka 配置（用于日志收集）
  kafka:
    # Kafka Broker 地址
    bootstrap-servers: ${KAFKA_SERVERS:10.10.1.1:9092}
    # 消费者配置
    consumer:
      # 消费者组 ID（可用于负载均衡和广播模式切换）
      group-id: ${spring.application.name}-log-group
      # 自动重置 offset 策略
      auto-offset-reset: latest
      # 是否启用自动提交（建议手动提交更可靠）
      enable-auto-commit: false
    # 生产者配置
    producer:
      # 确认模式：0=不确认，1=leader 确认，all=all 确认
      acks: 1
      # 失败重试次数
      retries: 3
      # 批量发送大小（字节）
      batch-size: 16384
      # 缓冲区内存大小
      buffer-memory: 33554432

# =====================================================
# 自定义项目配置
# =====================================================

# 日志路径配置（所有服务统一使用此路径）
nexusmall:
  logging:
    # 日志文件存储根目录
    # 支持环境变量替换：${LOG_PATH}，默认值为 D:/IdeaProjects/nexusmall/logs
    path: ${LOG_PATH:D:/IdeaProjects/nexusmall/logs}

# 统一响应格式配置
common:
  response:
    # 成功响应的 HTTP 状态码
    success-code: 200
    # 成功响应的默认消息
    success-message: "操作成功"
    # 系统错误的 HTTP 状态码
    error-code: 500
    # 系统错误的默认提示消息
    error-message: "系统异常，请联系管理员"

# 参数验证配置
validation:
  # 是否启用参数验证
  enabled: true
  # 验证失败模式
  # true: 遇到第一个验证失败立即返回（性能更好）
  # false: 收集所有验证错误后一次性返回（用户体验更好）
  fail-fast: true

# Jackson JSON 序列化配置
jackson:
  # 日期时间格式化模板
  # 所有 Date/LocalDateTime 类型字段都将按此格式序列化
  # 示例：2026-03-25 14:30:00
  date-format: yyyy-MM-dd HH:mm:ss
  # 时区设置（东八区，北京时间）
  time-zone: GMT+8

# ------------------------------
# 服务器配置（仅用于独立测试 common 模块时使用）
# ------------------------------
server:
  # 服务端口号
  port: 8083
