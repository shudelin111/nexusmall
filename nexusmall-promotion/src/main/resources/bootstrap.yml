# =====================================================
# NexusMall 营销服务 - Bootstrap 配置
# =====================================================

spring:
  application:
    name: nexusmall-promotion
  
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        group: ${NACOS_GROUP:MALL_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        ephemeral: true
      
      config:
        server-addr: ${NACOS_SERVER_ADDR:10.10.1.1:8848}
        file-extension: yaml
        group: ${NACOS_GROUP:MALL_GROUP}
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        refresh-enabled: true
        timeout: 3000
        max-retry: 3
        
        shared-configs:
          # 1. 核心配置（Jackson、文件上传、Tomcat）
          - data-id: nexusmall-common-core.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # 2. 数据库配置（MyBatis-Plus、连接池）
          - data-id: nexusmall-common-database.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # 3. 消息队列配置（RocketMQ、Kafka）
          - data-id: nexusmall-common-mq.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          # 4. Web 组件配置（Sentinel、Actuator、Sleuth）
          - data-id: nexusmall-common-web.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
        
        extension-configs:
          - data-id: nexusmall-promotion.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
          - data-id: nexusmall-promotion-${spring.profiles.active}.yaml
            group: ${NACOS_GROUP:MALL_GROUP}
            refresh: true
