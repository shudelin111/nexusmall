# =====================================================
# NexusMall 购物车服务配置文件
# =====================================================
# 模块职责：
# 1. 购物车管理（添加/删除/修改数量/查询）
# 2. Redis Hash 主存储（高性能读写）
# 3. MySQL 异步持久化（数据兜底）
# 4. 商品快照机制（防止商家改价导致体验问题）
# 5. 匿名购物车合并（未登录→登录后自动合并）
# =====================================================

# ===============================
# 服务器配置
# ===============================
server:
  port: 10001  # 购物车服务端口(与Member同属用户域,连续编号)
  shutdown: graceful  # 启用优雅关闭模式

# ===============================
# 应用元信息配置
# ===============================
info:
  app:
    # 应用名称
    name: nexusmall-cart
    # 应用描述
    description: NexusMall 购物车服务
    # 应用版本号
    version: 0.0.1-SNAPSHOT
  # Java 版本
  java.version: 1.8

# ===============================
# Spring Boot 优雅关闭配置
# ===============================
# 用途：确保应用关闭时完成以下操作
# 1. 等待在请求处理完成
# 2. RocketMQ Producer 完成消息发送
# 3. 数据库连接正常释放
# 4. Nacos 客户端正常注销
# 
# 官方文档：https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#web.graceful-shutdown
spring:
  lifecycle:
    # 每个关闭阶段的超时时间（Spring Boot 2.3+ 标准配置）
    # 作用：超过此时间后强制关闭应用
    # 建议值：30-60 秒（给日志发送留足时间）
    timeout-per-shutdown-phase: 30s

